<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROYECTOVISION · Técnicos</title>
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PV Técnicos">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0b1220;--card:#131c2e;--card2:#1a2740;--border:#243044;--text:#e6edf6;--muted:#94a3b8;--accent:#0ea5e9;}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0c4a6e 0%,#0e7490 60%,#0891b2 100%);}
.login-card{background:var(--card);border-radius:18px;padding:30px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-logo{text-align:center;font-size:2.6rem;margin-bottom:6px;}
.login-card h1{font-size:1.3rem;text-align:center;margin-bottom:4px;}
.login-card .sub{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:22px;}
label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:5px;font-weight:600;}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1rem;margin-bottom:14px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:transform .08s,opacity .2s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#0891b2);color:#fff;width:100%;}
.btn-block{width:100%;}
.btn-ok{background:#10b981;color:#fff;}
.btn-blue{background:#3b82f6;color:#fff;}
.btn-purple{background:#8b5cf6;color:#fff;}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:8px 12px;font-size:0.82rem;}
/* APP */
#app{min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
header .who{font-size:0.95rem;font-weight:700;}
header .who small{display:block;color:var(--muted);font-size:0.72rem;font-weight:400;}
.main{flex:1;padding:14px;max-width:680px;width:100%;margin:0 auto;}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tab{flex:1;min-width:90px;text-align:center;padding:10px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:0.8rem;font-weight:600;cursor:pointer;color:var(--muted);}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tab .n{display:block;font-size:1.2rem;font-weight:800;}
.order{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid var(--accent);}
.order .type{font-weight:800;font-size:1rem;}
.order .row{font-size:0.86rem;margin-top:5px;}
.order .muted{color:var(--muted);font-size:0.82rem;margin-top:3px;}
.badge{padding:4px 12px;border-radius:12px;font-size:0.74rem;font-weight:700;white-space:nowrap;}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ico{font-size:3rem;margin-bottom:10px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.4);z-index:9999;font-size:0.9rem;max-width:90vw;text-align:center;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow:auto;}
.modal h3{margin-bottom:14px;font-size:1.1rem;}
.sync{font-size:0.72rem;color:var(--muted);}
.spin{display:inline-block;width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:r 0.9s linear infinite;}
@keyframes r{to{transform:rotate(360deg);}}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted);}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  try{
    var ICON='data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#0e7490"/><text x="256" y="300" font-size="200" text-anchor="middle" fill="#fff" font-family="Arial">🔧</text></svg>');
    var base=location.href.split('?')[0].split('#')[0];
    var scope=base.substring(0,base.lastIndexOf('/')+1);
    var m={name:"PROYECTOVISION Técnicos",short_name:"PV Técnicos",start_url:base,scope:scope,display:"standalone",orientation:"portrait",background_color:"#0b1220",theme_color:"#0ea5e9",icons:[{src:ICON,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
    var l=document.createElement('link');l.rel='manifest';l.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(m));document.head.appendChild(l);
    var a=document.createElement('link');a.rel='apple-touch-icon';a.href=ICON;document.head.appendChild(a);
  }catch(e){console.warn('PWA',e);}
})();
</script>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login">
    <div class="login-card">
        <div class="login-logo">🔧</div>
        <h1>App de Técnicos</h1>
        <div class="sub">PROYECTOVISION</div>
        <label>Número de documento</label>
        <input id="li_doc" type="text" inputmode="numeric" placeholder="Tu cédula" autocomplete="off">
        <label>Clave</label>
        <input id="li_pass" type="password" placeholder="Tu clave de técnico" autocomplete="off">
        <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>
        <div id="li_err" style="color:#f87171;font-size:0.82rem;text-align:center;margin-top:10px;"></div>
        <div id="li_status" class="sync" style="text-align:center;margin-top:14px;"></div>
    </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app" class="hidden">
    <header>
        <div class="who" id="hWho">—</div>
        <div style="display:flex;align-items:center;gap:10px;">
            <span class="sync" id="hSync">●</span>
            <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
        </div>
    </header>
    <div class="main">
        <div class="tabs" id="tabs"></div>
        <div id="list"></div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG — misma base que Oficinas
// ════════════════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyDxDOjSzmsSNnULxmzyH2JM80u8AMFpO9w",
    authDomain: "inventario-88a28.firebaseapp.com",
    projectId: "inventario-88a28",
    storageBucket: "inventario-88a28.firebasestorage.app",
    messagingSenderId: "981251888141",
    appId: "1:981251888141:web:85e27f09ec4350c27c7144"
};
const COLECCION='oficinas_sistema';
const DOC_ID='main';

const ORDEN_TIPOS = {
    recogida:   { label:'Recogida de equipos', icon:'📦' },
    traslado:   { label:'Traslado de servicio', icon:'🚚' },
    clave:      { label:'Cambio de contraseña', icon:'🔑' },
    instalacion:{ label:'Instalación nueva', icon:'🛠️' },
    soporte:    { label:'Soporte/visita técnica', icon:'🔧' }
};
const ORDEN_ESTADOS = {
    pendiente: { label:'Pendiente', icon:'🕒', color:'#f59e0b', next:'aceptada', nextLabel:'👍 Aceptar' },
    aceptada:  { label:'Aceptada', icon:'👍', color:'#3b82f6', next:'proceso', nextLabel:'⚙️ Iniciar trabajo' },
    proceso:   { label:'En proceso', icon:'⚙️', color:'#8b5cf6', next:'finalizada', nextLabel:'✅ Finalizar' },
    finalizada:{ label:'Finalizada', icon:'✅', color:'#10b981', next:null }
};

let db=null, TEC=null, DATA=null, _unsub=null, _tab='activas';

// ── Init Firebase ──
function initFB(){
    try{
        firebase.initializeApp(firebaseConfig);
        db=firebase.firestore();
        return true;
    }catch(e){ console.error('FB init',e); return false; }
}

// ── LOGIN ──
async function doLogin(){
    const doc=document.getElementById('li_doc').value.trim();
    const pass=document.getElementById('li_pass').value.trim();
    const err=document.getElementById('li_err');
    const st=document.getElementById('li_status');
    err.textContent='';
    if(!doc||!pass){ err.textContent='Ingresa documento y clave.'; return; }
    st.textContent='Verificando...';
    try{
        if(!db && !initFB()){ err.textContent='No se pudo conectar.'; st.textContent=''; return; }
        const snap=await db.collection(COLECCION).doc(DOC_ID).get();
        if(!snap.exists){ err.textContent='No hay datos disponibles.'; st.textContent=''; return; }
        const data=snap.data();
        const empleados=data.rrhh_empleados||[];
        const tec=empleados.find(e=>String(e.documento||'').trim()===doc && String(e.tecnicoPass||'').trim()===pass && (e.estado||'Activo')==='Activo');
        if(!tec){ err.textContent='Documento o clave incorrectos (o no estás habilitado como técnico).'; st.textContent=''; return; }
        // Guardar sesión ligera
        TEC={ id:tec.id, nombre:tec.nombre, documento:tec.documento, oficinas:(Array.isArray(tec.oficinas)?tec.oficinas.map(String):[]) };
        try{ sessionStorage.setItem('tec_session', JSON.stringify({doc:doc, pass:pass})); }catch(e){}
        st.textContent='';
        enterApp();
    }catch(e){
        console.error(e); err.textContent='Error: '+(e.message||e); st.textContent='';
    }
}
window.doLogin=doLogin;

function doLogout(){
    try{ sessionStorage.removeItem('tec_session'); }catch(e){}
    if(_unsub){ _unsub(); _unsub=null; }
    TEC=null; DATA=null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('li_pass').value='';
}
window.doLogout=doLogout;

function enterApp(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const ofiNombres=_nombresOficinas(TEC.oficinas);
    document.getElementById('hWho').innerHTML=`👷 ${TEC.nombre}<small>${ofiNombres||'Sin oficina asignada'}</small>`;
    // Escucha en tiempo real
    if(_unsub){ _unsub(); }
    _unsub=db.collection(COLECCION).doc(DOC_ID).onSnapshot(snap=>{
        if(snap.exists){ DATA=snap.data(); document.getElementById('hSync').style.color='#10b981'; render(); }
    }, err=>{ console.error('snapshot',err); document.getElementById('hSync').style.color='#ef4444'; });
}

function _nombresOficinas(ids){
    if(!DATA) return '';
    return (DATA.oficinas||[]).filter(o=>ids.includes(String(o.id))).map(o=>o.nombre).join(', ');
}

// ── Órdenes que ve este técnico: las de sus oficinas ──
function _misOrdenes(){
    if(!DATA) return [];
    const todas=DATA.ordenesTrabajo||[];
    return todas.filter(o=>{
        // de mis oficinas
        if(!TEC.oficinas.includes(String(o.oficinaId))) return false;
        // asignada a mí, o sin asignar (disponible)
        if(o.tecnicoId && String(o.tecnicoId)!==String(TEC.id)) return false;
        return true;
    });
}

function render(){
    if(!DATA){ return; }
    const mis=_misOrdenes();
    const activas=mis.filter(o=>o.estado!=='finalizada');
    const finalizadas=mis.filter(o=>o.estado==='finalizada');

    // Tabs
    document.getElementById('tabs').innerHTML=`
        <div class="tab ${_tab==='activas'?'active':''}" onclick="setTab('activas')"><span class="n">${activas.length}</span>Activas</div>
        <div class="tab ${_tab==='finalizadas'?'active':''}" onclick="setTab('finalizadas')"><span class="n">${finalizadas.length}</span>Finalizadas</div>
    `;

    const items=(_tab==='activas'?activas:finalizadas).sort((a,b)=>(b.creada||0)-(a.creada||0));
    const list=document.getElementById('list');
    if(items.length===0){
        list.innerHTML=`<div class="empty"><div class="ico">${_tab==='activas'?'📭':'📦'}</div>${_tab==='activas'?'No tienes órdenes activas.':'Aún no hay órdenes finalizadas.'}</div>`;
        return;
    }
    list.innerHTML=items.map(o=>{
        const tipo=ORDEN_TIPOS[o.tipo]||{label:o.tipo,icon:'🔧'};
        const est=ORDEN_ESTADOS[o.estado]||ORDEN_ESTADOS.pendiente;
        const ofi=(DATA.oficinas||[]).find(x=>String(x.id)===String(o.oficinaId));
        const disponible=!o.tecnicoId;
        return `<div class="order" style="border-left-color:${est.color};">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                <div class="type">${tipo.icon} ${tipo.label}</div>
                <span class="badge" style="background:${est.color}22;color:${est.color};">${est.icon} ${est.label}</span>
            </div>
            ${o.cliente?`<div class="row"><strong>Cliente:</strong> ${o.cliente}${o.cedula?` · ${o.cedula}`:''}</div>`:''}
            ${o.direccion?`<div class="muted">📍 ${o.direccion}</div>`:''}
            ${o.descripcion?`<div class="muted">📝 ${o.descripcion}</div>`:''}
            <div class="muted">🏢 ${ofi?ofi.nombre:'—'}${disponible?' · <span style="color:#f59e0b;">disponible</span>':''}</div>
            ${o.observacionTecnico?`<div class="muted">🗣️ Tu nota: ${o.observacionTecnico}</div>`:''}
            <div class="order-actions">
                ${est.next?`<button class="btn btn-sm ${est.next==='finalizada'?'btn-ok':est.next==='proceso'?'btn-purple':'btn-blue'}" onclick="avanzar('${o.id}','${est.next}')">${est.nextLabel}</button>`:''}
                ${o.estado!=='finalizada'?`<button class="btn btn-sm btn-ghost" onclick="modalNota('${o.id}')">📝 Nota</button>`:''}
            </div>
        </div>`;
    }).join('');
}
function setTab(t){ _tab=t; render(); }
window.setTab=setTab;

// ── Avanzar estado (lee fresco y reescribe solo la orden, sin pisar lo demás) ──
async function avanzar(ordenId, nuevoEstado, notaExtra){
    if(nuevoEstado==='aceptada' && !confirm('¿Aceptar esta orden? Quedará asignada a ti.')) return;
    if(nuevoEstado==='finalizada' && !confirm('¿Marcar esta orden como finalizada?')) return;
    showToast('Guardando...');
    try{
        const ref=db.collection(COLECCION).doc(DOC_ID);
        await db.runTransaction(async tx=>{
            const snap=await tx.get(ref);
            if(!snap.exists) throw new Error('No existe el documento');
            const data=snap.data();
            const ordenes=data.ordenesTrabajo||[];
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            const o=ordenes[idx];
            // Al aceptar, queda asignada a este técnico
            if(nuevoEstado==='aceptada'){ o.tecnicoId=TEC.id; o.tecnicoNombre=TEC.nombre; }
            o.estado=nuevoEstado;
            o.actualizada=Date.now();
            if(typeof notaExtra==='string' && notaExtra.length){ o.observacionTecnico=notaExtra; }
            if(nuevoEstado==='finalizada'){ o.finalizada=Date.now(); }
            ordenes[idx]=o;
            tx.update(ref, { ordenesTrabajo: ordenes });
        });
        showToast('✅ Listo');
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); }
}
window.avanzar=avanzar;

function modalNota(ordenId){
    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const actual=o?(o.observacionTecnico||''):'';
    const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalNota';
    bg.innerHTML=`<div class="modal">
        <h3>📝 Nota / observación</h3>
        <textarea id="notaTxt" rows="4" placeholder="Ej: Cliente no estaba, reagendar...">${actual}</textarea>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-primary btn-block" onclick="guardarNota('${ordenId}')">Guardar nota</button>
            <button class="btn btn-ghost" onclick="document.getElementById('modalNota').remove()">Cerrar</button>
        </div>
    </div>`;
    bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); });
    document.body.appendChild(bg);
}
window.modalNota=modalNota;
async function guardarNota(ordenId){
    const txt=document.getElementById('notaTxt').value.trim();
    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const m=document.getElementById('modalNota'); if(m) m.remove();
    // reusar avanzar manteniendo el estado actual
    showToast('Guardando nota...');
    try{
        const ref=db.collection(COLECCION).doc(DOC_ID);
        await db.runTransaction(async tx=>{
            const snap=await tx.get(ref);
            const data=snap.data();
            const ordenes=data.ordenesTrabajo||[];
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            ordenes[idx].observacionTecnico=txt;
            ordenes[idx].actualizada=Date.now();
            tx.update(ref, { ordenesTrabajo: ordenes });
        });
        showToast('✅ Nota guardada');
    }catch(e){ showToast('❌ '+(e.message||e), true); }
}
window.guardarNota=guardarNota;

function showToast(msg, err){
    let t=document.getElementById('toast');
    if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
    t.style.background=err?'#7f1d1d':'#1e293b'; t.textContent=msg; t.style.display='block';
    clearTimeout(t._to); t._to=setTimeout(()=>{ t.style.display='none'; }, err?6000:2500);
}

// ── Auto-login si hay sesión guardada ──
window.addEventListener('load', async ()=>{
    initFB();
    let s=null; try{ s=JSON.parse(sessionStorage.getItem('tec_session')||'null'); }catch(e){}
    if(s && s.doc && s.pass){
        document.getElementById('li_doc').value=s.doc;
        document.getElementById('li_pass').value=s.pass;
        document.getElementById('li_status').textContent='Reanudando sesión...';
        doLogin();
    }
});
</script>
</body>
</html>
