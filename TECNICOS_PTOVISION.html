<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0b1220;--card:#131c2e;--card2:#1a2740;--border:#243044;--text:#e6edf6;--muted:#94a3b8;--accent:#0ea5e9;}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0c4a6e 0%,#0e7490 60%,#0891b2 100%);}
.login-card{background:var(--card);border-radius:18px;padding:30px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-logo{text-align:center;font-size:2.6rem;margin-bottom:6px;}
.login-card h1{font-size:1.3rem;text-align:center;margin-bottom:4px;}
.login-card .sub{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:22px;}
label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:5px;font-weight:600;}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1rem;margin-bottom:14px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:transform .08s,opacity .2s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#0891b2);color:#fff;width:100%;}
.btn-block{width:100%;}
.btn-ok{background:#10b981;color:#fff;}
.btn-blue{background:#3b82f6;color:#fff;}
.btn-purple{background:#8b5cf6;color:#fff;}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:8px 12px;font-size:0.82rem;}
/* APP */
#app{min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
header .who{font-size:0.95rem;font-weight:700;}
header .who small{display:block;color:var(--muted);font-size:0.72rem;font-weight:400;}
.main{flex:1;padding:14px;max-width:680px;width:100%;margin:0 auto;}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tab{flex:1;min-width:90px;text-align:center;padding:10px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:0.8rem;font-weight:600;cursor:pointer;color:var(--muted);}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tab .n{display:block;font-size:1.2rem;font-weight:800;}
.order{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid var(--accent);}
.order .type{font-weight:800;font-size:1rem;}
.order .row{font-size:0.86rem;margin-top:5px;}
.order .muted{color:var(--muted);font-size:0.82rem;margin-top:3px;}
.badge{padding:4px 12px;border-radius:12px;font-size:0.74rem;font-weight:700;white-space:nowrap;}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ico{font-size:3rem;margin-bottom:10px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.4);z-index:9999;font-size:0.9rem;max-width:90vw;text-align:center;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow:auto;}
.modal h3{margin-bottom:14px;font-size:1.1rem;}
.sync{font-size:0.72rem;color:var(--muted);}
.spin{display:inline-block;width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:r 0.9s linear infinite;}
@keyframes r{to{transform:rotate(360deg);}}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted);}
</style>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG — misma base que Oficinas
// ════════════════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyDxDOjSzmsSNnULxmzyH2JM80u8AMFpO9w",
    authDomain: "inventario-88a28.firebaseapp.com",
    projectId: "inventario-88a28",
    storageBucket: "inventario-88a28.firebasestorage.app",
    messagingSenderId: "981251888141",
    appId: "1:981251888141:web:85e27f09ec4350c27c7144"
};
const COLECCION='oficinas_sistema';
const DOC_ID='main';

// ── CONTROL DE VERSIÓN (bloqueo total si hay versión nueva) ──
const APP_VERSION_TEC = 66; // ⬆️ Subir en cada versión publicada de Técnicos
let _bloqueoVersionTec = false;
async function registrarVersionTec(){
    if(!db) return;
    try{
        const ref=db.collection('oficinas_sistema').doc('app_version_tecnicos');
        const snap=await ref.get();
        const remota=snap.exists?(snap.data().version||0):0;
        if(APP_VERSION_TEC > remota){ await ref.set({version:APP_VERSION_TEC, actualizadoEn:Date.now()}); }
    }catch(e){ console.warn('registrar versión tec:',e); }
}
function iniciarEscuchaVersionTec(){
    if(!db) return;
    db.collection('oficinas_sistema').doc('app_version_tecnicos').onSnapshot(snap=>{
        if(!snap.exists) return;
        const remota=snap.data().version||0;
        if(remota > APP_VERSION_TEC){
            _bloqueoVersionTec = true;
            const b=document.getElementById('versionBlock'); if(b) b.style.display='flex';
        }
    }, err=>console.warn('escucha versión tec:',err));
}

// Registra el inicio de sesión del técnico (lo ve el admin en Oficinas)
async function registrarSesionTec(nombre){
    if(!db) return;
    try{
        const ref=db.collection('oficinas_sistema').doc('logs_sesiones');
        const snap=await ref.get();
        let lista=(snap.exists && Array.isArray(snap.data().sesiones))?snap.data().sesiones:[];
        lista.push({ app:'Técnicos', quien:nombre||'Técnico', rol:'técnico', fecha:Date.now() });
        if(lista.length>300) lista=lista.slice(-300);
        await ref.set({ sesiones:lista, actualizado:Date.now() });
    }catch(e){ console.warn('registrar sesión tec:',e); }
}

// ════════════════════════════════════════════════════════════════
// MODO EMERGENCIA (cuota de LECTURAS de Firebase agotada).
// Cuando está activo, NO usamos transacciones (que leen). Escribimos directamente
// con update() usando los datos que YA tenemos en memoria (DATA), gastando solo
// escrituras (que sí están disponibles). Riesgo: si dos técnicos editan la MISMA
// orden a la vez, el último gana. Es muy poco probable. Se desactiva tras el reinicio.
// Para activar: en la consola del navegador escribe  MODO_EMERGENCIA=true  y recarga la lógica,
// o usa el botón que aparece en la app.
// ════════════════════════════════════════════════════════════════
let MODO_EMERGENCIA = (localStorage.getItem('modo_emergencia')==='1');
function activarEmergencia(on){
    MODO_EMERGENCIA = !!on;
    localStorage.setItem('modo_emergencia', on?'1':'0');
    showToast(on?'🚨 Modo emergencia ACTIVADO (guardará sin leer)':'✅ Modo emergencia desactivado');
    render();
}
window.activarEmergencia = activarEmergencia;

// Actualiza ordenesTrabajo SIN leer (usa la copia en memoria DATA). modifFn recibe el array y lo edita.
async function _actualizarOrdenesSinLeer(modifFn){
    const ordenes = (DATA.ordenesTrabajo||[]).map(o=>Object.assign({},o)); // copia desde memoria
    modifFn(ordenes);
    DATA.ordenesTrabajo = ordenes; // reflejar en memoria local de inmediato
    await db.collection(COLECCION).doc(DOC_ID).update({ ordenesTrabajo: ordenes });
}
// Actualiza un campo del inventario SIN leer (usa copia en memoria si la hay)
async function _actualizarInventarioSinLeer(campo, modifFn){
    // Para inventario no siempre tenemos copia en memoria; intentamos una sola lectura ligera del campo.
    // Si falla por cuota, propagamos el error (el material quedará pendiente de registrar).
    const refI=db.collection('inventario').doc('datos');
    const snap=await refI.get(); // 1 lectura (si la cuota lo permite)
    const data=snap.data()||{};
    const arr = Array.isArray(data[campo]) ? data[campo] : [];
    modifFn(arr, data);
    await refI.update({ [campo]: arr });
}

// ════════════════════════════════════════════════════════════════
// BLOQUEO ANTI-DOBLE-GUARDADO.
// Cuando una acción está guardando, mostramos una pantalla "Guardando..." que cubre
// todo y bloquea cualquier clic. Así el técnico no puede dar guardar 2 veces y duplicar
// material. La pantalla se quita al terminar (con éxito o error).
// ════════════════════════════════════════════════════════════════
let _guardandoTec = false;
function _mostrarGuardando(texto){
    _guardandoTec = true;
    let ov = document.getElementById('guardandoOverlay');
    if(!ov){
        ov = document.createElement('div');
        ov.id = 'guardandoOverlay';
        ov.style.cssText = 'position:fixed;inset:0;z-index:99999999;background:rgba(8,10,18,0.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;flex-direction:column;';
        document.body.appendChild(ov);
    }
    ov.innerHTML = `<div style="text-align:center;color:#fff;">
        <div style="width:54px;height:54px;border:5px solid rgba(255,255,255,0.2);border-top-color:#0ea5e9;border-radius:50%;margin:0 auto 16px;animation:spinTec 0.8s linear infinite;"></div>
        <div style="font-size:1.05rem;font-weight:700;">${texto||'Guardando...'}</div>
        <div style="font-size:0.8rem;opacity:0.7;margin-top:4px;">No cierres ni toques la pantalla</div>
    </div>
    <style>@keyframes spinTec{to{transform:rotate(360deg);}}</style>`;
    ov.style.display = 'flex';
}
function _ocultarGuardando(){
    _guardandoTec = false;
    const ov = document.getElementById('guardandoOverlay');
    if(ov) ov.style.display = 'none';
}
// Envuelve una acción de guardado: si ya hay una en curso, la ignora (evita doble clic).
async function _conBloqueo(texto, accion){
    if(_guardandoTec){ console.warn('Ya hay un guardado en curso, se ignora el clic repetido.'); return; }
    _mostrarGuardando(texto);
    try{
        await accion();
    }catch(e){
        console.error('Error en acción bloqueada:', e);
        showToast('❌ '+(e.message||e), true);
    }finally{
        _ocultarGuardando();
    }
}
window._conBloqueo = _conBloqueo;

const ORDEN_TIPOS = {
    recogida:   { label:'Recogida de equipos', icon:'📦' },
    traslado:   { label:'Traslado de servicio', icon:'🚚' },
    clave:      { label:'Cambio de contraseña', icon:'🔑' },
    cambio_equipo:{ label:'Cambio de equipo', icon:'🔄' },
    instalacion:{ label:'Instalación nueva', icon:'🛠️' },
    soporte:    { label:'Soporte/visita técnica', icon:'🔧' },
    mantenimiento_red:{ label:'Mantenimiento de red', icon:'🌐' }
};
const ORDEN_ESTADOS = {
    pendiente: { label:'Pendiente', icon:'🕒', color:'#f59e0b', next:'aceptada', nextLabel:'👍 Aceptar' },
    aceptada:  { label:'Aceptada', icon:'👍', color:'#3b82f6', next:'proceso', nextLabel:'⚙️ Iniciar trabajo' },
    proceso:   { label:'En proceso', icon:'⚙️', color:'#8b5cf6', next:'finalizada', nextLabel:'✅ Finalizar' },
    reagendar: { label:'Reagendar', icon:'🔁', color:'#ef4444', next:'aceptada', nextLabel:'👍 Retomar' },
    finalizada:{ label:'Finalizada', icon:'✅', color:'#10b981', next:null }
};

let db=null, TEC=null, DATA=null, _unsub=null, _tab='activas';
let _invClientes=[], _invBodegas=[], _invCargado=false;

// ── Init Firebase ──
function initFB(){
    try{
        firebase.initializeApp(firebaseConfig);
        db=firebase.firestore();
        // Activar persistencia offline: guarda copia local, permite abrir con datos aunque
        // la red/cuota de Firebase falle (clave para el modo emergencia).
        try { db.enablePersistence({synchronizeTabs:true}).catch(e=>console.warn('persistencia:',e.code)); }
        catch(e){ console.warn('persistencia no disponible:', e); }
        return true;
    }catch(e){ console.error('FB init',e); return false; }
}

// ── LOGIN ──
async function doLogin(reanudando){
    const doc=document.getElementById('li_doc').value.trim();
    const pass=document.getElementById('li_pass').value.trim();
    const err=document.getElementById('li_err');
    const st=document.getElementById('li_status');
    err.textContent='';
    if(!doc||!pass){ err.textContent='Ingresa documento y clave.'; return; }
    st.textContent='Verificando...';
    try{
        if(!db && !initFB()){ err.textContent='No se pudo conectar.'; st.textContent=''; return; }
        const snap=await db.collection(COLECCION).doc(DOC_ID).get();
        if(!snap.exists){ err.textContent='No hay datos disponibles.'; st.textContent=''; return; }
        const data=snap.data();
        const empleados=data.rrhh_empleados||[];
        const tec=empleados.find(e=>String(e.documento||'').trim()===doc && String(e.tecnicoPass||'').trim()===pass && (e.estado||'Activo')==='Activo');
        if(!tec){ err.textContent='Documento o clave incorrectos (o no estás habilitado como técnico).'; st.textContent=''; return; }
        // Guardar sesión ligera
        TEC={ id:tec.id, nombre:tec.nombre, documento:tec.documento, oficinas:(Array.isArray(tec.oficinas)?tec.oficinas.map(String):[]) };
        try{ sessionStorage.setItem('tec_session', JSON.stringify({doc:doc, pass:pass})); }catch(e){}
        if(!reanudando) registrarSesionTec(tec.nombre); // solo registra en login manual, no al reanudar
        st.textContent='';
        enterApp();
    }catch(e){
        console.error(e); err.textContent='Error: '+(e.message||e); st.textContent='';
    }
}
window.doLogin=doLogin;

function doLogout(){
    try{ sessionStorage.removeItem('tec_session'); }catch(e){}
    if(_unsub){ _unsub(); _unsub=null; }
    TEC=null; DATA=null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('li_pass').value='';
}
window.doLogout=doLogout;

function enterApp(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('hWho').innerHTML=`👷 ${TEC.nombre}<small>Cargando...</small>`;
    _saludarTecnico();
    // Escucha en tiempo real
    if(_unsub){ _unsub(); }
    _unsub=db.collection(COLECCION).doc(DOC_ID).onSnapshot(snap=>{
        if(snap.exists){
            DATA=snap.data();
            // El admin controla el modo emergencia de forma centralizada (DATA.modoEmergencia).
            // Si el admin lo activó/desactivó, se refleja aquí automáticamente.
            if(typeof DATA.modoEmergencia==='boolean') MODO_EMERGENCIA = DATA.modoEmergencia;
            document.getElementById('hSync').style.color='#10b981';
            // Actualizar nombre de oficina AHORA que ya hay datos
            const ofiNombres=_nombresOficinas(TEC.oficinas);
            document.getElementById('hWho').innerHTML=`👷 ${TEC.nombre}<small>${ofiNombres||'Sin oficina asignada'}</small>`;
            render();
        }
    }, err=>{ console.error('snapshot',err); document.getElementById('hSync').style.color='#ef4444'; });
}

function _saludarTecnico(){
    const h=new Date().getHours();
    let saludo='Buenas noches', emoji='🌙';
    if(h>=5 && h<12){ saludo='Buenos días'; emoji='☀️'; }
    else if(h>=12 && h<19){ saludo='Buenas tardes'; emoji='🌤️'; }
    const primerNombre=(TEC.nombre||'').split(' ')[0];
    const ban=document.createElement('div');
    ban.style.cssText='position:fixed;top:0;left:0;right:0;z-index:100050;display:flex;justify-content:center;pointer-events:none;';
    ban.innerHTML=`<div style="margin-top:14px;background:linear-gradient(135deg,#0ea5e9,#0891b2);color:#fff;padding:13px 24px;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,0.4);font-weight:700;font-size:1rem;display:flex;align-items:center;gap:10px;animation:saludoIn 0.5s ease;max-width:92vw;text-align:center;">
        <span style="font-size:1.5rem;">${emoji}</span>
        <span>${saludo}${primerNombre?', '+primerNombre:''} 👋<br><span style="font-weight:500;font-size:0.82rem;opacity:0.95;">Bienvenido a la App de Técnicos</span></span>
    </div>`;
    if(!document.getElementById('saludoKeyframes')){
        const st=document.createElement('style'); st.id='saludoKeyframes';
        st.textContent='@keyframes saludoIn{from{transform:translateY(-80px);opacity:0;}to{transform:translateY(0);opacity:1;}}@keyframes saludoOut{from{transform:translateY(0);opacity:1;}to{transform:translateY(-80px);opacity:0;}}';
        document.head.appendChild(st);
    }
    document.body.appendChild(ban);
    setTimeout(()=>{ ban.firstElementChild.style.animation='saludoOut 0.5s ease forwards'; setTimeout(()=>ban.remove(),500); }, 4000);
}

function _nombresOficinas(ids){

// ── Órdenes que ve este técnico: las de sus oficinas ──
function _misOrdenes(){
    if(!DATA) return [];
    const misOfis=(TEC.oficinas||[]).map(String);
    const todas=DATA.ordenesTrabajo||[];
    return todas.filter(o=>{
        // de mis oficinas
        if(!misOfis.includes(String(o.oficinaId))) return false;
        // asignada a mí, o sin asignar (disponible)
        if(o.tecnicoId && String(o.tecnicoId)!==String(TEC.id)) return false;
        return true;
    });
}

    if(!DATA){ return; }

// Devuelve las órdenes de la pestaña actual ya filtradas por el texto de búsqueda
function _ordenesFiltradas(){
    const mis=_misOrdenes();
    const activas=mis.filter(o=>o.estado!=='finalizada');
    const finalizadas=mis.filter(o=>o.estado==='finalizada');
    let items=(_tab==='activas'?activas:finalizadas).sort((a,b)=>(b.creada||0)-(a.creada||0));
    const q=(window._busquedaOrden||'').trim().toLowerCase();
    if(q){
        items=items.filter(o=>{
            const txt=`${o.cliente||''} ${o.cedula||''} ${o.direccion||''} ${o.telefono||''} ${(ORDEN_TIPOS[o.tipo]||{}).label||o.tipo||''} ${o.barrio||''}`.toLowerCase();
            return txt.includes(q);
        });
    }
    return items;
}

// ── Avanzar estado (lee fresco y reescribe solo la orden, sin pisar lo demás) ──
async function avanzar(ordenId, nuevoEstado, notaExtra){
    if(nuevoEstado==='aceptada' && !confirm('¿Aceptar esta orden? Quedará asignada a ti.')) return;
    // Si se va a FINALIZAR una RECOGIDA, primero pedir datos del equipo recuperado
    if(nuevoEstado==='finalizada'){
        const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
        if(o && o.tipo==='recogida'){ modalEquipoRecuperado(ordenId); return; }
        if(o && o.tipo==='cambio_equipo'){ modalCambioEquipo(ordenId); return; }
        if(o && o.tipo==='traslado'){ modalFinalizarTraslado(ordenId); return; }
        // Para cualquier otra orden, ofrecer registrar material gastado
        modalMaterialGastado(ordenId); return;
    }
    showToast('Guardando...');
    try{
        const ref=db.collection(COLECCION).doc(DOC_ID);
        const _modif=(ordenes)=>{
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            const o=ordenes[idx];
            if(nuevoEstado==='aceptada'){ o.tecnicoId=TEC.id; o.tecnicoNombre=TEC.nombre; }
            o.estado=nuevoEstado;
            o.actualizada=Date.now();
            if(typeof notaExtra==='string' && notaExtra.length){ o.observacionTecnico=notaExtra; }
            if(nuevoEstado==='finalizada'){ o.finalizada=Date.now(); }
            ordenes[idx]=o;
        };
        if(MODO_EMERGENCIA){
            await _actualizarOrdenesSinLeer(_modif);
        } else {
            await db.runTransaction(async tx=>{
                const snap=await tx.get(ref);
                if(!snap.exists) throw new Error('No existe el documento');
                const data=snap.data();
                const ordenes=data.ordenesTrabajo||[];
                _modif(ordenes);
                tx.update(ref, { ordenesTrabajo: ordenes });
            });
        }
        showToast('✅ Listo');
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); }
}
window.avanzar=avanzar;

        // 1) Finalizar la orden + marcar retiro si aplica (en oficinas_sistema)
        const refO=db.collection(COLECCION).doc(DOC_ID);
        const _modif = (ordenes)=>{
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            ordenes[idx].estado='finalizada';
            ordenes[idx].finalizada=Date.now();
            ordenes[idx].actualizada=Date.now();
            ordenes[idx].equiposRecuperados=recuperados;
            ordenes[idx].equiposNoDevueltos=noDevueltos;
            if(retira==='si'){
                ordenes[idx].clienteRetirado=true;
                ordenes[idx].motivoRetiro=motivoRet||'Retiro por orden de trabajo';
                ordenes[idx].retiroAplicado=false; // Oficinas lo aplicará al cliente
            }
        };
        if(MODO_EMERGENCIA){
            await _actualizarOrdenesSinLeer(_modif);
        } else {
            await db.runTransaction(async tx=>{
                const snap=await tx.get(refO);
                const data=snap.data();
                const ordenes=data.ordenesTrabajo||[];
                _modif(ordenes);
                tx.update(refO, { ordenesTrabajo: ordenes });
            });
        }

        // 2) Enviar los equipos recuperados al INVENTARIO (cada uno como recuperado pendiente)
        if(recuperados.length){
            if(!bodegaId){
                showToast('⚠️ Finalizada, pero la oficina no tiene bodega vinculada. Los equipos NO se enviaron al inventario.', true);
            } else {
                const refI=db.collection('inventario').doc('datos');
                const _modifInv = (recs, data)=>{
                    const bod=(data.bodegas||[]).find(b=>String(b.id)===String(bodegaId));
                    const etiqueta=retira==='si'?'Retiro':'Recogida';
                    recuperados.forEach((it,k)=>{
                        recs.push({
                            id:(Date.now()+k).toString(),
                            bodegaId:bodegaId, bodegaNombre:bod?bod.nombre:'',
                            nom:it.nom, cant:it.cant, tipo:'usado', unidad:'unidad',
                            origen:`${etiqueta}: ${o.cliente||'cliente'}${o.cedula?' ('+o.cedula+')':''}`,
                            snes: it.snes||[],
                            fecha:new Date().toLocaleDateString(),
                            estado:'pendiente',
                            obs:`${etiqueta} por técnico ${TEC.nombre}`
                        });
                    });
                };
                if(MODO_EMERGENCIA){
                    await _actualizarInventarioSinLeer('recuperados', _modifInv);
                } else {
                    await db.runTransaction(async tx=>{
                        const snap=await tx.get(refI);
                        if(!snap.exists) throw new Error('No se encontró el inventario');
                        const data=snap.data();
                        const recs=data.recuperados||[];
                        _modifInv(recs, data);
                        tx.update(refI, { recuperados: recs });
                    });
                }
            }
        }

        const resumen=`${recuperados.length} recuperado(s)${noDevueltos.length?`, ${noDevueltos.length} no devuelto(s)`:''}`;
        showToast(retira==='si'
            ? `✅ Retiro finalizado (${resumen}). El cliente quedará Retirado.`
            : `✅ Recogida finalizada (${resumen}).`);
        _ocultarGuardando();
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); _ocultarGuardando(); }
}
window.confirmarFinalizarRecogida=confirmarFinalizarRecogida;

// ════════════════════════════════════════════════════════════
// FASE B — Material gastado por el técnico (de su cuadrilla)
// El técnico se enlaza a su cuadrilla por CÉDULA (TEC.documento).
// El gasto queda PENDIENTE; no descuenta stock (eso lo confirma la bodega).
// ════════════════════════════════════════════════════════════
let _cuadrillaTec=null;        // cuadrilla del inventario que corresponde al técnico
let _matElegidos=[];           // material que el técnico marca como gastado

// Busca en el inventario la cuadrilla del técnico (por cédula). Devuelve {cuad, bodega} o null.
async function _buscarCuadrillaDelTecnico(){
    try{
        const snap=await db.collection('inventario').doc('datos').get();
        if(!snap.exists) return null;
        const data=snap.data();
        const ced=String(TEC.documento||'').trim();
        if(!ced) return null;
        const cuads=data.cuadrillas||[];
        // Buscar la cuadrilla que tenga un técnico con esta cédula
        const cuad=cuads.find(c=>(c.tecnicos||[]).some(t=>String(t.cedula||'').trim()===ced));
        if(!cuad) return null;
        const bodega=(data.bodegas||[]).find(b=>String(b.id)===String(cuad.bodegaId));
        return { cuad, bodega };
    }catch(e){ console.warn('buscarCuadrillaDelTecnico',e); return null; }
}

// ════════════════════════════════════════════════════════════════
// DEVOLUCIÓN DE MATERIAL del técnico a la bodega.
// El técnico devuelve material (a veces dañado). Llega a INVENTARIO → sección
// "♻️ Recuperados" como PENDIENTE, para que el jefe de bodega decida:
// si está bueno lo integra a la bodega; si está dañado lo manda a Equipos Dañados.
// ════════════════════════════════════════════════════════════════
async function modalDevolverMaterial(){
    const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalDevol';
    bg.innerHTML=`<div class="modal"><h3>📦 Devolver material</h3><div class="center"><div class="spin"></div><div>Buscando tu cuadrilla...</div></div></div>`;
    document.body.appendChild(bg);

    const info=await _buscarCuadrillaDelTecnico();
    if(!info || !info.cuad){
        bg.querySelector('.modal').innerHTML=`<h3>📦 Devolver material</h3>
            <p style="color:var(--muted);font-size:0.88rem;">No encontré tu cuadrilla en el inventario (se busca por tu cédula). Pídele a la bodega que te asocie a una cuadrilla.</p>
            <button class="btn btn-ghost btn-block" onclick="document.getElementById('modalDevol').remove()">Cerrar</button>`;
        return;
    }
    _cuadrillaTec=info.cuad;
    const mats=(info.cuad.materiales||[]).filter(x=>x.cantidad>0);
    const opts=mats.map((mt,i)=>`<option value="${i}">${mt.nombre} — tienes: ${mt.cantidad} ${mt.unidad||''}</option>`).join('');

    bg.querySelector('.modal').innerHTML=`<h3>📦 Devolver material a bodega</h3>
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:10px;">Cuadrilla: <strong>${info.cuad.nombre}</strong>. El material devuelto llega a la bodega como <strong>pendiente</strong>. El jefe de bodega decide si entra al inventario (bueno) o a equipos dañados.</p>
        ${mats.length ? `
        <label>Material a devolver</label>
        <select id="devSel" onchange="_onDevSelChange()">${opts}</select>
        <label style="margin-top:8px;">Cantidad</label>
        <input id="devCant" type="number" value="1" min="1" oninput="_onDevSelChange()">
        <div id="devSnArea" style="margin-top:8px;"></div>
        <label style="margin-top:8px;">Estado del material</label>
        <select id="devEstado">
            <option value="por_confirmar">🔵 Por confirmar (la bodega revisa)</option>
            <option value="danado">🔴 Está dañado</option>
        </select>
        <label style="margin-top:8px;">Observación (opcional)</label>
        <textarea id="devObs" rows="2" placeholder="Ej: llegó dañado del cliente, no enciende"></textarea>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-ok btn-block" onclick="_confirmarDevolverMaterial()">📦 Devolver a bodega</button>
            <button class="btn btn-ghost" onclick="document.getElementById('modalDevol').remove()">Cancelar</button>
        </div>
        ` : `<div style="background:rgba(245,158,11,0.1);border-radius:8px;padding:12px;color:#fbbf24;font-size:0.84rem;">Tu cuadrilla no tiene material para devolver.</div>
        <button class="btn btn-ghost btn-block" style="margin-top:10px;" onclick="document.getElementById('modalDevol').remove()">Cerrar</button>`}`;
    setTimeout(()=>{ try{ _onDevSelChange(); }catch(e){} }, 100);
}
window.modalDevolverMaterial=modalDevolverMaterial;

// ── PARCHE v2: si el material tiene SN, se ESCOGEN de la lista (no se digitan a mano) ──
function _onDevSelChange(){
    const sel=document.getElementById('devSel'); const cantEl=document.getElementById('devCant');
    const area=document.getElementById('devSnArea');
    if(!sel||!cantEl||!area||!_cuadrillaTec) return;
    const mats=(_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0);
    const mat=mats[parseInt(sel.value)];
    if(!mat){ area.innerHTML=''; return; }
    const snes=Array.isArray(mat.snes)?mat.snes.filter(s=>s):[];
    const cant=parseInt(cantEl.value)||1;
    if(snes.length===0){
        area.innerHTML=`<label>Serial(es) (opcional, separados por coma)</label>
            <input id="devSN" type="text" placeholder="Ej: SN123, SN456">
            <p style="font-size:0.72rem;color:var(--muted);margin:2px 0 0;">Este material no tiene seriales registrados en tu cuadrilla.</p>`;
    } else {
        area.innerHTML=`<label>Selecciona los seriales que devuelves — necesitas <strong>${cant}</strong>:</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;background:rgba(0,0,0,0.1);padding:8px;border-radius:8px;max-height:120px;overflow-y:auto;">
            ${snes.map(sn=>`<label style="display:flex;align-items:center;gap:4px;font-size:0.78rem;background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:6px;cursor:pointer;">
                <input type="checkbox" class="devSnChk" value="${sn}" style="width:auto;margin:0;"> ${sn}
            </label>`).join('')}</div>`;
    }
}
window._onDevSelChange=_onDevSelChange;

async function _confirmarDevolverMaterial(){
    if(_guardandoTec){ console.warn('Guardado en curso, clic ignorado.'); return; }
    if(!_cuadrillaTec){ alert('No hay cuadrilla cargada.'); return; }
    const sel=document.getElementById('devSel'); if(!sel) return;
    const mats=(_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0);
    const mat=mats[parseInt(sel.value)];
    if(!mat){ alert('Selecciona un material.'); return; }
    const cant=parseInt(document.getElementById('devCant').value)||0;
    if(cant<=0){ alert('Indica una cantidad válida.'); return; }
    if(cant>mat.cantidad){ alert(`Solo tienes ${mat.cantidad} de ${mat.nombre}.`); return; }
    // PARCHE v2: si el material tiene seriales, deben marcarse exactamente "cant" casillas.
    const snesDelMat=Array.isArray(mat.snes)?mat.snes.filter(s=>s):[];
    let snes=[];
    if(snesDelMat.length>0){
        snes=Array.from(document.querySelectorAll('.devSnChk:checked')).map(c=>c.value);
        if(snes.length!==cant){ alert(`Este material tiene seriales (SN). Marca exactamente ${cant} serial(es) para los ${cant} que devuelves.\n\nMarcaste: ${snes.length}`); return; }
    } else {
        const snRaw=((document.getElementById('devSN')&&document.getElementById('devSN').value)||'').trim();
        snes=snRaw?snRaw.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean):[];
    }
    const estado=document.getElementById('devEstado').value;
    const obs=(document.getElementById('devObs').value||'').trim();

    const m=document.getElementById('modalDevol'); if(m) m.remove();
    _mostrarGuardando('Devolviendo material...');
    try{
        const refI=db.collection('inventario').doc('datos');
        const bodegaId=_cuadrillaTec.bodegaId;
        const snap=await refI.get();
        if(!snap.exists) throw new Error('No se encontró el inventario');
        const data=snap.data();
        const bod=(data.bodegas||[]).find(b=>String(b.id)===String(bodegaId));
        const etiqueta = estado==='danado' ? '🔴 DAÑADO' : 'Por confirmar';

        if(estado==='danado'){
            // Va directo a Equipos Dañados (el jefe de bodega ya lo ve clasificado como dañado)
            if(!Array.isArray(data.equiposDanados)) data.equiposDanados=[];
            data.equiposDanados.push({
                id:Date.now().toString(),
                fecha:new Date().toLocaleDateString(),
                fechaISO:new Date().toISOString(),
                clienteNombre:`(Devolución técnico ${TEC.nombre})`,
                equipoNombre:mat.nombre,
                snDanado:snes.join(', '),
                cantidadDanada:cant,
                equipoNuevo:'—',
                snNuevo:'',
                bodegaId:bodegaId, bodegaNombre:bod?bod.nombre:'',
                motivo:'Devolución de material dañado',
                observaciones:obs||`Devuelto por técnico ${TEC.nombre}`,
                origen:`Devolución técnico ${TEC.nombre}`
            });
            await refI.update({ equiposDanados: data.equiposDanados });
        } else {
            // Va a Recuperados como pendiente (el jefe de bodega decide bueno/dañado)
            if(!Array.isArray(data.recuperados)) data.recuperados=[];
            data.recuperados.push({
                id:Date.now().toString(),
                bodegaId:bodegaId, bodegaNombre:bod?bod.nombre:'',
                nom:mat.nombre, cant:cant, tipo:'usado', unidad:mat.unidad||'unidad',
                origen:`Devolución técnico ${TEC.nombre}`,
                snes:snes,
                fecha:new Date().toLocaleDateString(),
                estado:'pendiente',
                obs:obs||`Material devuelto por ${TEC.nombre} para revisión`
            });
            await refI.update({ recuperados: data.recuperados });
        }
        showToast(`✅ Material devuelto (${etiqueta}). La bodega lo revisará.`);
        _cuadrillaTec=null;
        _ocultarGuardando();
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); _ocultarGuardando(); }
}
window._confirmarDevolverMaterial=_confirmarDevolverMaterial;

// ════════════════════════════════════════════════════════════
// FASE E — Cambio de equipo
// El técnico indica el equipo RETIRADO (bueno→Recuperados / dañado→Dañados)
// y el equipo NUEVO instalado. Todo queda pendiente para la bodega.
// ════════════════════════════════════════════════════════════
async function modalCambioEquipo(ordenId){
    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalCambio';
    bg.innerHTML=`<div class="modal"><h3>🔄 Cambio de equipo</h3><div class="center"><div class="spin"></div><div>Cargando datos...</div></div></div>`;
    document.body.appendChild(bg);

    // Cargar inventario de clientes (para los equipos que YA tiene el cliente) y la cuadrilla del técnico
    if(!_invCargado) await _cargarInventarioClientes();
    const cli=_buscarClienteInv(o);
    const res=await _buscarCuadrillaDelTecnico();
    _cuadrillaTec = res ? res.cuad : null;

    const m=document.getElementById('modalCambio'); if(!m) return;

    // --- Equipos que el cliente YA tiene (para el retirado) ---
    const equiposCliente=(cli&&Array.isArray(cli.equipos))?cli.equipos.filter(e=>e.nombre):[];
    const opcRetiro = equiposCliente.map((e,i)=>{
        const sn=(e.snes&&e.snes.length)?e.snes.join(', '):'sin SN';
        return `<option value="${i}">${e.nombre} — SN: ${sn}</option>`;
    }).join('') + '<option value="manual">✏️ Otro equipo (escribir manual)</option>';

    // --- Equipos disponibles en la cuadrilla (para el nuevo) ---
    const stock=_cuadrillaTec ? (_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0) : [];
    const opcNuevo = stock.map((mt,i)=>`<option value="${i}">${mt.nombre} — ${mt.cantidad} ${mt.unidad||''}</option>`).join('');

    m.querySelector('.modal').innerHTML=`<h3>🔄 Cambio de equipo</h3>
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:10px;">Cuadrilla: <strong>${_cuadrillaTec?_cuadrillaTec.nombre:'(no encontrada)'}</strong></p>

        <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px;margin-bottom:10px;">
            <label>Equipo RETIRADO del cliente</label>
            ${equiposCliente.length
                ? `<select id="ceRetSel" onchange="_onRetiroChange()">${opcRetiro}</select>
                   <div id="ceRetManual" style="display:none;">
                       <label>Nombre del equipo</label><input id="ceRetNom" placeholder="Ej: Router, ONU">
                       <label>Serial</label><input id="ceRetSN" placeholder="SN del equipo">
                   </div>`
                : `<input id="ceRetNom" placeholder="Ej: Router, ONU">
                   <label>Serial (opcional)</label><input id="ceRetSN" placeholder="SN del equipo retirado">`}
            <label>¿En qué estado está?</label>
            <select id="ceRetEstado">
                <option value="bueno">🟢 Bueno (sirve, vuelve a bodega)</option>
                <option value="danado">🔴 Dañado (no sirve)</option>
            </select>
        </div>

        <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:8px;padding:10px;margin-bottom:10px;">
            <label>Equipo NUEVO instalado (de tu cuadrilla)</label>
            ${stock.length
                ? `<select id="ceNueSel" onchange="_onNuevoChange()">${opcNuevo}</select>
                   <div id="ceNueSNWrap"></div>`
                : `<div style="background:rgba(245,158,11,0.1);border-radius:8px;padding:10px;font-size:0.82rem;color:#fbbf24;">${_cuadrillaTec?'Tu cuadrilla no tiene equipos disponibles.':'No encontramos tu cuadrilla (se busca por cédula).'}</div>`}
        </div>

        <div style="display:flex;gap:8px;">
            <button class="btn btn-ok btn-block" onclick="_finalizarCambioEquipo('${ordenId}')">✅ Finalizar cambio</button>
            <button class="btn btn-ghost" onclick="document.getElementById('modalCambio').remove()">Cancelar</button>
        </div>`;
    bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); });

    // Guardar referencias para los handlers
    window._ceEquiposCliente=equiposCliente;
    window._ceStock=stock;
    _onNuevoChange(); // cargar SN del primer equipo nuevo
}
window.modalCambioEquipo=modalCambioEquipo;

// Cuando cambia el equipo retirado seleccionado: mostrar manual si eligió "otro"
function _onRetiroChange(){
    const sel=document.getElementById('ceRetSel');
    const man=document.getElementById('ceRetManual');
    if(!sel||!man) return;
    man.style.display = sel.value==='manual' ? 'block' : 'none';
}
window._onRetiroChange=_onRetiroChange;

// Cuando cambia el equipo nuevo: cargar su(s) SN de la cuadrilla
function _onNuevoChange(){
    const sel=document.getElementById('ceNueSel');
    const wrap=document.getElementById('ceNueSNWrap');
    if(!sel||!wrap) return;
    const stock=window._ceStock||[];
    const mat=stock[parseInt(sel.value)];
    if(!mat){ wrap.innerHTML=''; return; }
    const snes=mat.snes||[];
    if(snes.length>1){
        // Varios SN: dejar elegir cuál
        wrap.innerHTML=`<label>Serial instalado (elige cuál)</label>
            <select id="ceNueSN">${snes.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>`;
    } else if(snes.length===1){
        // Un solo SN: cargarlo automático (editable)
        wrap.innerHTML=`<label>Serial instalado</label><input id="ceNueSN" value="${snes[0]}">`;
    } else {
        // Sin SN registrado: campo libre
        wrap.innerHTML=`<label>Serial instalado (opcional)</label><input id="ceNueSN" placeholder="SN del equipo nuevo">`;
    }
}
window._onNuevoChange=_onNuevoChange;

async function _finalizarCambioEquipo(ordenId){
    if(_guardandoTec){ console.warn('Guardado en curso, clic ignorado.'); return; }
    // --- Equipo retirado ---
    let retNom='', retSN='';
    const retSel=document.getElementById('ceRetSel');
    if(retSel && retSel.value!=='manual'){
        const eq=(window._ceEquiposCliente||[])[parseInt(retSel.value)];
        if(eq){ retNom=eq.nombre; retSN=(eq.snes&&eq.snes.length)?eq.snes.join(', '):''; }
    } else {
        retNom=document.getElementById('ceRetNom')?document.getElementById('ceRetNom').value.trim():'';
        retSN=document.getElementById('ceRetSN')?document.getElementById('ceRetSN').value.trim():'';
    }
    const retEstado=document.getElementById('ceRetEstado').value;

    // --- Equipo nuevo (de la cuadrilla) ---
    const selEl=document.getElementById('ceNueSel');
    const nueSN=document.getElementById('ceNueSN')?document.getElementById('ceNueSN').value.trim():'';
    let nueNom='', equipoNuevoStock=null;
    if(selEl && _cuadrillaTec){
        const stock=(_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0);
        equipoNuevoStock=stock[parseInt(selEl.value)];
        if(equipoNuevoStock) nueNom=equipoNuevoStock.nombre;
    }

    if(!retNom && !nueNom){ alert('Indica al menos el equipo retirado o el instalado.'); return; }
    const m=document.getElementById('modalCambio'); if(m) m.remove();
    _mostrarGuardando('Finalizando cambio...');

    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const ofi=(DATA.oficinas||[]).find(x=>String(x.id)===String(o.oficinaId));
    const bodegaId=ofi?ofi.bodegaId:'';

    try{
        const refO=db.collection(COLECCION).doc(DOC_ID);
        await db.runTransaction(async tx=>{
            const snap=await tx.get(refO);
            const data=snap.data();
            const ordenes=data.ordenesTrabajo||[];
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            ordenes[idx].estado='finalizada';
            ordenes[idx].finalizada=Date.now();
            ordenes[idx].actualizada=Date.now();
            ordenes[idx].cambioEquipo={ retirado:{nom:retNom,sn:retSN,estado:retEstado}, instalado:{nom:nueNom,sn:nueSN} };
            tx.update(refO, { ordenesTrabajo: ordenes });
        });

        if(bodegaId || retNom || nueNom){
            const refI=db.collection('inventario').doc('datos');
            await db.runTransaction(async tx=>{
                const snap=await tx.get(refI);
                if(!snap.exists) throw new Error('No se encontró el inventario');
                const data=snap.data();
                const bodegas=data.bodegas||[];
                const bod=bodegas.find(b=>String(b.id)===String(bodegaId));

                if(retNom && bodegaId){
                    const snes=retSN?[retSN]:[];
                    if(retEstado==='bueno'){
                        const recuperados=data.recuperados||[];
                        recuperados.push({
                            id:Date.now().toString(), bodegaId, bodegaNombre:bod?bod.nombre:'',
                            nom:retNom, cant:1, tipo:'usado', unidad:'unidad',
                            origen:`Cambio equipo: ${o.cliente||'cliente'}`,
                            snes, fecha:new Date().toLocaleDateString(),
                            estado:'pendiente', obs:`Equipo retirado (bueno) por técnico ${TEC.nombre}`
                        });
                        tx.update(refI, { recuperados });
                    } else {
                        const danados=data.equiposDanados||[];
                        danados.push({
                            id:Date.now().toString(),
                            clienteId:o.clienteId||'', clienteNombre:o.cliente||'',
                            equipoNombre:retNom, snDanado:retSN, cantidadDanada:1,
                            equipoNuevo:nueNom, snNuevo:nueSN,

function _onMatSelChange(){
    const sel=document.getElementById('matSel'); const cantEl=document.getElementById('matCant');
    const area=document.getElementById('matSnArea');
    if(!sel||!cantEl||!area) return;
    const idx=parseInt(sel.value);
    const mat=(_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0)[idx];
    if(!mat){ area.innerHTML=''; return; }
    const snes = Array.isArray(mat.snes) ? mat.snes.filter(s=>s) : [];
    let cant=parseInt(cantEl.value)||1;
    // SN ya usados en _matElegidos para este material (no permitir repetir)
    const yaUsados = new Set();
    _matElegidos.filter(e=>e.nombre===mat.nombre).forEach(e=>{ (e.snes||[]).forEach(s=>yaUsados.add(s)); });
    const disponibles = snes.filter(s=>!yaUsados.has(s));

    if(snes.length === 0){
        area.innerHTML = `<p style="font-size:0.75rem;color:var(--muted);">Este material no tiene seriales (SN).</p>`;
    } else if(disponibles.length === 0){
        area.innerHTML = `<p style="font-size:0.78rem;color:#f59e0b;">Ya agregaste todos los seriales disponibles.</p>`;
    } else {
        const html = `<label style="font-size:0.78rem;margin-top:4px;">Seleccionar serial(es) — necesitas <strong>${cant}</strong>:</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;background:rgba(0,0,0,0.1);padding:8px;border-radius:8px;max-height:120px;overflow-y:auto;">
            ${disponibles.map(sn=>`<label style="display:flex;align-items:center;gap:4px;font-size:0.78rem;background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:6px;cursor:pointer;">
                <input type="checkbox" class="matSnChk" value="${sn}" style="margin:0;"> ${sn}
            </label>`).join('')}</div>`;
        area.innerHTML = html;
    }
}
window._onMatSelChange=_onMatSelChange;

function _agregarMaterial(){
    const sel=document.getElementById('matSel'); const cantEl=document.getElementById('matCant');
    if(!sel||!cantEl) return;
    const idx=parseInt(sel.value);
    const mat=(_cuadrillaTec.materiales||[]).filter(x=>x.cantidad>0)[idx];
    if(!mat) return;
    let cant=parseInt(cantEl.value)||1;
    if(cant<1) cant=1;
    // No permitir pasarse del stock de la cuadrilla (sumando lo ya agregado de ese material)
    const yaAgregado=_matElegidos.filter(e=>e.nombre===mat.nombre).reduce((s,e)=>s+e.cant,0);
    if(yaAgregado+cant>mat.cantidad){
        alert(`No puedes registrar más de lo que tu cuadrilla tiene.\n\n${mat.nombre}: disponible ${mat.cantidad}, ya agregaste ${yaAgregado}.`);
        return;
    }
    // Capturar SN seleccionados (si hay)
    const snesElegidos = Array.from(document.querySelectorAll('.matSnChk:checked')).map(c=>c.value);
    const snesDelMat = Array.isArray(mat.snes) ? mat.snes.filter(s=>s) : [];
    if(snesDelMat.length > 0){
        if(snesElegidos.length !== cant){
            alert(`Este material tiene seriales (SN). Debes marcar exactamente ${cant} serial(es) para los ${cant} que vas a gastar.\n\nMarcaste: ${snesElegidos.length}`);
            return;
        }
    }
    _matElegidos.push({ nombre:mat.nombre, cant:cant, unidad:mat.unidad||'', tipo:mat.tipo||'', snes:snesElegidos });
    cantEl.value=1;
    _renderMatLista();
    _onMatSelChange(); // refrescar SN disponibles
}
window._agregarMaterial=_agregarMaterial;

function _renderMatLista(){
    const c=document.getElementById('matLista'); if(!c) return;
    if(!_matElegidos.length){ c.innerHTML='<p style="font-size:0.8rem;color:var(--muted);">Aún no has agregado material.</p>'; return; }
    c.innerHTML=_matElegidos.map((e,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.05);border-radius:8px;padding:8px 10px;margin-bottom:6px;">

        <button class="btn btn-sm btn-ghost" onclick="_matElegidos.splice(${i},1);_renderMatLista();_onMatSelChange();">✕</button>

}

async function _finalizarConMaterial(ordenId){
    if(_guardandoTec){ console.warn('Guardado en curso, clic ignorado.'); return; }
    const hay=document.getElementById('matHay') ? document.getElementById('matHay').value : 'no';
    const destino=document.getElementById('matDestino') ? document.getElementById('matDestino').value : 'cliente';
    if(hay==='si' && _matElegidos.length===0){
        if(!confirm('No agregaste ningún material. ¿Finalizar sin registrar material?')) return;
    }
    const m=document.getElementById('modalMat'); if(m) m.remove();
    _mostrarGuardando('Finalizando orden...');

    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const registrarMat = (hay==='si' && _matElegidos.length>0 && _cuadrillaTec);
    const esInstalacion = (o && o.tipo==='instalacion');

    try{
        // 1) Finalizar la orden en oficinas_sistema
        const refO=db.collection(COLECCION).doc(DOC_ID);
        await db.runTransaction(async tx=>{
            const snap=await tx.get(refO);
            const data=snap.data();
            const ordenes=data.ordenesTrabajo||[];
            const idx=ordenes.findIndex(x=>x.id===ordenId);
            if(idx<0) throw new Error('La orden ya no existe');
            ordenes[idx].estado='finalizada';
            ordenes[idx].finalizada=Date.now();
            ordenes[idx].actualizada=Date.now();
            if(registrarMat){
                ordenes[idx].materialGastado={ destino, items:[..._matElegidos] };
            }
            tx.update(refO, { ordenesTrabajo: ordenes });
        });

        // 2) Escribir en el INVENTARIO: consumo pendiente (material) y/o registro de instalación
        if(registrarMat || esInstalacion){
            const refI=db.collection('inventario').doc('datos');
            await db.runTransaction(async tx=>{
                const snap=await tx.get(refI);
                if(!snap.exists) throw new Error('No se encontró el inventario');
                const data=snap.data();

                // 2a) Material gastado → consumo pendiente (sin descontar aún)
                if(registrarMat){
                    const consumos=data.consumosPendientes||[];
                    consumos.push({
                        id:Date.now().toString(),
                        cuadrillaId:_cuadrillaTec.id,
                        cuadrillaNombre:_cuadrillaTec.nombre,
                        bodegaId:_cuadrillaTec.bodegaId,
                        tecnicoCedula:String(TEC.documento||''),
                        tecnicoNombre:TEC.nombre,
                        destino:destino,
                        destinoDetalle: destino==='cliente' ? (o&&o.cliente?o.cliente:'') : 'Mantenimiento de red',
                        ordenId:ordenId,
                        ordenTipo:o?o.tipo:'',
                        items:[..._matElegidos],
                        fecha:new Date().toLocaleDateString(),
                        estado:'pendiente'
                    });
                    tx.update(refI, { consumosPendientes: consumos });
                }

                // 2b) Si es INSTALACIÓN → crear registro en inventario.instalaciones (Fase H)
                // El admin lo verá en el módulo Instalaciones y podrá crear el cliente con un botón.
                if(esInstalacion){
                    const instalaciones=data.instalaciones||[];
                    instalaciones.push({
                        id:(Date.now()+2).toString(),
                        cuadrillaId:_cuadrillaTec?_cuadrillaTec.id:'',
                        cuadrilla:_cuadrillaTec?_cuadrillaTec.nombre:'',
                        fecha:new Date().toISOString().split('T')[0],
                        cliente:o.cliente||'',
                        direccion:o.direccion||'',
                        telefono:o.telefono||'',
                        observaciones:'Instalación desde orden de trabajo',
                        tipo:'Instalación nueva',
                        bodegaId:_cuadrillaTec?_cuadrillaTec.bodegaId:'',
                        mats:_matElegidos.map(it=>({ nom:it.nombre, cant:it.cant, unidad:it.unidad||'Und', tipo:it.tipo||'nuevo', snes:Array.isArray(it.snes)?it.snes:[] })),
                        reg:new Date().toISOString(),
                        origenOrdenId:ordenId
                    });
                    tx.update(refI, { instalaciones: instalaciones });
                }
            });
            showToast(esInstalacion
                ? '✅ Instalación finalizada y registrada en el inventario.'
                : '✅ Orden finalizada y material registrado (pendiente de confirmar por bodega)');
            _matElegidos=[]; _cuadrillaTec=null;
            _ocultarGuardando();
            return;
        }
        showToast('✅ Orden finalizada');
        _matElegidos=[]; _cuadrillaTec=null;
        _ocultarGuardando();
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); _ocultarGuardando(); }
}
window._finalizarConMaterial=_finalizarConMaterial;

async function guardarClave(){
    const err=document.getElementById('ck_err');
    const actual=document.getElementById('ck_actual').value.trim();
    const nueva=document.getElementById('ck_nueva').value.trim();
    const nueva2=document.getElementById('ck_nueva2').value.trim();
    err.textContent='';
    if(!actual||!nueva||!nueva2){ err.textContent='Completa todos los campos.'; return; }
    if(nueva!==nueva2){ err.textContent='La nueva clave no coincide.'; return; }
    if(nueva.length<3){ err.textContent='La clave debe tener al menos 3 caracteres.'; return; }
    try{
        const ref=db.collection(COLECCION).doc(DOC_ID);
        let ok=false;
        await db.runTransaction(async tx=>{
            const snap=await tx.get(ref);
            if(!snap.exists) throw new Error('No existe el documento');
            const data=snap.data();
            const empleados=data.rrhh_empleados||[];
            const idx=empleados.findIndex(e=>String(e.id)===String(TEC.id));
            if(idx<0) throw new Error('Tu usuario ya no existe');
            if(String(empleados[idx].tecnicoPass||'').trim()!==actual){ throw new Error('La clave actual no es correcta'); }
            empleados[idx].tecnicoPass=nueva;
            tx.update(ref, { rrhh_empleados: empleados });
            ok=true;
        });
        if(ok){
            try{ sessionStorage.setItem('tec_session', JSON.stringify({doc:TEC.documento, pass:nueva})); }catch(e){}
            const m=document.getElementById('modalClave'); if(m) m.remove();
            showToast('✅ Clave actualizada');
        }
    }catch(e){ err.textContent=(e.message||e); }
}
window.guardarClave=guardarClave;

async function _cargarInventarioClientes(){
    try{
        const snap=await db.collection('inventario').doc('datos').get();
        const data=snap.exists?snap.data():{};
        _invBodegas=data.bodegas||[];
        // Clientes: pueden estar embebidos o en chunks
        let clientes=data.clientes||[];
        if(clientes.length===0){
            try{
                const idx=await db.collection('inventario').doc('clientes_index').get();
                if(idx.exists){
                    const n=idx.data().numChunks||0;
                    for(let i=0;i<n;i++){
                        const cs=await db.collection('inventario').doc('clientes_'+i).get();
                        if(cs.exists) clientes=clientes.concat(cs.data().clientes||[]);
                    }
                }
            }catch(e){ console.warn('chunks inv',e); }
        }
        _invClientes=clientes;
        _invCargado=true;
    }catch(e){ console.warn('cargar inventario clientes',e); _invCargado=true; }
}

function _norm(s){ return (s||'').toString().toLowerCase().trim().replace(/\s+/g,' '); }
function _buscarClienteInv(orden){
    const ced=_norm(orden.cedula);
    const nom=_norm(orden.cliente);
    // 1) por cédula
    if(ced){ const m=_invClientes.find(c=>_norm(c.cedula||c.documento)===ced); if(m) return m; }
    // 2) por nombre exacto
    if(nom){ const m=_invClientes.find(c=>_norm(c.nombre)===nom); if(m) return m; }
    // 3) por nombre parcial
    if(nom){ const m=_invClientes.find(c=>_norm(c.nombre).includes(nom)||nom.includes(_norm(c.nombre))); if(m) return m; }
    return null;
}

        <div style="border-top:1px solid var(--border);padding-top:12px;">
            <div style="font-weight:700;font-size:0.85rem;margin-bottom:8px;color:var(--accent);">➕ Agregar equipo que el cliente ya tenía</div>

            <label>Cantidad</label>
            <input id="aeCant" type="number" value="1" min="1">
            <label>Estado</label>
            <select id="aeTipo"><option value="usado">🟡 Usado</option><option value="nuevo">🟢 Nuevo</option></select>
            <label>Seriales / SN (uno por línea, opcional)</label>
            <textarea id="aeSN" rows="2" placeholder="SN12345"></textarea>
            <div style="display:flex;gap:8px;margin-top:6px;">
                <button class="btn btn-primary btn-block" onclick="agregarEquipoCliente('${ordenId}')">Agregar equipo</button>
                <button class="btn btn-ghost" onclick="document.getElementById('modalEq').remove()">Cerrar</button>
            </div>
        </div>
    </div>`;
}

async function agregarEquipoCliente(ordenId){
    const o=(DATA.ordenesTrabajo||[]).find(x=>x.id===ordenId);
    const nom=document.getElementById('aeNom').value.trim();
    const cant=parseInt(document.getElementById('aeCant').value)||1;
    const tipo=document.getElementById('aeTipo').value;
    const snRaw=document.getElementById('aeSN').value.trim();
    if(!nom){ alert('Escribe el nombre del equipo.'); return; }
    const m=document.getElementById('modalEq'); if(m) m.remove();
    showToast('Guardando equipo...');

    const fechaStr=new Date().toLocaleDateString('es-CO');
    const nuevoEquipo={
        nombre:nom, cantidad:cant, unidad:'und', tipo:tipo,
        snes: snRaw?snRaw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean):[],
        estado:'Activo',
        pendienteConfirmar:true,  // el jefe de bodega lo valida
        notaOrigen:`[${fechaStr}] Documentado por técnico ${TEC.nombre} (no descuenta bodega)`,
        fechaAgregado:fechaStr
    };

    try{
        const refI=db.collection('inventario').doc('datos');
        await db.runTransaction(async tx=>{
            const snap=await tx.get(refI);
            if(!snap.exists) throw new Error('No se encontró el inventario');
            const data=snap.data();
            // Dejar en bandeja de pendientes; el inventario lo aplica al cliente al confirmar
            // (el inventario maneja sus clientes en chunks, no aquí, por eso no escribimos el cliente directo)
            const bandeja=data.equiposPendientesTecnico||[];
            bandeja.push({
                id:'eqp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
                cliente:o.cliente, cedula:o.cedula, oficinaId:o.oficinaId,
                equipo:nuevoEquipo, fecha:fechaStr, tecnico:TEC.nombre, estado:'pendiente'
            });
            tx.update(refI, { equiposPendientesTecnico: bandeja });
        });

        // Relacionar también en OFICINAS: dejar registro en la orden
        const refO=db.collection(COLECCION).doc(DOC_ID);
        await db.runTransaction(async tx=>{
            const snap=await tx.get(refO);
            const data=snap.data();
            const ordenes=data.ordenesTrabajo||[];
            const oi=ordenes.findIndex(x=>x.id===ordenId);
            if(oi>=0){
                if(!Array.isArray(ordenes[oi].equiposAgregados)) ordenes[oi].equiposAgregados=[];
                ordenes[oi].equiposAgregados.push(nuevoEquipo);
                ordenes[oi].actualizada=Date.now();
                tx.update(refO, { ordenesTrabajo: ordenes });
            }
        });

        showToast('✅ Equipo enviado al inventario (pendiente de confirmar por bodega)');
    }catch(e){ console.error(e); showToast('❌ '+(e.message||e), true); }
}
window.agregarEquipoCliente=agregarEquipoCliente;

function showToast(msg, err){
    let t=document.getElementById('toast');
    if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
    t.style.background=err?'#7f1d1d':'#1e293b'; t.textContent=msg; t.style.display='block';
    clearTimeout(t._to); t._to=setTimeout(()=>{ t.style.display='none'; }, err?6000:2500);
}

// --- Asistente IA (Groq) ---
let _iaHistory=[];
function _iaGetKey(){ return localStorage.getItem('groq_api_key')||''; }
function _iaMsg(texto,quien){
    const chat=document.getElementById('iaChat'); if(!chat) return;
    const d=document.createElement('div');
    d.style.cssText = quien==='user'
        ? 'align-self:flex-end;background:#0ea5e9;color:#fff;padding:10px 12px;border-radius:12px;font-size:0.85rem;max-width:85%;white-space:pre-line;'
        : 'align-self:flex-start;background:white;padding:10px 12px;border-radius:12px;font-size:0.85rem;max-width:85%;white-space:pre-line;';
    d.textContent=texto;
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}
function _iaContexto(){
    // Le "enseñamos" a la IA cómo funciona la app del técnico, basado en el manual
    let ctx='Eres un asistente amable que ayuda a técnicos de campo de una empresa de internet (PROYECTOVISION) a usar su app móvil. Responde corto, claro y práctico, en español, con pasos numerados cuando aplique. Solo respondes sobre cómo usar la app. Si preguntan algo no relacionado, indícales amablemente que solo ayudas con la app.\n\nASÍ FUNCIONA LA APP DEL TÉCNICO:\n';
    MANUAL_TECNICO.forEach(s=>{ ctx+='\n'+s.titulo+': '+s.contenido+'\n'; });
    return ctx;
}
async function _iaEnviar(){
    const input=document.getElementById('iaInput');
    const pregunta=input?.value?.trim();
    if(!pregunta) return;
    const key=_iaGetKey();
    if(!key){
        const nueva=prompt('Para usar el asistente necesitas una clave gratuita de Groq.\n\nObtenla gratis en: console.groq.com/keys\n\nPega aquí tu clave (empieza con gsk_):');
        if(nueva && nueva.trim().startsWith('gsk_')){ localStorage.setItem('groq_api_key',nueva.trim()); }
        else { if(nueva!==null) alert('Clave inválida. Debe empezar con gsk_'); return; }
    }
    input.value='';
    _iaMsg(pregunta,'user');
    const sendBtn=document.getElementById('iaSend'); if(sendBtn) sendBtn.disabled=true;
    const chat=document.getElementById('iaChat');
    const typing=document.createElement('div');
    typing.id='iaTyping';
    typing.style.cssText='align-self:flex-start;background:white;padding:10px 12px;border-radius:12px;font-size:0.85rem;color:#94a3b8;font-style:italic;';
    typing.textContent='✨ Pensando...';
    if(chat){ chat.appendChild(typing); chat.scrollTop=chat.scrollHeight; }

    try{
        const messages=[{role:'system',content:_iaContexto()}];
        _iaHistory.forEach(h=>messages.push({role:h.role,content:h.text}));
        messages.push({role:'user',content:pregunta});
        const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+_iaGetKey()},
            body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,temperature:0.4,max_tokens:600})
        });
        typing.remove();
        if(resp.status===401){ _iaMsg('⚠️ La clave de Groq no es válida. Borra y vuelve a configurarla.','bot'); localStorage.removeItem('groq_api_key'); return; }
        if(resp.status===429){ _iaMsg('⚠️ Demasiadas preguntas seguidas. Espera unos segundos.','bot'); return; }
        if(!resp.ok){ _iaMsg('⚠️ Error de conexión. Revisa tu internet.','bot'); return; }
        const data=await resp.json();
        const r=data?.choices?.[0]?.message?.content||'(sin respuesta)';
        _iaHistory.push({role:'user',text:pregunta});
        _iaHistory.push({role:'assistant',text:r});
        if(_iaHistory.length>16) _iaHistory.splice(0,_iaHistory.length-16);
        _iaMsg(r,'bot');
    }catch(e){
        document.getElementById('iaTyping')?.remove();
        _iaMsg('⚠️ No se pudo conectar. Revisa tu internet e intenta de nuevo.','bot');
    }finally{
        if(sendBtn) sendBtn.disabled=false;
    }
}
window._iaEnviar=_iaEnviar;
