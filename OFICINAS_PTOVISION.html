<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ver campos de factura</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;max-width:900px;margin:0 auto;}
  h1{font-size:1.3rem;}
  .btn{display:block;width:100%;padding:14px;margin:10px 0;border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;}
  .b1{background:#0ea5e9;} .b2{background:#10b981;} .b3{background:#8b5cf6;}
  .out{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-top:14px;font-size:0.78rem;max-height:600px;overflow:auto;white-space:pre-wrap;word-break:break-word;font-family:monospace;}
  .ok{color:#6ee7b7;} .err{color:#fca5a5;}
</style>
</head>
<body>
  <h1>🧾 Ver campos de factura de WispHub</h1>
  <p>Dale clic a una cuenta. Te muestra UNA factura cruda para ver qué campos trae.</p>

  <button class="btn b1" onclick="probar('florencia')">🟦 Ver factura Florencia</button>
  <button class="btn b2" onclick="probar('cartagena')">🟩 Ver factura Cartagena</button>
  <button class="btn b3" onclick="probar('paujil')">🟪 Ver factura Paujil/Doncello</button>

  <div id="out" class="out">Esperando prueba...</div>

<script>
const URL_WORKER = "https://intermediario-wisphub.proyectovisions-a-s.workers.dev";
async function probar(cuenta){
  const out = document.getElementById('out');
  out.className = 'out';
  out.textContent = '⏳ Trayendo factura de ' + cuenta.toUpperCase() + '...';
  try {
    const r = await fetch(URL_WORKER + '/api/facturas/?limit=1', {
      headers: { 'X-Cuenta': cuenta }
    });
    const txt = await r.text();
    if (r.ok) {
      try {
        const data = JSON.parse(txt);
        out.className = 'out ok';
        const fact = data.results?.[0];
        // Traer más facturas para ver estados distintos
        const r2 = await fetch(URL_WORKER + '/api/facturas/?limit=100', { headers: { 'X-Cuenta': cuenta } });
        const data2 = await r2.json();
        const estados = {};
        (data2.results||[]).forEach(f=>{ const e=f.estado||'(vacío)'; estados[e]=(estados[e]||0)+1; });
        out.textContent = '✅ ' + cuenta.toUpperCase() + ' — Total facturas: ' + (data.count||'?') + '\n\n' +
          '═══════════════════════════════\n' +
          'ESTADOS encontrados (en 100 facturas):\n' +
          '═══════════════════════════════\n' +
          Object.entries(estados).map(([e,n])=>`  "${e}": ${n} facturas`).join('\n') +
          '\n\n═══════════════════════════════\n' +
          'CAMPOS de la primera factura:\n' +
          '═══════════════════════════════\n\n' +
          (fact ? Object.keys(fact).join('\n') : '(sin facturas)') +
          '\n\n═══════════════════════════════\n' +
          'CONTENIDO COMPLETO:\n' +
          '═══════════════════════════════\n\n' +
          JSON.stringify(fact || data, null, 2);
      } catch {
        out.className = 'out err';
        out.textContent = '⚠️ Respondió pero no es JSON:\n\n' + txt.substring(0,1000);
      }
    } else {
      out.className = 'out err';
      out.textContent = '❌ Error ' + r.status + ' en ' + cuenta + ':\n\n' + txt.substring(0,500);
    }
  } catch(e) {
    out.className = 'out err';
    out.textContent = '❌ Error de conexión: ' + e.message;
  }
}
</script>
</body>
</html>
