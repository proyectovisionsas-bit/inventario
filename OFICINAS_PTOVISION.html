<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINAS · PROYECTOVISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #10b981;
            --accent2: #06d6a0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text: #e2e8f0;
            --muted: #64748b;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        body.light-mode {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #e8edf3;
            --border: #cbd5e1;
            --accent: #059669;
            --accent2: #10b981;
            --danger: #dc2626;
            --warning: #d97706;
            --info: #2563eb;
            --text: #1e293b;
            --muted: #64748b;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        body.light-mode .login-screen,
        body.light-mode #login-screen {
            background: radial-gradient(ellipse at 30% 40%, rgba(16,185,129,0.15) 0%, transparent 60%),
                        linear-gradient(160deg,#e0f2f1 0%,#f0fdf4 60%,#ecfdf5 100%);
        }
        body.light-mode .bar-track { background:rgba(0,0,0,0.07); }
        body.light-mode .stat-card { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
        body.light-mode select.form-control option { background:#fff; color:#1e293b; }
        .theme-toggle {
            background:none; border:1.5px solid var(--border);
            border-radius:20px; padding:5px 12px; cursor:pointer;
            color:var(--text); font-size:0.82rem; transition:0.2s;
            display:flex; align-items:center; gap:6px;
        }
        .theme-toggle:hover { border-color:var(--accent); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .hidden { display:none!important; }

        /* ── LOGIN ── */
        #login-screen {
            display:flex; justify-content:center; align-items:center;
            min-height:100vh;
            background: radial-gradient(ellipse at 30% 40%, rgba(16,185,129,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 70%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        linear-gradient(160deg,#050b18 0%,#0a1628 60%,#0d1f3c 100%);
        }
        .login-card {
            background: rgba(17,24,39,0.95);
            border:1px solid var(--border);
            border-radius:20px;
            width:90%; max-width:420px;
            overflow:hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(16,185,129,0.1);
        }
        .login-banner {
            background: linear-gradient(135deg,#064e3b,#065f46,#047857);
            padding:32px 36px 28px;
            text-align:center;
            position:relative; overflow:hidden;
        }
        .login-banner::before {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at 70% 20%, rgba(16,185,129,0.3), transparent 60%);
        }
        .login-banner .icon { font-size:3rem; position:relative; z-index:1; }
        .login-banner h1 { font-size:1.5rem; font-weight:800; letter-spacing:2px; position:relative; z-index:1; margin-top:8px; }
        .login-banner p { font-size:0.8rem; opacity:0.7; position:relative; z-index:1; margin-top:4px; }
        .login-body { padding:28px 32px 32px; }
        .login-tabs { display:flex; background:rgba(255,255,255,0.04); border-radius:10px; padding:4px; gap:4px; margin-bottom:22px; }
        .login-tab { flex:1; padding:8px; text-align:center; cursor:pointer; font-weight:600; font-size:0.82rem; color:var(--muted); border-radius:7px; transition:0.2s; }
        .login-tab.active { background:var(--accent); color:#fff; box-shadow:0 2px 12px rgba(16,185,129,0.4); }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-control { width:100%; padding:10px 12px; background:rgba(255,255,255,0.05); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem; transition:0.2s; }
        .form-control:focus { border-color:var(--accent); outline:none; background:rgba(16,185,129,0.06); }
        .oficina-opt { padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:0.2s; font-size:0.88rem; background:rgba(255,255,255,0.03); }
        .oficina-opt:hover { border-color:var(--accent); background:rgba(16,185,129,0.07); }
        .oficina-opt.selected { border-color:var(--accent); background:rgba(16,185,129,0.12); }
        .btn-login { background:linear-gradient(135deg,#059669,#047857); color:#fff; border:none; width:100%; padding:12px; border-radius:9px; font-weight:700; font-size:0.95rem; cursor:pointer; transition:0.2s; margin-top:6px; letter-spacing:0.5px; }
        .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(5,150,105,0.4); }

        /* ── APP LAYOUT ── */
        #app { display:flex; flex-direction:column; min-height:100vh; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header h1 { font-size:1.1rem; font-weight:800; letter-spacing:1px; }
        .badge { padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.5px; }
        .badge-admin { background:rgba(245,158,11,0.2); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .badge-oficina { background:rgba(16,185,129,0.2); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .header-right { display:flex; align-items:center; gap:10px; }
        .btn { padding:8px 14px; border:none; border-radius:7px; cursor:pointer; font-weight:600; font-size:0.82rem; transition:0.2s; display:inline-flex; align-items:center; gap:5px; }
        .btn:hover { opacity:0.85; transform:translateY(-1px); }
        .btn-sm { padding:5px 10px; font-size:0.78rem; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text); }
        .btn-warning { background:var(--warning); color:#fff; }
        .btn-info { background:var(--info); color:#fff; }

        /* ── NAV ── */
        .nav { background:var(--surface); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:0 12px; gap:2px; }
        .nav-btn { padding:13px 16px; border:none; background:none; cursor:pointer; font-weight:600; font-size:0.82rem; color:var(--muted); border-bottom:3px solid transparent; white-space:nowrap; transition:0.2s; }
        .nav-btn:hover { color:var(--text); }
        .nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

        /* ── CONTAINER ── */
        .container { max-width:1400px; margin:0 auto; padding:20px 15px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
        .card-header h2 { font-size:1.1rem; font-weight:700; color:var(--text); }
        .card-header h2 span { font-size:0.75rem; color:var(--muted); font-weight:400; margin-left:6px; }

        /* ── DASHBOARD STATS ── */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:20px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; position:relative; overflow:hidden; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
        .stat-card.green::before { background:linear-gradient(90deg,#10b981,#06d6a0); }
        .stat-card.red::before { background:linear-gradient(90deg,#ef4444,#f87171); }
        .stat-card.blue::before { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
        .stat-card.yellow::before { background:linear-gradient(90deg,#f59e0b,#fcd34d); }
        .stat-card .label { font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; font-weight:600; }
        .stat-card .value { font-size:1.6rem; font-weight:800; }
        .stat-card.green .value { color:#10b981; }
        .stat-card.red .value { color:#ef4444; }
        .stat-card.blue .value { color:#3b82f6; }
        .stat-card.yellow .value { color:#f59e0b; }
        .stat-card .sub { font-size:0.75rem; color:var(--muted); margin-top:4px; }

        /* ── TABLES ── */
        .table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { background:var(--surface2); padding:10px 12px; text-align:left; color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; border-bottom:1px solid var(--border); }
        td { padding:10px 12px; border-bottom:1px solid rgba(30,45,69,0.5); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.02); }

        /* ── FORM ROWS ── */
        .form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
        .form-group-dark { margin-bottom:12px; }
        .form-group-dark label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
        select.form-control, input.form-control, textarea.form-control { background:rgba(255,255,255,0.05); color:var(--text); }
        select.form-control option { background:var(--surface); }
        textarea.form-control { resize:vertical; min-height:70px; }

        /* ── BADGES ── */
        .tag { padding:2px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; display:inline-block; }
        .tag-ing { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .tag-admin { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.4); }
        .tag-egr { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }
        .tag-ef { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .tag-banc { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); }
        .tag-efty { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }

        /* ── MODAL ── */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:15px; backdrop-filter:blur(4px); }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:800px; max-height:92vh; overflow-y:auto; animation:popIn 0.2s ease; }
        @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .modal-header h3 { font-size:1rem; font-weight:700; }
        .modal-body { padding:22px; }
        .modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
        .close-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--muted); line-height:1; }
        .close-btn:hover { color:var(--text); }

        /* ── INGRESO/EGRESO ── */
        .two-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        @media(max-width:700px){ .two-cols { grid-template-columns:1fr; } }
        .col-ing { border-left:3px solid var(--accent); padding-left:12px; }
        .col-egr { border-left:3px solid var(--danger); padding-left:12px; }
        .section-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:12px; }
        .section-title.ing { color:var(--accent); }
        .section-title.egr { color:var(--danger); }

        .money { font-family:monospace; font-weight:700; }
        .money.pos { color:#10b981; }
        .money.neg { color:#ef4444; }

        /* ── CAJA DISPLAY ── */
        .caja-display { background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(6,214,160,0.05)); border:1px solid rgba(16,185,129,0.25); border-radius:10px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
        .caja-display .label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
        .caja-display .amount { font-size:2rem; font-weight:900; color:#10b981; font-family:monospace; }

        /* ── LOADING ── */
        #loading-screen { display:flex; justify-content:center; align-items:center; height:100vh; background:var(--bg); flex-direction:column; gap:16px; }
        .spinner { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── SYNC ── */
        #syncStatus { position:fixed; bottom:14px; right:14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-size:0.76rem; display:flex; align-items:center; gap:7px; z-index:999; }
        .sync-dot { width:7px; height:7px; border-radius:50%; }
        .sync-ok { background:#10b981; } .sync-saving { background:#f59e0b; animation:pulse 1s infinite; } .sync-err { background:#ef4444; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

        /* ── DASHBOARD CHART BAR ── */
        .bar-chart { display:flex; flex-direction:column; gap:8px; }
        .bar-row { display:flex; align-items:center; gap:10px; font-size:0.8rem; }
        .bar-label { width:130px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
        .bar-track { flex:1; background:rgba(255,255,255,0.06); border-radius:4px; height:18px; position:relative; overflow:hidden; }
        .bar-fill { height:100%; border-radius:4px; transition:width 0.6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:0.68rem; font-weight:700; color:#fff; white-space:nowrap; }
        .bar-val { width:90px; text-align:right; font-family:monospace; font-size:0.78rem; color:var(--text); flex-shrink:0; }

        /* ── CLIENTES TAB ── */
        .cliente-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
        .cliente-info h4 { font-size:0.92rem; font-weight:700; margin-bottom:3px; }
        .cliente-info p { font-size:0.78rem; color:var(--muted); }
        .cliente-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }

        .motivo-tag { padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:700; }
        .motivo-moroso { background:rgba(239,68,68,0.15); color:#ef4444; }
        .motivo-retirado { background:rgba(100,116,139,0.2); color:#94a3b8; }
        .motivo-activo { background:rgba(16,185,129,0.15); color:#10b981; }

        /* ── REPORTES ── */
        .reporte-resumen { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:18px; }
        .reporte-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; }
        .reporte-item .r-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
        .reporte-item .r-val { font-size:1.3rem; font-weight:800; font-family:monospace; }

        /* ── ADMIN PANEL ── */
        .oficina-admin-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }

        /* ── NOTIF ── */
        .notif-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:8px; font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; }

        /* ── SEARCH ── */
        .search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .search-bar input { flex:1; min-width:180px; }

        @media(max-width:600px){ .header { flex-direction:column; gap:8px; } }
        /* ── RECORDATORIOS ─────────────────────────────────────────── */
        #recordatorio-popup { position:fixed; top:0; left:0; right:0; bottom:0; z-index:2000; display:none; justify-content:center; align-items:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); }
        #recordatorio-popup.show { display:flex; }
        .rec-popup-card { background:var(--surface); border:2px solid var(--warning); border-radius:16px; padding:30px; max-width:400px; width:90%; text-align:center; animation:popIn 0.25s ease; box-shadow:0 0 40px rgba(245,158,11,0.3); }
        .rec-popup-icon { font-size:3rem; margin-bottom:12px; }
        .rec-popup-title { font-size:1.1rem; font-weight:800; margin-bottom:8px; color:var(--warning); }
        .rec-popup-msg { font-size:0.9rem; color:var(--muted); line-height:1.6; margin-bottom:20px; }
        .rec-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .rec-item-info h4 { font-size:0.88rem; font-weight:700; margin-bottom:3px; }
        .rec-item-info p { font-size:0.72rem; color:var(--muted); }
        .rec-badge { padding:2px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; }
        .rec-diario { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .rec-semanal { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); }
        .rec-mensual { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .rec-unico { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }
        /* ── RRHH MODULE ─────────────────────────────────────────────── */
        .rrhh-view { display:none; }
        .rrhh-view.active { display:block; }
        .rrhh-nav { display:flex; gap:6px; margin-bottom:16px; background:rgba(255,255,255,0.04); padding:4px; border-radius:10px; width:fit-content; flex-wrap:wrap; }
        .rrhh-nav-btn { padding:8px 14px; border:none; border-radius:7px; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.2s; background:transparent; color:var(--muted); }
        .rrhh-nav-btn.active { background:var(--accent); color:#fff; }
        .rrhh-nav-btn:hover { color:var(--text); }
        .rrhh-status-badge { padding:4px 10px; border-radius:12px; font-size:0.72rem; font-weight:700; }
        .rrhh-active { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .rrhh-inactive { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }
        .rrhh-vacation { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); }
        .rrhh-license { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .rrhh-clock-panel { background:linear-gradient(135deg,#0f172a,#1e293b); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:18px; margin-bottom:16px; }
        .rrhh-clock-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
        .rrhh-clock-btn { padding:10px; border:none; border-radius:8px; font-weight:700; cursor:pointer; color:#fff; transition:0.2s; opacity:0.5; font-size:0.82rem; }
        .rrhh-clock-btn.active-btn { opacity:1; box-shadow:0 0 12px rgba(255,255,255,0.2); }
        .rrhh-clock-btn:disabled { opacity:0.25; cursor:not-allowed; }
        .rrhh-ts-ok { background:rgba(16,185,129,0.2); color:#10b981; border:1px solid rgba(16,185,129,0.3); padding:2px 6px; border-radius:4px; font-size:0.75rem; font-family:monospace; }
        .rrhh-ts-miss { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.3); padding:2px 6px; border-radius:4px; font-size:0.75rem; font-family:monospace; }

<script>
// ─── DB ──────────────────────────────────────────────────────────────────────
let DB = {
    oficinas: [],
    adminPass: 'admin123',
    solicitudes: [],
    logs: [],
    vendedores: [],
    metas: [],
    ventas: [],
    bonusTiers: [{clientes:10,bono:200000},{clientes:20,bono:350000}],
    empleados: [],
    transacciones: [],
    rrhhConfig: {salud:4, pension:4, interesesCesantias:12, diasVacaciones:15}
};
let USER = null;
let selOficinaLogin = null;

const CONCEPTOS_ING = [
    'Suscripción','Traslado','Control','Cables o Cargadores',
    'Reconexión','Compra de Equipo','Pago Servicio Internet + TV',
    'Instalación','Servicio Técnico','Retiro','Otro'
];
const FORMAS_PAGO = ['Efectivo','Efecty','Cta Bancolombia','Cruce de Cuentas'];
const CONCEPTOS_EGR = [
    'Servicios','Encomiendas','Arriendo','Nómina','Aseo','Celular',
    'Gasolina','Equipos de Oficina','Comisión por Venta','Adelanto','Yurany','Otro'
];
const ESTADO_CLIENTE = ['Activo','Moroso','Retirado','Suspendido'];
const PLANES = ['Internet 10Mb','Internet 20Mb','Internet 30Mb','Internet 50Mb',
    'Internet + TV Básico','Internet + TV Premium','Solo TV','Otro'];
const PROMOS = {
    'SIN_PROMOCION':{label:'Sin promoción',color:'#64748b'},
    '1_MES_GRATIS':{label:'1 Mes Gratis',color:'#10b981'},
    '6_MESES_GRATIS':{label:'6 Meses Gratis',color:'#3b82f6'},
    '12_MESES_GRATIS':{label:'12 Meses Gratis',color:'#f59e0b'},
    '50_PORCIENTO':{label:'50% Descuento',color:'#ef4444'},
    'OTRA':{label:'Otra',color:'#8b5cf6'}
};

const MOTIVOS_NO_PAGO = ['Falta de dinero','Viaje','Problemas con el servicio',
    'Cambio de operador','Desconoce deuda','Sin contacto','Otro'];

function fmt(n){ return 'COP $' + (n||0).toLocaleString('es-CO'); }
function fmtShort(n){ return '$'+(n||0).toLocaleString('es-CO'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function now(){ return new Date().toISOString(); }
function hoy(){ return new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'}); }
function mesActual(){ return new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long'}); }
function dia(){ return new Date().getDate(); }

function showSync(t,msg){
    const d=document.getElementById('syncDot'),s=document.getElementById('syncText');
    if(!d) return;
    document.getElementById('syncStatus').style.display='flex';
    d.className='sync-dot sync-'+t; s.textContent=msg;
}

// ─── FIREBASE ───────────────────────────────────────────────────────────────
let db = null;
const DOC_ID = 'main'; // documento único en colección "oficinas_sistema"

async function save(){
    if(!db){ showSync('err','Sin conexión Firebase'); return; }
    showSync('saving','Guardando...');
    try{
        await db.collection('oficinas_sistema').doc(DOC_ID).set(DB);
        showSync('ok','Guardado ✓');
    }catch(e){ showSync('err','Error al guardar'); console.error(e); }
}

async function load(){
    if(!db) return;
    try{
        const snap = await db.collection('oficinas_sistema').doc(DOC_ID).get();
        if(snap.exists){ Object.assign(DB, snap.data()); }
    }catch(e){ console.error('Error cargando:', e); }
}

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function switchLogin(t){
    document.querySelectorAll('.login-tab').forEach((x,i)=>{
        x.classList.toggle('active', (t==='admin'&&i===0)||(t==='oficina'&&i===1));
    });
    document.getElementById('login-admin-sec').classList.toggle('hidden', t!=='admin');
    document.getElementById('login-oficina-sec').classList.toggle('hidden', t!=='oficina');
    if(t==='oficina') renderLoginOficinas();
}

function renderLoginOficinas(){
    const list = document.getElementById('loginOficinaList');
    if(!list) return;
    list.innerHTML = DB.oficinas.length
        ? DB.oficinas.map(o=>`<div class="oficina-opt" onclick="selLoginOficina(this,'${o.id}')">
            🏢 <strong>${o.nombre}</strong><br><small style="color:var(--muted)">${o.ciudad||''}</small></div>`).join('')
        : '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:10px;">Sin oficinas registradas</p>';
}

function selLoginOficina(el,id){
    document.querySelectorAll('.oficina-opt').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected'); selOficinaLogin=id;
}

function doLogin(type){
    if(type==='admin'){
        if(document.getElementById('passAdmin').value!==DB.adminPass) return alert('❌ Contraseña incorrecta');
        USER={role:'admin'};
    } else {
        if(!selOficinaLogin) return alert('❌ Seleccione una oficina');
        const o=DB.oficinas.find(x=>x.id===selOficinaLogin);
        if(!o||document.getElementById('passOficina').value!==o.password) return alert('❌ Contraseña incorrecta');
        USER={role:'oficina', id:o.id, nombre:o.nombre};
    }
    enterApp();
}

function enterApp(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.remove('hidden');
    applyRoles(); setupNav(); navigate('dash');
    setTimeout(applyStoredTheme,50);
    setTimeout(iniciarMonitorRecordatorios,1000);
    setInterval(()=>{
        const c=document.getElementById('clock');
        if(c) c.textContent=new Date().toLocaleTimeString('es-CO');
    },1000);
}

function applyRoles(){
    const b=document.getElementById('userBadge');
    if(USER.role==='admin'){ b.textContent='ADMIN'; b.className='badge badge-admin'; }
    else { b.textContent=USER.nombre; b.className='badge badge-oficina'; }
    document.querySelectorAll('.admin-only').forEach(e=>e.style.display=USER.role==='admin'?'':'none');
    document.querySelectorAll('.oficina-only').forEach(e=>e.style.display=USER.role==='oficina'?'':'none');
}

function setupNav(){
    document.querySelectorAll('.nav-btn').forEach(btn=>{
        if(btn.classList.contains('admin-only')&&USER.role!=='admin'){ btn.style.display='none'; return; }
        btn.onclick=()=>navigate(btn.dataset.tab);
    });
}

function navigate(tab){
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    const renders = { dash:renderDash, registro:renderRegistro, clientes:renderClientes, reportes:renderReportes, vendedores:renderVendedores, incentivos:renderIncentivos, ventas:renderVentas2, pagos_admin:renderPagosAdmin, prestamos:renderPrestamos, rrhh:renderRRHH, administracion:renderAdmin };
    if(renders[tab]) renders[tab]();
}

function toggleTheme(){
    const isLight=document.body.classList.toggle('light-mode');
    const btn=document.getElementById('themeBtn');
    if(btn) btn.textContent=isLight?'🌑 Nocturno':'🌙 Nocturno';
    if(btn) btn.style.background=isLight?'rgba(5,150,105,0.1)':'';
    localStorage.setItem('pv_theme',isLight?'light':'dark');
}

function applyStoredTheme(){
    const t=localStorage.getItem('pv_theme');
    if(t==='light'){
        document.body.classList.add('light-mode');
        const btn=document.getElementById('themeBtn');
        if(btn) btn.textContent='🌑 Nocturno';
    }
}

function doLogout(){
    USER=null; selOficinaLogin=null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login-screen').style.display='flex';
    if(document.getElementById('passAdmin')) document.getElementById('passAdmin').value='';
    if(document.getElementById('passOficina')) document.getElementById('passOficina').value='';
    renderLoginOficinas();
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getOficina(id){ return DB.oficinas.find(o=>o.id===(id||USER?.id)); }
function currentOficinas(){ return USER?.role==='admin' ? DB.oficinas : DB.oficinas.filter(o=>o.id===USER.id); }
function getMovimientosOficina(oid, tipo='ambos'){
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o||!o.movimientos) return [];
    if(tipo==='ing') return o.movimientos.filter(m=>m.tipo==='ingreso');
    if(tipo==='egr') return o.movimientos.filter(m=>m.tipo==='egreso');
    return o.movimientos;
}
function sumOficina(oid, tipo){
    return getMovimientosOficina(oid,tipo).reduce((s,m)=>s+parseFloat(m.valor||0),0);
}
function getMesMovs(oid){
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o?.movimientos) return [];
    return o.movimientos.filter(m=>{
        const d=new Date(m.fecha);
        return d.getMonth()===mes && d.getFullYear()===año;
    });
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDash(){
    const content=document.getElementById('appContent');
    const oficinas = currentOficinas();

    // Totales generales del mes
    const mesIng = oficinas.reduce((s,o)=>{
        return s + getMesMovs(o.id).filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
    },0);
    const mesEgr = oficinas.reduce((s,o)=>{
        return s + getMesMovs(o.id).filter(m=>m.tipo==='egreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
    },0);
    const totalClientes = oficinas.reduce((s,o)=>(s+(o.clientes?.length||0)),0);
    const clientesActivos = oficinas.reduce((s,o)=>(s+(o.clientes?.filter(c=>c.estado==='Activo').length||0)),0);

    // Desglose ingresos por forma de pago (mes)
    let formasPago = {};
    FORMAS_PAGO.forEach(f=>formasPago[f]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='ingreso').forEach(m=>{
            if(formasPago[m.forma]!==undefined) formasPago[m.forma]+=parseFloat(m.valor||0);
        });
    });
    const maxFP = Math.max(...Object.values(formasPago),1);

    // Desglose por categoría (Efectivo / Efecty / Bancario) para ingresos y egresos
    const _ef=['Efectivo'], _efty=['Efecty'], _bco=['Cta Bancolombia','Transferencia','Cruce de Cuentas'];
    const calcMes=(tipo,formas)=>oficinas.reduce((s,o)=>s+getMesMovs(o.id).filter(m=>m.tipo===tipo&&formas.includes(m.forma)).reduce((a,m)=>a+parseFloat(m.valor||0),0),0);
    const dasIngEf=calcMes('ingreso',_ef), dasEgrEf=calcMes('egreso',_ef);
    const dasIngEfty=calcMes('ingreso',_efty), dasEgrEfty=calcMes('egreso',_efty);
    const dasIngBco=calcMes('ingreso',_bco), dasEgrBco=calcMes('egreso',_bco);

    // Desglose egresos por concepto
    let conceptosEgr = {};
    CONCEPTOS_EGR.forEach(c=>conceptosEgr[c]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='egreso').forEach(m=>{
            if(conceptosEgr[m.concepto]!==undefined) conceptosEgr[m.concepto]+=parseFloat(m.valor||0);
            else conceptosEgr['Otro']=(conceptosEgr['Otro']||0)+parseFloat(m.valor||0);
        });
    });
    const maxCE = Math.max(...Object.values(conceptosEgr),1);

    // Top conceptos ingreso
    let conceptosIng = {};
    CONCEPTOS_ING.forEach(c=>conceptosIng[c]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='ingreso').forEach(m=>{
            if(conceptosIng[m.concepto]!==undefined) conceptosIng[m.concepto]+=parseFloat(m.valor||0);
            else conceptosIng['Otro']=(conceptosIng['Otro']||0)+parseFloat(m.valor||0);
        });
    });

    // Resumen por oficina
    const resOficinas = oficinas.map(o=>{
        const mIng=getMesMovs(o.id).filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
        const mEgr=getMesMovs(o.id).filter(m=>m.tipo==='egreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
        return {o, mIng, mEgr, bal:mIng-mEgr};
    });

    // Solicitudes pendientes
    const pendSol = DB.solicitudes.filter(s=>s.estado==='pendiente').length;

    content.innerHTML=`
    <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
            <h2 style="font-size:1.1rem;font-weight:700;">📊 Dashboard</h2>
            <p style="font-size:0.78rem;color:var(--muted);">${mesActual()}</p>
        </div>
        ${pendSol>0&&USER.role==='admin'?`<div style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 14px;font-size:0.82rem;color:#f59e0b;">⚠️ ${pendSol} solicitud(es) pendiente(s) de aprobación</div>`:''}
    </div>

function renderDashCharts(oficinas){
    const isLight=document.body.classList.contains('light-mode');
    const textColor=isLight?'#1e293b':'#94a3b8';
    const gridColor=isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.06)';
    Chart.defaults.color=textColor;
    const ahora=new Date();

    // ── Tendencia 6 meses ─────────────────────────────────────────
    const c1=document.getElementById('chart_tendencia'); if(!c1) return;
    if(c1._chartInst) c1._chartInst.destroy();
    const labels6=[]; const ing6=[]; const egr6=[];
    for(let i=5;i>=0;i--){
        const d=new Date(); d.setMonth(d.getMonth()-i);
        labels6.push(d.toLocaleDateString('es-CO',{month:'short',year:'2-digit'}));
        let tIng=0,tEgr=0;
        oficinas.forEach(o=>{
            (o.movimientos||[]).filter(m=>{const md=new Date(m.fecha);return md.getMonth()===d.getMonth()&&md.getFullYear()===d.getFullYear();})
            .forEach(m=>{ if(m.tipo==='ingreso') tIng+=parseFloat(m.valor||0); else tEgr+=parseFloat(m.valor||0); });
        });
        ing6.push(tIng); egr6.push(tEgr);
    }
    c1._chartInst=new Chart(c1,{type:'line',data:{labels:labels6,datasets:[
        {label:'Ingresos',data:ing6,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#10b981'},
        {label:'Egresos',data:egr6,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.07)',tension:0.4,fill:true,pointBackgroundColor:'#ef4444'}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:textColor}}},scales:{x:{grid:{color:gridColor},ticks:{color:textColor}},y:{grid:{color:gridColor},ticks:{color:textColor,callback:v=>'$'+Number(v).toLocaleString('es-CO')}}}}});

    // ── Donut ingresos por concepto ───────────────────────────────
    const c2=document.getElementById('chart_donuts'); if(!c2) return;
    if(c2._chartInst) c2._chartInst.destroy();
    const concMap={};
    oficinas.forEach(o=>{
        (o.movimientos||[]).filter(m=>{const d=new Date(m.fecha);return m.tipo==='ingreso'&&d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();})
        .forEach(m=>{concMap[m.concepto]=(concMap[m.concepto]||0)+parseFloat(m.valor||0);});
    });
    const dLabels=Object.keys(concMap); const dData=Object.values(concMap);
    const dColors=['#10b981','#3b82f6','#f59e0b','#a78bfa','#ef4444','#06d6a0','#f97316','#84cc16','#ec4899','#14b8a6'];
    if(dLabels.length>0){
        c2._chartInst=new Chart(c2,{type:'doughnut',data:{labels:dLabels,datasets:[{data:dData,backgroundColor:dColors,borderWidth:2,borderColor:isLight?'#fff':'#111827'}]},
        options:{responsive:true,plugins:{legend:{position:'right',labels:{color:textColor,boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': $'+Number(ctx.raw).toLocaleString('es-CO')}}}}});
    }

    // ── Barras comparativa oficinas ───────────────────────────────
    const c3=document.getElementById('chart_oficinas'); if(!c3||oficinas.length<2) return;
    if(c3._chartInst) c3._chartInst.destroy();
    const bLabels=[],bIng=[],bEgr=[];
    oficinas.forEach(o=>{
        bLabels.push(o.nombre); let tI=0,tE=0;
        (o.movimientos||[]).filter(m=>{const d=new Date(m.fecha);return d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();})
        .forEach(m=>{ if(m.tipo==='ingreso') tI+=parseFloat(m.valor||0); else tE+=parseFloat(m.valor||0); });
        bIng.push(tI); bEgr.push(tE);
    });
    c3._chartInst=new Chart(c3,{type:'bar',data:{labels:bLabels,datasets:[
        {label:'Ingresos',data:bIng,backgroundColor:'rgba(16,185,129,0.75)',borderRadius:6},
        {label:'Egresos',data:bEgr,backgroundColor:'rgba(239,68,68,0.65)',borderRadius:6}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:textColor}}},scales:{x:{grid:{color:gridColor},ticks:{color:textColor}},y:{grid:{color:gridColor},ticks:{color:textColor,callback:v=>'$'+Number(v).toLocaleString('es-CO')}}}}});
}

function registrarMovimiento(oid,tipo){
    const pfx=tipo==='ingreso'?'ing':'egr';
    const concepto=document.getElementById(pfx+'_concepto').value;
    const forma=document.getElementById(pfx+'_forma').value;
    const valorStr=document.getElementById(pfx+'_valor').value; const valor=valorStr===''?null:parseFloat(valorStr);
    const desc=document.getElementById(pfx+'_desc').value.trim();
    if(valor===null||valor===undefined||isNaN(valor)||valor<0) return alert('⚠️ Ingresa un valor válido (puede ser 0)');
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    if(!o.movimientos) o.movimientos=[];
    o.movimientos.push({id:uid(),tipo,concepto,forma,descripcion:desc,valor,fecha:now()});
    save(); renderRegistro();
}

        return d.getMonth()===mes&&d.getFullYear()===año;

    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);

                <div style="font-size:0.7rem;font-weight:700;color:#10b981;margin-bottom:6px;">💵 EFECTIVO</div>
                <div style="font-size:0.78rem;display:flex;flex-direction:column;gap:3px;">
                    <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted)">Ingresos</span><span style="color:#10b981;font-weight:700;">${fmtShort(iEf)}</span></div>

function eliminarMovimiento(oid,mid){
    if(!confirm('¿Eliminar este movimiento?')) return;
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    o.movimientos=(o.movimientos||[]).filter(m=>m.id!==mid);
    save(); renderRegistro();
}

function solicitarEliminar(oid,mid){
    const o=getOficina(oid);
    const m=(o.movimientos||[]).find(x=>x.id===mid);
    if(!m) return;
    if(!confirm(`Solicitar eliminación de:\n${m.concepto} - ${fmtShort(m.valor)}\n\n¿Confirmar?`)) return;
    DB.solicitudes.push({
        id:uid(), tipo:'eliminar_mov', oid, mid,
        descripcion:`Eliminar movimiento: ${m.concepto} ${m.tipo} ${fmtShort(m.valor)} del ${new Date(m.fecha).toLocaleDateString('es-CO')}`,
        oficina:o.nombre, estado:'pendiente', fecha:now()
    });
    save(); alert('✅ Solicitud enviada al administrador.');
}

function cargarPctVendedor(){
    const sel=document.getElementById('c_vendedor');
    const opt=sel.options[sel.selectedIndex];
    const panel=document.getElementById('com_panel');
    if(!sel.value){ panel.style.display='none'; return; }
    panel.style.display='';
    document.getElementById('c_pct1').value=opt.dataset.p1||0;
    document.getElementById('c_pct2').value=opt.dataset.p2||0;
    document.getElementById('c_pct3').value=opt.dataset.p3||0;
    recalcComisiones();
}

function recalcComisiones(){
    const tarifa=parseFloat(document.getElementById('c_tarifa')?.value||0);
    const p1=parseFloat(document.getElementById('c_pct1')?.value||0);
    const p2=parseFloat(document.getElementById('c_pct2')?.value||0);
    const p3=parseFloat(document.getElementById('c_pct3')?.value||0);
    const v1=document.getElementById('c_val1');
    const v2=document.getElementById('c_val2');

    const tot=document.getElementById('c_total_com');
    if(v1) v1.textContent=tarifa?'= '+fmtShort(tarifa*p1/100):'';

    if(v3) v3.textContent=tarifa?'= '+fmtShort(tarifa*p3/100):'';
    if(tot){

function guardarCliente(oid){
    const nombre=document.getElementById('c_nombre').value.trim();
    if(!nombre) return alert('El nombre es obligatorio');
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    if(!o.clientes) o.clientes=[];
    const tarifa=parseFloat(document.getElementById('c_tarifa').value||0);
    const vendedorId=document.getElementById('c_vendedor')?.value||'';
    const fechaInst=document.getElementById('c_fecha_inst')?.value||new Date().toISOString().slice(0,10);
    // Porcentajes por venta (pueden diferir del vendedor)
    const pct1=parseFloat(document.getElementById('c_pct1')?.value||0);
    const pct2=parseFloat(document.getElementById('c_pct2')?.value||0);
    const pct3=parseFloat(document.getElementById('c_pct3')?.value||0);
    const cid=uid();
    o.clientes.push({
        id:cid, nombre,
        telefono:document.getElementById('c_tel').value.trim(),
        direccion:document.getElementById('c_dir').value.trim(),
        plan:document.getElementById('c_plan').value,
        tarifaMensual:tarifa,
        estado:document.getElementById('c_estado').value,
        observaciones:document.getElementById('c_obs').value.trim(),
        vendedorId, fechaInstalacion:fechaInst,
        // Guardar porcentajes específicos de esta venta
        comisionPct:{instalacion:pct1, primerMes:pct2, segundoMes:pct3},
        comisionesEstado:{instalacion:'pendiente', primerMes:'pendiente', segundoMes:'pendiente'},
        fechaRegistro:now()
    });
    // Generar comisión de instalación si hay vendedor y % > 0
    if(vendedorId && pct1>0){
        const v=DB.vendedores.find(x=>x.id===vendedorId);
        if(v){
            if(!v.comisiones) v.comisiones=[];
            const valorCom=tarifa*(pct1/100);
            v.comisiones.push({
                id:uid(), tipo:'instalacion', valor:valorCom,
                cliente:nombre, clienteId:cid,
                plan:document.getElementById('c_plan').value,
                planValor:tarifa, pct:pct1,
                pagado:false, fecha:now(), oid
            });
            // Marcar instalación como generada automáticamente
            const clienteGuardado=(o.clientes||[]).find(x=>x.id===cid);
            if(clienteGuardado) clienteGuardado.comisionesEstado.instalacion='generada';
            verificarIncentivosVendedor(vendedorId);
        }
    }
    save(); closeModal(); renderClientes();
}

// Función central de acciones de comisión — accesible para admin Y jefes de oficina
function accionComision(oid, cid, tipoKey, accion){
    const o=DB.oficinas.find(x=>x.id===oid);
    const c=(o?.clientes||[]).find(x=>x.id===cid);
    if(!c) return;
    const v=c.vendedorId?(DB.vendedores||[]).find(x=>x.id===c.vendedorId):null;
    if(!v) return alert('Este cliente no tiene vendedor asignado');
    const ce=c.comisionesEstado||{instalacion:'pendiente',primerMes:'pendiente',segundoMes:'pendiente'};
    const tipoLabel=tipoKey==='instalacion'?'instalacion':tipoKey==='primerMes'?'primer_mes':'segundo_mes';
    const cp2=c.comisionPct||{instalacion:v.pctInstalacion||0,primerMes:v.pct1Mes||0,segundoMes:v.pct2Mes||0};
    const pct=tipoKey==='instalacion'?(cp2.instalacion||0):tipoKey==='primerMes'?(cp2.primerMes||0):(cp2.segundoMes||0);
    const valor=(c.tarifaMensual||0)*(pct/100);

    if(accion==='generar'){
        if(!v.comisiones) v.comisiones=[];
        const yaExiste=v.comisiones.find(x=>x.clienteId===cid&&x.tipo===tipoLabel);
        if(!yaExiste) v.comisiones.push({id:uid(),tipo:tipoLabel,valor,cliente:c.nombre,clienteId:cid,plan:c.plan,planValor:c.tarifaMensual,pagado:false,fecha:now(),oid});
        c.comisionesEstado={...ce,[tipoKey]:'generada'};
        if(tipoKey==='primerMes') verificarIncentivosVendedor(v.id);

    } else if(accion==='pagar'){
        const com=(v.comisiones||[]).find(x=>x.clienteId===cid&&x.tipo===tipoLabel);
        if(com) com.pagado=true;
        c.comisionesEstado={...ce,[tipoKey]:'pagada'};

    } else if(accion==='eliminar'){
        if(!confirm(`¿Eliminar el registro de esta comisión pagada?
Esto NO devuelve el dinero, solo elimina el registro.`)) return;
        v.comisiones=(v.comisiones||[]).filter(x=>!(x.clienteId===cid&&x.tipo===tipoLabel));
        c.comisionesEstado={...ce,[tipoKey]:'pendiente'};

    } else if(accion==='revertir'){
        const est=ce[tipoKey]||'pendiente';
        if(!confirm('¿Revertir esta comisión al estado anterior?')) return;
        if(est==='pagada'){
            const com=(v.comisiones||[]).find(x=>x.clienteId===cid&&x.tipo===tipoLabel);
            if(com) com.pagado=false;
            c.comisionesEstado={...ce,[tipoKey]:'generada'};
        } else if(est==='generada'){
            v.comisiones=(v.comisiones||[]).filter(x=>!(x.clienteId===cid&&x.tipo===tipoLabel));
            c.comisionesEstado={...ce,[tipoKey]:'pendiente'};
        }
    }
    save();
    setTimeout(()=>modalVerCliente(oid,cid),150);
}

// ─── REPORTES ────────────────────────────────────────────────────────────────
function renderReportes(){
    const content=document.getElementById('appContent');
    const oficinas=currentOficinas();
    const oid=USER.role==='admin'?(window._selOfiRep||oficinas[0]?.id):USER.id;
    const o=getOficina(oid);
    const periodo=window._periodo||'mes';
    const ahora=new Date();

    // Mes anterior para comparar
    const mesPrev=new Date(ahora.getFullYear(), ahora.getMonth()-1, 1);

    function filtrarMovs(meses_atras=0){
        return (o?.movimientos||[]).filter(m=>{
            const d=new Date(m.fecha);
            if(periodo==='hoy') return d.toDateString()===ahora.toDateString();
            if(meses_atras===0) return d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();
            const ref=new Date(ahora.getFullYear(), ahora.getMonth()-meses_atras, 1);
            return d.getMonth()===ref.getMonth()&&d.getFullYear()===ref.getFullYear();
        });
    }
    const movs=filtrarMovs(0);
    const movsPrev=filtrarMovs(1);

    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const bal=ing-egr;
    const ingPrev=movsPrev.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egrPrev=movsPrev.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);

    // Variación vs mes anterior
    const varIng=ingPrev>0?((ing-ingPrev)/ingPrev*100).toFixed(1):null;
    const varEgr=egrPrev>0?((egr-egrPrev)/egrPrev*100).toFixed(1):null;
    const varBal=ingPrev-egrPrev!==0?(((bal-(ingPrev-egrPrev))/(Math.abs(ingPrev-egrPrev)))*100).toFixed(1):null;

    function varTag(v){ if(v===null) return ''; const n=parseFloat(v); return `<span style="font-size:0.72rem;margin-left:6px;color:${n>=0?'#10b981':'#ef4444'};font-weight:700;">${n>=0?'▲':'▼'}${Math.abs(n)}% vs mes ant.</span>`; }

    // Desglose por forma de pago (ingresos Y egresos)
    const formas=['Efectivo','Efecty','Cta Bancolombia','Cruce de Cuentas','Transferencia'];
    const porFormaIng={}, porFormaEgr={};
    formas.forEach(f=>{ porFormaIng[f]=0; porFormaEgr[f]=0; });
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{ porFormaIng[m.forma]=(porFormaIng[m.forma]||0)+parseFloat(m.valor||0); });
    movs.filter(m=>m.tipo==='egreso').forEach(m=>{ porFormaEgr[m.forma]=(porFormaEgr[m.forma]||0)+parseFloat(m.valor||0); });

    // Desglose por concepto
    const porConcepto={}, porEgr={};
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{ porConcepto[m.concepto]=(porConcepto[m.concepto]||0)+parseFloat(m.valor||0); });
    movs.filter(m=>m.tipo==='egreso').forEach(m=>{ porEgr[m.concepto]=(porEgr[m.concepto]||0)+parseFloat(m.valor||0); });

    // Día a día del mes
    const diasDelMes={};
    if(periodo==='mes'){
        const daysInMonth=new Date(ahora.getFullYear(),ahora.getMonth()+1,0).getDate();
        for(let d=1;d<=daysInMonth;d++) diasDelMes[d]={ing:0,egr:0};
        movs.forEach(m=>{
            const d=new Date(m.fecha).getDate();
            if(diasDelMes[d]!==undefined){
                if(m.tipo==='ingreso') diasDelMes[d].ing+=parseFloat(m.valor||0);
                else diasDelMes[d].egr+=parseFloat(m.valor||0);
            }
        });
    }

    // Clientes
    const clientes=o?.clientes||[];
    const cxEstado={};
    ESTADO_CLIENTE.forEach(e=>cxEstado[e]=0);
    clientes.forEach(c=>cxEstado[c.estado||'Activo']=(cxEstado[c.estado||'Activo']||0)+1);

    const maxDia=Math.max(...Object.values(diasDelMes).map(d=>Math.max(d.ing,d.egr)),1);
    const maxConc=Math.max(...Object.values(porConcepto),1);
    const maxEgrC=Math.max(...Object.values(porEgr),1);

    content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <h2 style="font-size:1.1rem;font-weight:700;">📈 Reportes${o?' — '+o.nombre:''}</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${USER.role==='admin'&&oficinas.length>1?`<select class="form-control" style="width:auto;" onchange="window._selOfiRep=this.value;renderReportes()">
                ${oficinas.map(x=>`<option value="${x.id}" ${x.id===oid?'selected':''}>${x.nombre}</option>`).join('')}
            </select>`:''}
            <select class="form-control" style="width:auto;" onchange="window._periodo=this.value;renderReportes()">
                <option value="hoy" ${periodo==='hoy'?'selected':''}>Hoy</option>
                <option value="mes" ${periodo==='mes'?'selected':''}>Mes actual</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="exportarReporteExcel('${oid}','${periodo}')">📥 Exportar Excel</button>

function exportarReporteExcel(oid, periodo){
    const o=getOficina(oid); if(!o) return;
    if(typeof XLSX==='undefined'){
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=()=>_exportarReporteExcel(o,periodo);
        document.head.appendChild(s);
    } else { _exportarReporteExcel(o,periodo); }
}

function _exportarReporteExcel(o, periodo){
    const ahora=new Date();
    const movs=(o.movimientos||[]).filter(m=>{
        const d=new Date(m.fecha);
        if(periodo==='hoy') return d.toDateString()===ahora.toDateString();
        return d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();
    });
    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const wb=XLSX.utils.book_new();

    // Hoja 1: Resumen
    const formas=['Efectivo','Efecty','Cta Bancolombia','Cruce de Cuentas','Transferencia'];
    const porFormaIng={}, porFormaEgr={};
    formas.forEach(f=>{ porFormaIng[f]=0; porFormaEgr[f]=0; });
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{ porFormaIng[m.forma]=(porFormaIng[m.forma]||0)+parseFloat(m.valor||0); });
    movs.filter(m=>m.tipo==='egreso').forEach(m=>{ porFormaEgr[m.forma]=(porFormaEgr[m.forma]||0)+parseFloat(m.valor||0); });

    const resumen=[
        ['REPORTE DE OFICINA — '+o.nombre,'','',''],
        ['Período', periodo==='hoy'?'Hoy '+ahora.toLocaleDateString('es-CO'):ahora.toLocaleDateString('es-CO',{month:'long',year:'numeric'}),'',''],
        ['Generado', ahora.toLocaleString('es-CO'),'',''],
        ['','','',''],
        ['RESUMEN GENERAL','','',''],
        ['Concepto','Valor','',''],
        ['Total Ingresos', ing,'',''],
        ['Total Egresos', egr,'',''],
        ['Balance', ing-egr,'',''],
        ['','','',''],
        ['DESGLOSE POR FORMA DE PAGO','','',''],
        ['Forma de Pago','Ingresos','Egresos','Saldo'],
        ...formas.filter(f=>porFormaIng[f]+porFormaEgr[f]>0).map(f=>[f, porFormaIng[f]||0, porFormaEgr[f]||0, (porFormaIng[f]||0)-(porFormaEgr[f]||0)]),
        ['','','',''],
        ['INGRESOS POR CONCEPTO','','',''],
        ['Concepto','Valor','% del total',''],
    ];
    const porConc={};
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{ porConc[m.concepto]=(porConc[m.concepto]||0)+parseFloat(m.valor||0); });
    Object.entries(porConc).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>resumen.push([k,v,ing>0?parseFloat((v/ing*100).toFixed(1)):0,'']));
    resumen.push(['','','','']);
    resumen.push(['EGRESOS POR CONCEPTO','','','']);
    resumen.push(['Concepto','Valor','% del total','']);
    const porEgrC={};
    movs.filter(m=>m.tipo==='egreso').forEach(m=>{ porEgrC[m.concepto]=(porEgrC[m.concepto]||0)+parseFloat(m.valor||0); });
    Object.entries(porEgrC).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>resumen.push([k,v,egr>0?parseFloat((v/egr*100).toFixed(1)):0,'']));

    const ws1=XLSX.utils.aoa_to_sheet(resumen);
    ws1['!cols']=[{wch:30},{wch:18},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws1,'Resumen');

    // Hoja 2: Movimientos detallados
    const detalle=[['Fecha','Hora','Tipo','Concepto','Descripción','Forma de Pago','Valor','Es Pago Admin']];
    movs.slice().reverse().forEach(m=>{
        const d=new Date(m.fecha);
        detalle.push([
            d.toLocaleDateString('es-CO'), d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),
            m.tipo==='ingreso'?'Ingreso':'Egreso', m.concepto||'',
            m.descripcion||'', m.forma||'',
            parseFloat(m.valor||0), m.esPagoAdmin?'Sí':'No'
        ]);
    });
    const ws2=XLSX.utils.aoa_to_sheet(detalle);
    ws2['!cols']=[{wch:14},{wch:8},{wch:10},{wch:25},{wch:35},{wch:20},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,'Movimientos');

    // Hoja 3: Día a día (solo mes)
    if(periodo==='mes'){
        const daysInMonth=new Date(ahora.getFullYear(),ahora.getMonth()+1,0).getDate();
        const diaDia=[['Día','Ingresos','Egresos','Balance']];
        for(let d=1;d<=daysInMonth;d++){
            const dMovs=movs.filter(m=>new Date(m.fecha).getDate()===d);
            const i=dMovs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
            const e=dMovs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
            diaDia.push([d,i,e,i-e]);
        }
        const ws3=XLSX.utils.aoa_to_sheet(diaDia);
        ws3['!cols']=[{wch:8},{wch:16},{wch:16},{wch:16}];
        XLSX.utils.book_append_sheet(wb,ws3,'Día a Día');
    }

    // Hoja 4: Clientes
    const clientes=o.clientes||[];
    if(clientes.length>0){
        const cliData=[['Nombre','Teléfono','Dirección','Plan','Tarifa Mensual','Estado','Fecha Instalación','Motivo No Pago','Motivo Retiro']];
        clientes.forEach(c=>cliData.push([c.nombre||'',c.telefono||'',c.direccion||'',c.plan||'',parseFloat(c.tarifaMensual||0),c.estado||'',c.fechaInstalacion||'',c.motivoNoPago||'',c.motivoRetiro||'']));
        const ws4=XLSX.utils.aoa_to_sheet(cliData);
        ws4['!cols']=[{wch:25},{wch:14},{wch:30},{wch:22},{wch:14},{wch:12},{wch:16},{wch:25},{wch:25}];
        XLSX.utils.book_append_sheet(wb,ws4,'Clientes');
    }

    XLSX.writeFile(wb, 'Reporte_'+o.nombre.replace(/\s/g,'_')+'_'+periodo+'_'+ahora.toISOString().slice(0,10)+'.xlsx');
}

// Keep old function name as alias
function exportarReporte(oid,periodo){ exportarReporteExcel(oid,periodo); }

function crearOficina(){
    const nombre=document.getElementById('o_nombre').value.trim();
    const pass=document.getElementById('o_pass').value;
    if(!nombre||!pass) return alert('Nombre y contraseña son obligatorios');
    DB.oficinas.push({
        id:uid(), nombre, password:pass,
        ciudad:document.getElementById('o_ciudad').value.trim(),
        responsable:document.getElementById('o_resp').value.trim(),
        movimientos:[], clientes:[]
    });
    save(); closeModal(); renderAdmin();
}

// Calcula comisiones de un vendedor leyendo desde DB.ventas (fuente única)
function calcComisionesVendedor(vid){
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    return (DB.ventas||[]).filter(v=>{
        if(v.vendedorId!==vid) return false;
        const d=new Date(v.fecha);
        return d.getMonth()===mes&&d.getFullYear()===año;
    }).reduce((s,v)=>{
        return s+(v.comisionInst||0)+(v.comisionM1||0)+(v.comisionM2||0);
    },0);
}

// Estadísticas completas de un vendedor desde DB.ventas
function statsVendedor(vid){
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const ventasMes=(DB.ventas||[]).filter(v=>{
        if(v.vendedorId!==vid) return false;
        const d=new Date(v.fecha);
        return d.getMonth()===mes&&d.getFullYear()===año;
    });
    const totalVentas=ventasMes.length;
    const instaladas=ventasMes.filter(v=>v.pagoInst).length;
    const m1=ventasMes.filter(v=>v.pagoM1).length;
    const m2=ventasMes.filter(v=>v.pagoM2).length;
    const comInst=ventasMes.reduce((s,v)=>s+(v.comisionInst||0),0);
    const comM1=ventasMes.reduce((s,v)=>s+(v.comisionM1||0),0);
    const comM2=ventasMes.reduce((s,v)=>s+(v.comisionM2||0),0);
    const total=comInst+comM1+comM2;
    const pendiente=ventasMes.reduce((s,v)=>{
        let p=0;
        if(v.instalado&&!v.pagoInst) p+=(v.valor||0)*((v.pct?.instalacion||0)/100);
        if(!v.pagoM1) p+=(v.valor||0)*((v.pct?.primerMes||0)/100);
        if(!v.pagoM2) p+=(v.valor||0)*((v.pct?.segundoMes||0)/100);
        return s+p;
    },0);
    return {totalVentas,instaladas,m1,m2,comInst,comM1,comM2,total,pendiente,ventasMes};
}

function clickEstadoComision(vid, cid, esPagada){
    const v=DB.vendedores.find(x=>x.id===vid);
    const c=(v?.comisiones||[]).find(x=>x.id===cid);
    if(!c) return;
    if(esPagada){
        if(!confirm('¿Marcar esta comisión como pendiente?')) return;
        c.pagado=false;
        // Sincronizar con cliente
        if(c.clienteId&&c.oid){
            const o=DB.oficinas.find(x=>x.id===c.oid);
            const cl=(o?.clientes||[]).find(x=>x.id===c.clienteId);
            if(cl?.comisionesEstado){
                const k=c.tipo==='instalacion'?'instalacion':c.tipo==='primer_mes'?'primerMes':'segundoMes';
                cl.comisionesEstado[k]='generada';
            }
        }
    } else {
        const label=c.tipo==='instalacion'?'🔧 Instalación':c.tipo==='primer_mes'?'📅 1er Mes':'📅 2do Mes';
        if(!confirm(`¿Confirmar pago de comisión?\n${label} — ${c.cliente||''} — ${fmtShort(c.valor)}`)) return;
        c.pagado=true;
        // Sincronizar con cliente
        if(c.clienteId&&c.oid){
            const o=DB.oficinas.find(x=>x.id===c.oid);
            const cl=(o?.clientes||[]).find(x=>x.id===c.clienteId);
            if(cl?.comisionesEstado){
                const k=c.tipo==='instalacion'?'instalacion':c.tipo==='primer_mes'?'primerMes':'segundoMes';
                cl.comisionesEstado[k]='pagada';
            }
        }
    }
    save(); renderVendedores();
}

function eliminarComisionTabla(vid, cid){
    if(!confirm('¿Eliminar este registro de comisión?')) return;
    const v=DB.vendedores.find(x=>x.id===vid);
    if(!v) return;
    const c=(v.comisiones||[]).find(x=>x.id===cid);
    if(c?.clienteId&&c?.oid){
        const o=DB.oficinas.find(x=>x.id===c.oid);
        const cl=(o?.clientes||[]).find(x=>x.id===c.clienteId);
        if(cl?.comisionesEstado){
            const k=c.tipo==='instalacion'?'instalacion':c.tipo==='primer_mes'?'primerMes':'segundoMes';
            cl.comisionesEstado[k]='pendiente';
        }
    }
    v.comisiones=(v.comisiones||[]).filter(x=>x.id!==cid);
    save(); renderVendedores();
}

function calcularComisionAuto(){
    const vid=document.getElementById('rc_vend')?.value;
    const tipo=document.getElementById('rc_tipo')?.value;
    const planValor=parseFloat(document.getElementById('rc_plan_valor')?.value||0);
    if(!vid||!planValor) return;
    const v=(DB.vendedores||[]).find(x=>x.id===vid);
    if(!v) return;
    const pct=tipo==='instalacion'?v.pctInstalacion:tipo==='primer_mes'?v.pct1Mes:v.pct2Mes;
    const calc=(planValor*(pct/100));
    document.getElementById('rc_valor').value=calc.toFixed(0);
    document.getElementById('rc_calc_info').textContent=`${pct}% de ${fmtShort(planValor)} = ${fmtShort(calc)}`;
}

function guardarComision(){
    const vid=document.getElementById('rc_vend').value;
    const tipo=document.getElementById('rc_tipo').value;
    const valor=parseFloat(document.getElementById('rc_valor').value||0);
    if(!vid) return alert('Selecciona un vendedor');
    if(!valor||valor<=0) return alert('Ingresa un valor válido');
    const v=DB.vendedores.find(x=>x.id===vid);
    if(!v) return;
    if(!v.comisiones) v.comisiones=[];
    v.comisiones.push({
        id:uid(), tipo, valor,
        cliente:document.getElementById('rc_cliente').value.trim(),
        plan:document.getElementById('rc_plan').value,
        planValor:parseFloat(document.getElementById('rc_plan_valor').value||0),
        pagado:false, fecha:now()
    });
    save(); closeModal(); renderVendedores();
}

function togglePagoComision(vid,cid){
    const v=DB.vendedores.find(x=>x.id===vid);
    const c=(v?.comisiones||[]).find(x=>x.id===cid);
    if(!c) return;
    c.pagado=!c.pagado;
    save(); renderVendedores();
}

function calcComisionVendedor(vid){
    const v=(DB.vendedores||[]).find(x=>x.id===vid);
    if(!v) return;
    const tipo=document.getElementById('rcv_tipo')?.value;
    const planValor=parseFloat(document.getElementById('rcv_plan_valor')?.value||0);
    if(!planValor) return;
    const pct=tipo==='instalacion'?v.pctInstalacion:tipo==='primer_mes'?v.pct1Mes:v.pct2Mes;
    const calc=(planValor*(pct/100));
    document.getElementById('rcv_valor').value=calc.toFixed(0);
    document.getElementById('rcv_info').textContent=`${pct}% de ${fmtShort(planValor)} = ${fmtShort(calc)}`;
}

function guardarComisionVendedor(vid){
    const tipo=document.getElementById('rcv_tipo').value;
    const valor=parseFloat(document.getElementById('rcv_valor').value||0);
    const pagado=document.getElementById('rcv_pagado').value==='true';
    const v=DB.vendedores.find(x=>x.id===vid);
    if(!v) return;
    if(!v.comisiones) v.comisiones=[];
    v.comisiones.push({
        id:uid(), tipo, valor,
        cliente:document.getElementById('rcv_cliente').value.trim(),
        plan:document.getElementById('rcv_plan').value,
        planValor:parseFloat(document.getElementById('rcv_plan_valor').value||0),
        pagado, fecha:now()
    });
    // Verificar si gana algún incentivo con esta acción
    verificarIncentivosVendedor(vid);
    save(); closeModal(); renderVendedores();
}

function verificarIncentivosVendedor(vid){
    const v=DB.vendedores.find(x=>x.id===vid);
    if(!v) return;
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const comMes=(v.comisiones||[]).filter(c=>{const d=new Date(c.fecha);return d.getMonth()===mes&&d.getFullYear()===año;});
    const instalaciones=comMes.filter(c=>c.tipo==='instalacion').length;
    const primerMes=comMes.filter(c=>c.tipo==='primer_mes').length;
    const metas=(DB.metas||[]).filter(m=>
        m.aplica==='todas'||m.aplica===USER.id||USER.role==='admin'
    );
    let alertas=[];
    metas.forEach(m=>{
        if(m.tipo==='instalaciones'&&instalaciones===parseInt(m.meta)){
            alertas.push(`🏆 ¡${v.nombre} acaba de alcanzar la meta "${m.nombre}"! Bono: ${fmtShort(m.bono)}`);
        }
        if(m.tipo==='primer_mes'&&primerMes===parseInt(m.meta)){
            alertas.push(`🏆 ¡${v.nombre} alcanzó la meta "${m.nombre}" con ${primerMes} clientes con 1er mes! Bono: ${fmtShort(m.bono)}`);
        }
    });
    if(alertas.length>0) setTimeout(()=>alert(alertas.join('\n\n')),300);
}

function eliminarVendedor(vid){
    if(!confirm('¿Eliminar este vendedor y todas sus comisiones?')) return;
    DB.vendedores=(DB.vendedores||[]).filter(v=>v.id!==vid);
    save(); renderVendedores();
}

function renderIncentivos(){
    const content=document.getElementById('appContent');
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const metas=DB.metas||[];
    const vendedores=DB.vendedores||[];

    // Calcular stats de cada vendedor para el mes
    const stats=vendedores
        .filter(v=>USER.role==='oficina'?((v.oficinas||[]).includes(USER.id)||!v.oficinas||v.oficinas.length===0):true)
        .map(v=>{
            const comMes=(v.comisiones||[]).filter(c=>{const d=new Date(c.fecha);return d.getMonth()===mes&&d.getFullYear()===año;});
            const instalaciones=comMes.filter(c=>c.tipo==='instalacion').length;
            const primerMes=comMes.filter(c=>c.tipo==='primer_mes').length;
            const segMes=comMes.filter(c=>c.tipo==='segundo_mes').length;
            const totalCom=comMes.reduce((s,c)=>s+parseFloat(c.valor||0),0);
            // Calcular incentivos ganados
            const incentivosGanados=metas.filter(m=>{
                if(m.tipo==='instalaciones') return instalaciones>=m.meta;
                if(m.tipo==='primer_mes') return primerMes>=m.meta;
                if(m.tipo==='cero_retiros'){
                    // Revisar clientes retirados vinculados al vendedor (simplificado)
                    return true; // Se maneja manualmente
                }
                return false;
            });
            const bonos=incentivosGanados.reduce((s,m)=>s+parseFloat(m.bono||0),0);
            return {v, instalaciones, primerMes, segMes, totalCom, incentivosGanados, bonos};
        }).sort((a,b)=>b.instalaciones-a.instalaciones);

    content.innerHTML=`
    <div class="two-cols" style="margin-bottom:16px;">
        <div class="card" style="margin-bottom:0">
            <div class="card-header">
                <h2>🏆 Metas e Incentivos <span>configuración</span></h2>

            ${metas.length===0
                ? `<p style="color:var(--muted);text-align:center;padding:20px;">Sin metas configuradas.${USER.role==='admin'?' Crea la primera meta.':''}</p>`
                : metas.map(m=>`
                <div class="oficina-admin-card">
                    <div>
                        <div style="font-weight:700;">${m.nombre}</div>
                        <div style="font-size:0.78rem;color:var(--muted);margin-top:3px;">
                            ${m.tipo==='instalaciones'?`🔧 ${m.meta} instalaciones/mes`:
                              m.tipo==='primer_mes'?`📅 ${m.meta} clientes con 1er mes pagado`:
                              m.tipo==='cero_retiros'?`🛡️ 0 retiros en el mes`:
                              m.tipo==='ranking'?`🥇 Top del ranking mensual`:''}
                        </div>
                        <div style="font-size:0.82rem;margin-top:4px;">
                            Bono: <strong style="color:#10b981">${fmtShort(m.bono)}</strong>
                            ${m.descripcion?`<span style="color:var(--muted);margin-left:8px;">${m.descripcion}</span>`:''}
                        </div>
                    </div>
                    ${USER.role==='admin'?`<div style="display:flex;gap:6px;">
                        <button class="btn btn-outline btn-sm" onclick="modalEditarMeta('${m.id}')">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminarMeta('${m.id}')">🗑️</button>
                    </div>`:''}
                </div>`).join('')}
        </div>

        <div class="card" style="margin-bottom:0">
            <div class="card-header"><h2>📊 Resumen del Mes <span>${mesActual()}</span></h2></div>
            <div class="stats-grid" style="grid-template-columns:1fr 1fr;gap:10px;">
                <div class="stat-card green" style="padding:12px"><div class="label">Total instalaciones</div><div class="value">${stats.reduce((s,x)=>s+x.instalaciones,0)}</div></div>
                <div class="stat-card blue" style="padding:12px"><div class="label">1er mes pagado</div><div class="value">${stats.reduce((s,x)=>s+x.primerMes,0)}</div></div>
                <div class="stat-card yellow" style="padding:12px"><div class="label">Comisiones totales</div><div class="value" style="font-size:1.1rem">${fmtShort(stats.reduce((s,x)=>s+x.totalCom,0))}</div></div>
                <div class="stat-card green" style="padding:12px"><div class="label">Bonos ganados</div><div class="value" style="font-size:1.1rem">${fmtShort(stats.reduce((s,x)=>s+x.bonos,0))}</div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h2>🥇 Ranking de Vendedores <span>— ${mesActual()}</span></h2></div>
        ${stats.length===0
            ? '<p style="color:var(--muted);text-align:center;padding:30px;">Sin vendedores registrados.</p>'
            : `<div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Vendedor</th><th>🔧 Instalaciones</th><th>📅 1er Mes</th><th>📅 2do Mes</th><th>💰 Comisiones</th><th>🏆 Bonos</th><th>Total</th></tr></thead>
            <tbody>
                ${stats.map((s,i)=>`<tr style="${i===0?'background:rgba(245,158,11,0.06);':i===1?'background:rgba(156,163,175,0.04);':i===2?'background:rgba(205,127,50,0.04);':''}">
                    <td style="font-size:1.2rem;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</td>
                    <td>
                        <strong>${s.v.nombre}</strong>

                </tr>`).join('')}

        </table></div>`}
    </div>
    `;
}

let _csvData = [];
function previsualizarCSV(input){
    const file=input.files[0];
    if(!file) return;
    const isXlsx=file.name.endsWith('.xlsx')||file.name.endsWith('.xls');
    if(isXlsx){
        if(typeof XLSX==='undefined'){
            const s=document.createElement('script');
            s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            s.onload=()=>_leerExcel(file);
            document.head.appendChild(s);
        } else { _leerExcel(file); }
        return;
    }
    // CSV normal
    _previsualizarCSVRaw(input);
}

function _leerExcel(file){
    const reader=new FileReader();
    reader.onload=function(e){
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        _csvData=rows.map(r=>({
            nombre:r['nombre']||r['Nombre']||'',
            telefono:String(r['telefono']||r['Teléfono']||''),
            direccion:r['direccion']||r['Dirección']||'',
            plan:r['plan']||r['Plan']||'Otro',
            tarifaMensual:parseFloat(r['tarifaMensual']||r['tarifa']||0),
            estado:r['estado']||r['Estado']||'Activo',
            observaciones:r['observaciones']||r['Observaciones']||'',
            fechaInstalacion:r['fechaInstalacion']||r['fechainstalacion']||''
        })).filter(r=>r.nombre);
        _mostrarPrevisualizacion();
    };
    reader.readAsBinaryString(file);
}

function _mostrarPrevisualizacion(){
    const prev=_csvData.slice(0,5);
    document.getElementById('csv_preview').innerHTML=`
        <p style="font-size:0.82rem;color:var(--accent);margin-bottom:8px;">✅ Se encontraron <strong>${_csvData.length}</strong> clientes para importar. Previsualización:</p>
        <div class="table-wrap"><table>
            <thead><tr><th>Nombre</th><th>Teléfono</th><th>Plan</th><th>Estado</th><th>Tarifa</th></tr></thead>
            <tbody>${prev.map(r=>`<tr><td>${r.nombre}</td><td>${r.telefono||'-'}</td><td>${r.plan||'-'}</td><td>${r.estado||'Activo'}</td><td>${fmtShort(parseFloat(r.tarifaMensual||0))}</td></tr>`).join('')}
            ${_csvData.length>5?`<tr><td colspan="5" style="color:var(--muted);text-align:center;">... y ${_csvData.length-5} más</td></tr>`:''}
            </tbody>
        </table></div>`;
    const btn=document.getElementById('btn_importar');
    if(btn) btn.style.display='';
}

function _previsualizarCSVRaw(input){
    const file=input.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=function(e){
        const text=e.target.result;
        const lines=text.split('\n').filter(l=>l.trim());
        if(lines.length<2){ document.getElementById('csv_preview').innerHTML='<p style="color:#ef4444">El archivo parece estar vacío o sin datos.</p>'; return; }
        const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
        const idxNombre=headers.indexOf('nombre');
        if(idxNombre<0){ document.getElementById('csv_preview').innerHTML='<p style="color:#ef4444">No se encontró la columna "nombre". Usa la plantilla correcta.</p>'; return; }
        _csvData=lines.slice(1).map(line=>{
            const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
            const obj={};
            headers.forEach((h,i)=>obj[h]=vals[i]||'');
            return obj;
        }).filter(r=>r.nombre);
        _mostrarPrevisualizacion();
    };
    reader.readAsText(file,'UTF-8');
}

function importarClientes(oid){
    if(!_csvData||_csvData.length===0) return alert('No hay datos para importar');
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    if(!o.clientes) o.clientes=[];
    let importados=0, duplicados=0;
    _csvData.forEach(r=>{
        const nombre=(r.nombre||'').trim();
        if(!nombre) return;
        // Evitar duplicados por nombre+teléfono
        const existe=o.clientes.find(c=>c.nombre.toLowerCase()===nombre.toLowerCase()&&(c.telefono||'')===(r.telefono||'').trim());
        if(existe){ duplicados++; return; }
        const tarifa=parseFloat(r.tarifamensual||r.tarifaMensual||0);
        o.clientes.push({
            id:uid(), nombre,
            telefono:(r.telefono||'').trim(),
            direccion:(r.direccion||'').trim(),
            plan:r.plan||'Otro',
            tarifaMensual:tarifa,
            estado:r.estado||'Activo',
            observaciones:(r.observaciones||'').trim(),
            fechaInstalacion:(r.fechainstalacion||r.fechaInstalacion||'').trim(),
            vendedorId:'',
            comisionesEstado:{instalacion:'pendiente',primerMes:'pendiente',segundoMes:'pendiente'},
            fechaRegistro:now(), importado:true
        });
        importados++;
    });
    save(); closeModal(); _csvData=[];
    alert(`✅ Importación completada:\n• ${importados} clientes importados\n• ${duplicados} duplicados omitidos`);
    renderClientes();
}

function renderBonusTiers(){
    const tiers=DB.bonusTiers||[];
    const list=document.getElementById('bonus_tiers_list');
    if(!list) return;
    list.innerHTML=tiers.map((t,i)=>`
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;">

            <label>Nivel ${i+1} — Clientes M1</label>
            <input type="number" value="${t.clientes}" min="1" class="form-control" oninput="DB.bonusTiers[${i}].clientes=parseInt(this.value)||0;renderBonusTiers()">
        </div>
        <div class="form-group-dark" style="margin:0">
            <label>Bono (COP)</label>
            <input type="number" value="${t.bono}" min="0" step="10000" class="form-control" oninput="DB.bonusTiers[${i}].bono=parseInt(this.value)||0;renderBonusTiers()">
        </div>
        <button class="btn btn-danger btn-sm" onclick="eliminarNivelBono(${i})" ${tiers.length<=1?'disabled':''}>🗑️</button>
    </div>`).join('');

    const prev=document.getElementById('bonus_preview');
    if(!prev) return;
    prev.innerHTML=tiers.sort((a,b)=>a.clientes-b.clientes).map((t,i)=>`
    <div style="background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(6,214,160,0.05));border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <div>
            <div style="font-weight:700;">👥 ${t.clientes} clientes con M1 pagado</div>
            <div style="font-size:0.75rem;color:var(--muted);">Nivel ${i+1}</div>
        </div>
        <div style="font-size:1.3rem;font-weight:800;color:#f59e0b;">🎁 ${fmtShort(t.bono)}</div>
    </div>`).join('');
}

function agregarNivelBono(){
    if(!DB.bonusTiers) DB.bonusTiers=[];
    const last=DB.bonusTiers[DB.bonusTiers.length-1];
    DB.bonusTiers.push({clientes:last?last.clientes+10:10, bono:last?last.bono+150000:200000});
    renderBonusTiers();
}

function eliminarNivelBono(i){
    if((DB.bonusTiers||[]).length<=1) return;
    DB.bonusTiers.splice(i,1);
    renderBonusTiers();
}

function calcularBono(clientesM1){
    const tiers=(DB.bonusTiers||[]).sort((a,b)=>b.clientes-a.clientes);
    for(const t of tiers){ if(clientesM1>=t.clientes) return t.bono; }
    return 0;
}

function calcularTotalBonos(ventas){
    const resumen={};
    ventas.forEach(v=>{ if(!resumen[v.vendedor]) resumen[v.vendedor]=0; if(v.pagoM1) resumen[v.vendedor]++; });
    return Object.values(resumen).reduce((s,c)=>s+calcularBono(c),0);
}

function toggleOtraPromoV(){
    const v=document.getElementById('nv_promo')?.value;

function cargarTasasVenta(){
    const sel=document.getElementById('nv_vendedor');
    const opt=sel?.options[sel.selectedIndex];
    if(!opt||!opt.value) return;
    document.getElementById('nv_pct1').value=opt.dataset.p1||0;
    document.getElementById('nv_pct2').value=opt.dataset.p2||0;
    document.getElementById('nv_pct3').value=opt.dataset.p3||0;
    recalcVenta();
}

function recalcVenta(){
    const val=parseFloat(document.getElementById('nv_valor')?.value||0);
    const p1=parseFloat(document.getElementById('nv_pct1')?.value||0);
    const p2=parseFloat(document.getElementById('nv_pct2')?.value||0);
    const p3=parseFloat(document.getElementById('nv_pct3')?.value||0);
    const v1=document.getElementById('nv_v1'); if(v1) v1.textContent=val?'= '+fmtShort(val*p1/100):'';
    const v2=document.getElementById('nv_v2'); if(v2) v2.textContent=val?'= '+fmtShort(val*p2/100):'';
    const v3=document.getElementById('nv_v3'); if(v3) v3.textContent=val?'= '+fmtShort(val*p3/100):'';
    const tot=document.getElementById('nv_total');
    if(tot){ const s=p1+p2+p3; tot.innerHTML=`Total: <strong style="color:${s>100?'#ef4444':'var(--accent)'}">${s}%</strong>${val?' = '+fmtShort(val*s/100):''}${s>100?'<span style="color:#ef4444;margin-left:8px;">⚠️ Supera 100%</span>':''}`; }
}

    const p1=parseFloat(document.getElementById('nv_pct1').value||0);
    const p2=parseFloat(document.getElementById('nv_pct2').value||0);

        id:uid(),

        fechaPagoInst:instalado?document.getElementById('nv_fecha').value:null,
        fechaPagoM1:null, fechaPagoM2:null,
        comisionInst:instalado?valor*(p1/100):0,
        comisionM1:0, comisionM2:0
