function exportarVentasExcel(){
    if(typeof XLSX==='undefined'){
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=()=>_exportarVentasExcel();
        document.head.appendChild(s);
    } else { _exportarVentasExcel(); }
}

function _exportarVentasExcel(){
    const ventas=getVentasOficina();
    if(!ventas.length) return alert('No hay ventas para exportar');
    const data=[['Fecha','Vendedor','Cliente','Plan','Valor','Promoción','Instalado','Pago M1','Pago M2','Com. Inst','Com. M1','Com. M2','% Inst','% M1','% M2']];
    ventas.forEach(v=>{
        const p=v.pct||{instalacion:0,primerMes:0,segundoMes:0};
        const promoLabel=PROMOS[v.promo]?.label||v.otraPromo||v.promo||'-';
        data.push([v.fecha,v.vendedor,v.cliente,v.plan,v.valor,promoLabel,
            v.instalado?'SI':'NO',v.pagoM1?'SI':'NO',v.pagoM2?'SI':'NO',
            v.comisionInst||0,v.comisionM1||0,v.comisionM2||0,
            p.instalacion,p.primerMes,p.segundoMes]);
    });
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:12},{wch:20},{wch:20},{wch:18},{wch:12},{wch:15},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:12},{wch:8},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,'Ventas');
    XLSX.writeFile(wb,'Ventas_PV_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ═══════════════════════════════════════════════════════════════

let rrhhFichajeId = null;

// ── HELPERS ──────────────────────────────────────────────────────
function guardarRRHH(){ save(); }
function fmtCOP(n){ return '$'+Math.round(n||0).toLocaleString('es-CO'); }
function iniciales(nombre){ return (nombre||'').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase(); }
function empStatusClass(e){ return e==='Activo'?'motivo-activo':e==='Inactivo'?'motivo-retirado':e==='Vacaciones'?'tag-banc':'tag-ef'; }

// ── RENDER PRINCIPAL ─────────────────────────────────────────────
function renderRRHH(){
    const content=document.getElementById('appContent');
    const tab=window._rrhhTab||'directorio';
    const empleados=DB.empleados||[];

    const activos=empleados.filter(e=>e.estado==='Activo').length;
    const hoyStr=new Date().toLocaleDateString('es-CO');
    const fichandoHoy=empleados.filter(e=>(e.asistencia||[]).find(r=>r.fecha===hoyStr&&r.e1)).length;

    content.innerHTML=`
    <div class="stats-grid" style="margin-bottom:16px;">
        <div class="stat-card green"><div class="label">👥 Total empleados</div><div class="value">${empleados.length}</div></div>
        <div class="stat-card blue"><div class="label">✅ Activos</div><div class="value">${activos}</div></div>
        <div class="stat-card yellow"><div class="label">⏱️ En oficina hoy</div><div class="value">${fichandoHoy}</div></div>
        <div class="stat-card green"><div class="label">🎂 Cumpleaños mes</div><div class="value">${_contarCumplemes()}</div></div>
    </div>

    <div class="rrhh-tabs">
        ${[['directorio','📋 Directorio'],['asistencia','⏱️ Asistencia'],['nomina','💰 Nómina'],['prestaciones','🎁 Prestaciones'],['config','⚙️ Config']].map(([t,l])=>
            `<button onclick="window._rrhhTab='${t}';renderRRHH()" class="rrhh-tab ${tab===t?'active':''}">${l}</button>`
        ).join('')}
        <button class="btn btn-primary btn-sm" onclick="modalNuevoEmpleado()" style="margin-left:auto;">➕ Nuevo Empleado</button>
    </div>
    <div id="rrhh_content"></div>`;

    if(tab==='directorio') renderRRHHDirectorio();
    else if(tab==='asistencia') renderRRHHAsistencia();
    else if(tab==='nomina') renderRRHHNomina();
    else if(tab==='prestaciones') renderRRHHPrestaciones();
    else if(tab==='config') renderRRHHConfig();
}

function _contarCumplemes(){
    const m=new Date().getMonth()+1;
    return (DB.empleados||[]).filter(e=>e.fechaNacimiento&&new Date(e.fechaNacimiento).getMonth()+1===m).length;
}

// ── DIRECTORIO ───────────────────────────────────────────────────
function renderRRHHDirectorio(){
    const empleados=DB.empleados||[];
    const q=(window._qEmp||'').toLowerCase();
    const fEst=window._fEmpEst||'';
    const filtrados=empleados.filter(e=>{
        const mq=!q||(e.nombre||'').toLowerCase().includes(q)||(e.cargo||'').toLowerCase().includes(q)||(e.documento||'').includes(q);
        const me=!fEst||e.estado===fEst;
        return mq&&me;
    });

    // Cumpleaños banner
    const mes=new Date().getMonth()+1;
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const cumple=empleados.filter(e=>e.fechaNacimiento&&new Date(e.fechaNacimiento).getMonth()+1===mes).sort((a,b)=>new Date(a.fechaNacimiento).getDate()-new Date(b.fechaNacimiento).getDate());

    document.getElementById('rrhh_content').innerHTML=`
    ${cumple.length>0?`<div class="birthday-banner">
        <div style="font-weight:800;font-size:1rem;color:#ec4899;margin-bottom:10px;">🎂 Cumpleaños de ${meses[mes-1]}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${cumple.map(e=>{
                const d=new Date(e.fechaNacimiento);
                const age=new Date().getFullYear()-d.getFullYear();
                return `<div style="background:rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;">
                    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:0.8rem;">${iniciales(e.nombre)}</div>
                    <div><div style="font-weight:700;font-size:0.85rem;">${e.nombre}</div><div style="font-size:0.72rem;color:var(--muted);">📅 Día ${d.getDate()} · ${age} años</div></div>
                </div>`;
            }).join('')}
        </div>
    </div>`:''}

    <div class="card">
        <div class="card-header"><h2>📋 Directorio <span>${filtrados.length} empleados</span></h2></div>
        <div class="search-bar" style="margin-bottom:12px;">
            <input class="form-control" placeholder="🔍 Buscar nombre, cargo, documento..." value="${window._qEmp||''}" oninput="window._qEmp=this.value;renderRRHHDirectorio()" style="flex:1;">
            <select class="form-control" style="width:auto;" onchange="window._fEmpEst=this.value;renderRRHHDirectorio()">
                <option value="">Todos los estados</option>
                <option value="Activo" ${fEst==='Activo'?'selected':''}>Activo</option>
                <option value="Inactivo" ${fEst==='Inactivo'?'selected':''}>Inactivo</option>
                <option value="Vacaciones" ${fEst==='Vacaciones'?'selected':''}>Vacaciones</option>
                <option value="Licencia" ${fEst==='Licencia'?'selected':''}>Licencia</option>
            </select>
        </div>
        ${filtrados.length===0?'<p style="color:var(--muted);text-align:center;padding:30px;">Sin empleados registrados.</p>':
        filtrados.map(e=>`
        <div class="emp-card" onclick="modalVerEmpleado(${e.id})">
            <div style="display:flex;align-items:center;gap:12px;">
                <div class="emp-avatar">${iniciales(e.nombre)}</div>
                <div>
                    <div style="font-weight:700;">${e.nombre}</div>
                    <div style="font-size:0.78rem;color:var(--muted);">${e.cargo} · ${e.departamento}</div>
                    <div style="font-size:0.75rem;color:var(--muted);">${e.tipoDoc} ${e.documento} · 📱${e.telefono||'-'}</div>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <span class="tag ${empStatusClass(e.estado)}">${e.estado}</span>
                <div style="font-size:0.75rem;color:var(--muted);">${e.tipoContrato}</div>
                <div style="font-size:0.8rem;color:#10b981;font-weight:700;">${fmtCOP(e.salario)}/mes</div>
                <div style="display:flex;gap:5px;" onclick="event.stopPropagation()">
                    <button class="btn btn-outline btn-sm" onclick="modalEditarEmpleado(${e.id})">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarEmpleado_rrhh(${e.id})">🗑️</button>
                </div>
            </div>
        </div>`).join('')}
    </div>`;
}

// ── ASISTENCIA ───────────────────────────────────────────────────
function renderRRHHAsistencia(){
    const empleados=DB.empleados||[];
    const hoyStr=new Date().toLocaleDateString('es-CO');
    document.getElementById('rrhh_content').innerHTML=`
    <div id="clock_panel_wrap"></div>
    <div class="card">
        <div class="card-header"><h2>⏱️ Control de Asistencia <span>— ${hoyStr}</span></h2></div>
        ${empleados.length===0?'<p style="color:var(--muted);text-align:center;padding:30px;">Sin empleados.</p>':
        empleados.map(e=>{
            const reg=(e.asistencia||[]).find(r=>r.fecha===hoyStr)||{};
            const estado=reg.s2?'✅ Jornada completa':reg.e2?'🟢 Tarde':reg.s1?'🟡 Almuerzo':reg.e1?'🟢 Mañana':'⚫ Sin registro';
            return `<div class="emp-card" onclick="seleccionarFichaje(${e.id})" style="${rrhhFichajeId===e.id?'border-color:var(--accent);':''}">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="emp-avatar">${iniciales(e.nombre)}</div>
                    <div>
                        <div style="font-weight:700;">${e.nombre}</div>
                        <div style="font-size:0.78rem;color:var(--muted);">${e.cargo}</div>
                        <div style="font-size:0.75rem;margin-top:3px;">${estado}</div>
                    </div>
                </div>
                <div style="font-size:0.75rem;color:var(--muted);text-align:right;">
                    ${reg.e1?`E1:${reg.e1}`:'E1:--'} ${reg.s1?`S1:${reg.s1}`:'S1:--'}<br>
                    ${reg.e2?`E2:${reg.e2}`:'E2:--'} ${reg.s2?`S2:${reg.s2}`:'S2:--'}
                </div>
            </div>`;
        }).join('')}
    </div>`;
    if(rrhhFichajeId) renderClockPanel();
}

function seleccionarFichaje(id){
    rrhhFichajeId=id;
    renderRRHHAsistencia();
}

function renderClockPanel(){
    const e=(DB.empleados||[]).find(x=>x.id===rrhhFichajeId);
    if(!e) return;
    const hoyStr=new Date().toLocaleDateString('es-CO');
    const reg=(e.asistencia||[]).find(r=>r.fecha===hoyStr)||{};
    const wrap=document.getElementById('clock_panel_wrap');
    if(!wrap) return;

    const btnState=(key,cond)=>cond?'active-btn':'';
    const btnDis=(cond)=>cond?'':'disabled';

    wrap.innerHTML=`
    <div class="clock-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
            <div style="font-weight:800;font-size:1rem;">⏱️ Fichaje — ${e.nombre}</div>
            <div style="font-size:0.78rem;color:var(--muted);">${hoyStr}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
            <button class="clock-btn clock-e1 ${btnState('e1',reg.e1&&!reg.s1)}" onclick="registrarHora_rrhh('e1')" ${reg.e1?'disabled':''}>
                🕗 Entrada 1<br><small style="font-size:0.7rem;">${reg.e1||'--:--'}</small>
            </button>
            <button class="clock-btn clock-s1 ${btnState('s1',reg.s1&&!reg.e2)}" onclick="registrarHora_rrhh('s1')" ${!reg.e1||reg.s1?'disabled':''}>
                🍽️ Salida Alm.<br><small style="font-size:0.7rem;">${reg.s1||'--:--'}</small>
            </button>
            <button class="clock-btn clock-e2 ${btnState('e2',reg.e2&&!reg.s2)}" onclick="registrarHora_rrhh('e2')" ${!reg.s1||reg.e2?'disabled':''}>
                🕑 Entrada 2<br><small style="font-size:0.7rem;">${reg.e2||'--:--'}</small>
            </button>
            <button class="clock-btn clock-s2 ${btnState('s2',reg.s2)}" onclick="registrarHora_rrhh('s2')" ${!reg.e2||reg.s2?'disabled':''}>
                🏠 Salida Final<br><small style="font-size:0.7rem;">${reg.s2||'--:--'}</small>
            </button>
        </div>
        ${reg.s2?'<div style="text-align:center;color:#10b981;font-weight:700;">✅ Jornada completa</div>':''}
    </div>`;
}

// ── NÓMINA ───────────────────────────────────────────────────────
function renderRRHHNomina(){
    const cfg=DB.rrhhConfig||{salud:4,pension:4};
    const mes=window._rrhhMes||new Date().toISOString().slice(0,7);
    const empFil=window._rrhhEmpNom||'all';
    const empleados=(DB.empleados||[]).filter(e=>empFil==='all'||String(e.id)===String(empFil));
    let totalDev=0,totalDed=0,totalNet=0;

    const filas=empleados.map(e=>{
        const salario=parseInt(e.salario)||0;
        const aux=parseInt(e.auxTrans)||0;
        const trans=(DB.transacciones||[]).filter(t=>String(t.empleadoId)===String(e.id)&&t.mes===mes);
        const adelantos=trans.filter(t=>t.tipo==='adelanto').reduce((s,t)=>s+parseFloat(t.valor||0),0);
        const otrasDed=trans.filter(t=>t.tipo==='deduccion').reduce((s,t)=>s+parseFloat(t.valor||0),0);
        const salud=salario*(cfg.salud/100);
        const pension=salario*(cfg.pension/100);
        const devengado=salario+aux;
        const deducciones=salud+pension+adelantos+otrasDed;
        const neto=devengado-deducciones;
        totalDev+=devengado; totalDed+=deducciones; totalNet+=neto;
        return {e,salario,aux,adelantos,otrasDed,salud,pension,devengado,deducciones,neto};
    });

    document.getElementById('rrhh_content').innerHTML=`
    <div class="payroll-banner">
        <div style="font-weight:800;font-size:1rem;color:#a78bfa;margin-bottom:12px;">💰 Módulo de Nómina</div>
        <div class="stats-grid">
            <div class="stat-card green" style="padding:12px"><div class="label">📥 Total Devengado</div><div class="value" style="font-size:1.1rem;">${fmtCOP(totalDev)}</div></div>
            <div class="stat-card red" style="padding:12px"><div class="label">📤 Total Deducciones</div><div class="value" style="font-size:1.1rem;">${fmtCOP(totalDed)}</div></div>
            <div class="stat-card blue" style="padding:12px"><div class="label">💵 Neto a Pagar</div><div class="value" style="font-size:1.1rem;">${fmtCOP(totalNet)}</div></div>
            <div class="stat-card yellow" style="padding:12px"><div class="label">👥 Empleados</div><div class="value">${empleados.length}</div></div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>📋 Detalle de Nómina</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <input type="month" value="${mes}" class="form-control" style="width:auto;" onchange="window._rrhhMes=this.value;renderRRHHNomina()">
                <select class="form-control" style="width:auto;" onchange="window._rrhhEmpNom=this.value;renderRRHHNomina()">
                    <option value="all">Todos</option>
                    ${(DB.empleados||[]).map(e=>`<option value="${e.id}" ${String(e.id)===String(empFil)?'selected':''}>${e.nombre}</option>`).join('')}
                </select>
                <button class="btn btn-outline btn-sm" onclick="exportarNominaRRHH('${mes}')">📥 Excel</button>
            </div>
        </div>
        ${filas.length===0?'<p style="color:var(--muted);text-align:center;padding:20px;">Sin empleados.</p>':
        `<div class="table-wrap"><table>
            <thead><tr><th>Empleado</th><th>Salario</th><th>Aux. Trans.</th><th>Salud (${cfg.salud}%)</th><th>Pensión (${cfg.pension}%)</th><th>Adelantos</th><th>Otras Ded.</th><th>Neto</th><th></th></tr></thead>
            <tbody>${filas.map(({e,salario,aux,salud,pension,adelantos,otrasDed,neto})=>`<tr>
                <td><strong>${e.nombre}</strong><br><small style="color:var(--muted)">${e.cargo}</small></td>
                <td class="money pos">${fmtCOP(salario)}</td>
                <td>${fmtCOP(aux)}</td>
                <td class="money neg">${fmtCOP(salud)}</td>
                <td class="money neg">${fmtCOP(pension)}</td>
                <td class="money neg">${fmtCOP(adelantos)}</td>
                <td class="money neg">${fmtCOP(otrasDed)}</td>
                <td><strong class="money pos">${fmtCOP(neto)}</strong></td>
                <td><button class="btn btn-outline btn-sm" onclick="modalTransacciones(${e.id},'${mes}')">💳 Trans.</button></td>
            </tr>`).join('')}</tbody>
        </table></div>`}
    </div>`;
}

function modalTransacciones(eid, mes){
    const e=(DB.empleados||[]).find(x=>x.id===eid); if(!e) return;
    const trans=(DB.transacciones||[]).filter(t=>String(t.empleadoId)===String(eid)&&t.mes===mes);
    openModal(`💳 Transacciones — ${e.nombre}`,`
    <div class="form-row">
        <div class="form-group-dark"><label>Tipo</label>
            <select id="tr_tipo" class="form-control"><option value="adelanto">Adelanto Nómina</option><option value="deduccion">Otra Deducción</option></select>
        </div>
        <div class="form-group-dark"><label>Descripción</label><input id="tr_desc" class="form-control" placeholder="Ej: Adelanto quincenal"></div>
    </div>
    <div class="form-row">
        <div class="form-group-dark"><label>Valor (COP)</label><input type="number" id="tr_valor" class="form-control" placeholder="0"></div>
        <div class="form-group-dark"><label>Fecha</label><input type="date" id="tr_fecha" class="form-control" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:14px;" onclick="guardarTransaccion(${eid},'${mes}')">➕ Agregar</button>
    <div style="max-height:220px;overflow-y:auto;">
        ${trans.length===0?'<p style="color:var(--muted);text-align:center;padding:10px;">Sin transacciones este mes.</p>':
        trans.map(t=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
            <div><div style="font-size:0.85rem;font-weight:600;">${t.descripcion}</div>
            <div style="font-size:0.72rem;color:var(--muted);">${t.tipo==='adelanto'?'Adelanto':'Deducción'} · ${t.fecha}</div></div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="money neg">${fmtCOP(t.valor)}</span>
                <button class="btn btn-danger btn-sm" onclick="eliminarTransaccion_rrhh(${t.id})">🗑️</button>
            </div>
        </div>`).join('')}
    </div>
    `,'');
}

function guardarTransaccion(eid,mes){
    const desc=document.getElementById('tr_desc').value.trim();
    const valor=parseFloat(document.getElementById('tr_valor').value||0);
    if(!desc||!valor) return alert('Completa descripción y valor');
    if(!DB.transacciones) DB.transacciones=[];
    DB.transacciones.push({
        id:Date.now(), empleadoId:eid, mes,
        tipo:document.getElementById('tr_tipo').value,
        descripcion:desc, valor,
        fecha:document.getElementById('tr_fecha').value
    });
    guardarRRHH(); closeModal(); renderRRHHNomina();
}

function eliminarTransaccion_rrhh(id){
    if(!confirm('¿Eliminar esta transacción?')) return;
    DB.transacciones=(DB.transacciones||[]).filter(t=>t.id!==id);
    guardarRRHH(); closeModal(); renderRRHHNomina();
}

function exportarNominaRRHH(mes){
    if(typeof XLSX==='undefined'){
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=()=>_exportarNomina(mes); document.head.appendChild(s);
    } else _exportarNomina(mes);
}

function _exportarNomina(mes){
    const cfg=DB.rrhhConfig||{salud:4,pension:4};
    const data=[['Empleado','Cargo','Salario','Aux. Trans','Salud','Pensión','Adelantos','Otras Ded.','Neto']];
    (DB.empleados||[]).forEach(e=>{
        const sal=parseInt(e.salario)||0, aux=parseInt(e.auxTrans)||0;
        const trans=(DB.transacciones||[]).filter(t=>String(t.empleadoId)===String(e.id)&&t.mes===mes);
        const ad=trans.filter(t=>t.tipo==='adelanto').reduce((s,t)=>s+parseFloat(t.valor||0),0);
        const od=trans.filter(t=>t.tipo==='deduccion').reduce((s,t)=>s+parseFloat(t.valor||0),0);
        const sal_d=sal*(cfg.salud/100), pen=sal*(cfg.pension/100);
        data.push([e.nombre,e.cargo,sal,aux,sal_d,pen,ad,od,(sal+aux)-sal_d-pen-ad-od]);
    });
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:25},{wch:18},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,'Nómina');
    XLSX.writeFile(wb,`Nomina_PV_${mes}.xlsx`);
}

// ── PRESTACIONES ─────────────────────────────────────────────────
function renderRRHHPrestaciones(){
    const cfg=DB.rrhhConfig||{interesesCesantias:12};
    const eid=window._rrhhEmpBen||'';
    const mes=window._rrhhMesBen||new Date().toISOString().slice(0,7);
    const dias=parseInt(window._rrhhDias||30);
    const e=eid?(DB.empleados||[]).find(x=>String(x.id)===String(eid)):null;

    let vac=0,prima=0,ces=0,intCes=0;
    if(e){
        const sal=parseInt(e.salario)||0;
        const meses=dias/30;
        vac=(sal/24)*meses;
        prima=(sal/12)*meses;
        ces=(sal/12)*meses;
        intCes=(ces*(cfg.interesesCesantias/100))/12;
    }
    const total=vac+prima+ces+intCes;

    document.getElementById('rrhh_content').innerHTML=`
    <div class="benefits-banner">
        <div style="font-weight:800;font-size:1rem;color:#10b981;margin-bottom:12px;">🎁 Prestaciones Sociales — Legislación Colombiana</div>
        <div class="form-row" style="margin-bottom:14px;">
            <div class="form-group-dark" style="margin:0"><label>Empleado</label>

function exportarPrestacionesRRHH(){
    if(typeof XLSX==='undefined'){
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=()=>_exportarPrestaciones(); document.head.appendChild(s);
    } else _exportarPrestaciones();
}

function _exportarPrestaciones(){
    const cfg=DB.rrhhConfig||{interesesCesantias:12};
    const eid=window._rrhhEmpBen;
    const e=(DB.empleados||[]).find(x=>String(x.id)===String(eid));
    if(!e) return;
    const dias=parseInt(window._rrhhDias||30);
    const sal=parseInt(e.salario)||0, m=dias/30;
    const vac=(sal/24)*m,prima=(sal/12)*m,ces=(sal/12)*m,intCes=(ces*(cfg.interesesCesantias/100))/12;
    const data=[{Empleado:e.nombre,Documento:`${e.tipoDoc} ${e.documento}`,Salario:sal,Dias:dias,Vacaciones:Math.round(vac),Prima:Math.round(prima),Cesantias:Math.round(ces),InteresesCesantias:Math.round(intCes),Total:Math.round(vac+prima+ces+intCes)}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),'Prestaciones');
    XLSX.writeFile(wb,`Prestaciones_${e.nombre.replace(/\s+/g,'_')}_${window._rrhhMesBen||''}.xlsx`);
}

function rrhhGuardarEmpleado(editId){
    const nombre=document.getElementById('rh_nombre').value.trim();
    const doc=document.getElementById('rh_doc').value.trim();
    if(!nombre||!doc) return alert('Nombre y documento son obligatorios');
    if(!DB.rrhh_empleados) DB.rrhh_empleados=[];
    const data={
        nombre, tipoDoc:document.getElementById('rh_tdoc').value,
        documento:doc, cargo:document.getElementById('rh_cargo').value.trim(),
        departamento:document.getElementById('rh_depto').value.trim(),
        tipoContrato:document.getElementById('rh_contrato').value,
        fechaIngreso:document.getElementById('rh_ingreso').value,
        salario:document.getElementById('rh_salario').value,
        auxTrans:document.getElementById('rh_aux').value||0,
        fechaNacimiento:document.getElementById('rh_nacimiento').value,
        telefono:document.getElementById('rh_tel').value,
        email:document.getElementById('rh_email').value,
        estado:document.getElementById('rh_estado').value,
        direccion:document.getElementById('rh_dir').value,
        beneficios:document.getElementById('rh_ben').value,
    };
    if(editId){
        const idx=DB.rrhh_empleados.findIndex(x=>x.id===editId);
        if(idx>=0){ data.id=editId; data.asistencia=DB.rrhh_empleados[idx].asistencia||[]; DB.rrhh_empleados[idx]=data; }
    } else {
        data.id=Date.now(); data.asistencia=[];
        DB.rrhh_empleados.push(data);
    }
    saveRRHH(); closeModal(); rrhhDirectorio();
}

function rrhhModalEditarEmpleado(id){ rrhhModalNuevoEmpleado(id); }

function rrhhEliminarEmpleado(id){
    if(!confirm('¿Eliminar empleado y todo su historial?')) return;
    DB.rrhh_empleados=(DB.rrhh_empleados||[]).filter(e=>e.id!==id);
    DB.rrhh_transacciones=(DB.rrhh_transacciones||[]).filter(t=>t.empleadoId!==id);
    saveRRHH(); rrhhDirectorio();
}

// ── ASISTENCIA ────────────────────────────────────────────────────
function rrhhAsistencia(){
    const empleados=getRRHH();
    const mes=window._rrhhMesRep||(new Date().toISOString().slice(0,7));
    const filtEmp=window._rrhhRepEmp||'all';
    let registros=[];
    empleados.forEach(e=>{
        if(filtEmp!=='all'&&String(e.id)!==String(filtEmp)) return;
        (e.asistencia||[]).forEach(r=>{
            if(r.fecha&&r.fecha.includes(mes.replace('-','/'))) registros.push({...r,empNombre:e.nombre,empDepto:e.departamento,empId:e.id});
        });
    });
    registros.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    const completos=registros.filter(r=>r.e1&&r.s2).length;
    const incompletos=registros.filter(r=>r.e1&&!r.s2).length;

    document.getElementById('rrhh_content').innerHTML=`
    <div class="card" style="margin-bottom:16px;">
        <div class="card-header"><h2>⏱️ Control de Fichaje</h2></div>
        <div class="rrhh-clock-panel">
            <p style="color:rgba(255,255,255,0.7);font-size:0.82rem;margin-bottom:10px;">Selecciona un empleado de la lista para registrar su jornada</p>
            <div class="form-group-dark" style="margin-bottom:10px;">
                <select id="rrhh_sel_fichaje" class="form-control" onchange="rrhhSelFichajeById(this.value)" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#fff;">
                    <option value="">Seleccionar empleado...</option>
                    ${empleados.map(e=>`<option value="${e.id}">${e.nombre} — ${e.cargo}</option>`).join('')}
                </select>
            </div>
            <div id="rrhh_clock_panel_inner" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <div style="font-weight:700;color:#fff;" id="rrhh_clock_name">—</div>
                    <div id="rrhh_clock_status" style="font-size:0.78rem;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);">Sin registro hoy</div>
                </div>
                <div class="rrhh-clock-btns">
                    <button id="rrhh_btn_e1" class="rrhh-clock-btn" style="background:#10b981;" onclick="rrhhFichar('e1')">🕗 Entrada 1</button>
                    <button id="rrhh_btn_s1" class="rrhh-clock-btn" style="background:#f59e0b;" onclick="rrhhFichar('s1')">🍽️ Sal. Almuerzo</button>
                    <button id="rrhh_btn_e2" class="rrhh-clock-btn" style="background:#3b82f6;" onclick="rrhhFichar('e2')">🕑 Entrada 2</button>
                    <button id="rrhh_btn_s2" class="rrhh-clock-btn" style="background:#ef4444;" onclick="rrhhFichar('s2')">🏠 Salida Final</button>
                </div>
                <div style="margin-top:10px;background:rgba(255,255,255,0.06);border-radius:6px;padding:10px;font-size:0.82rem;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                    <div style="color:rgba(255,255,255,0.6);">Entrada 1: <strong id="rrhh_t_e1" style="color:#fff;">--:--</strong></div>
                    <div style="color:rgba(255,255,255,0.6);">Sal. Alm.: <strong id="rrhh_t_s1" style="color:#fff;">--:--</strong></div>

                    <div style="color:rgba(255,255,255,0.6);">Sal. Final: <strong id="rrhh_t_s2" style="color:#fff;">--:--</strong></div>

                <td><span style="font-size:0.72rem;font-weight:700;color:${r.e1&&r.s2?'#10b981':'#f59e0b'}">${r.e1&&r.s2?'✅ Completo':'⚠️ Incompleto'}</span></td>
            </tr>`).join('')}</tbody>
        </table></div>`}
    </div>`;

    // Restore fichaje state if selected
    if(_rrhhFichajeId) setTimeout(()=>rrhhActualizarPanelFichaje(_rrhhFichajeId),100);
}

function rrhhSelFichaje(id){
    window._rrhhTab='asistencia'; renderRRHH();
    setTimeout(()=>{ const sel=document.getElementById('rrhh_sel_fichaje'); if(sel){sel.value=id;rrhhSelFichajeById(id);} },150);
}

function rrhhSelFichajeById(id){
    _rrhhFichajeId=parseInt(id)||null;
    const panel=document.getElementById('rrhh_clock_panel_inner');
    if(!panel) return;
    if(!id){ panel.style.display='none'; return; }
    panel.style.display='';
    const e=(DB.rrhh_empleados||[]).find(x=>x.id===parseInt(id));
    const nameEl=document.getElementById('rrhh_clock_name');
    if(nameEl) nameEl.textContent=e?.nombre||'—';
    rrhhActualizarPanelFichaje(parseInt(id));
}

function rrhhActualizarPanelFichaje(id){
    const e=(DB.rrhh_empleados||[]).find(x=>x.id===id); if(!e) return;
    const hoy=new Date().toLocaleDateString();
    const reg=(e.asistencia||[]).find(r=>r.fecha===hoy);
    ['e1','s1','e2','s2'].forEach(k=>{
        const el=document.getElementById('rrhh_t_'+k);
        const btn=document.getElementById('rrhh_btn_'+k);
        if(el) el.textContent=reg?.[k]||'--:--';
        if(btn){ btn.disabled=true; btn.classList.remove('active-btn'); }
    });
    const status=document.getElementById('rrhh_clock_status');
    if(!reg){
        const b=document.getElementById('rrhh_btn_e1'); if(b){b.disabled=false;b.classList.add('active-btn');}
        if(status) status.textContent='Fuera de oficina';
    } else {
        if(reg.e1&&!reg.s1){ const b=document.getElementById('rrhh_btn_s1');if(b){b.disabled=false;b.classList.add('active-btn');} if(status)status.textContent='✅ En oficina (mañana)'; }
        else if(reg.s1&&!reg.e2){ const b=document.getElementById('rrhh_btn_e2');if(b){b.disabled=false;b.classList.add('active-btn');} if(status)status.textContent='🍽️ En descanso'; }
        else if(reg.e2&&!reg.s2){ const b=document.getElementById('rrhh_btn_s2');if(b){b.disabled=false;b.classList.add('active-btn');} if(status)status.textContent='✅ En oficina (tarde)'; }
        else if(reg.s2){ if(status)status.textContent='🏠 Jornada finalizada'; }
    }
}

// ── NÓMINA ────────────────────────────────────────────────────────
function rrhhNomina(){
    const empleados=getRRHH();
    const conf=getRRHHConfig();
    const mes=window._rrhhMesNom||(new Date().toISOString().slice(0,7));
    const filtEmp=window._rrhhNomEmp||'all';
    const activos=empleados.filter(e=>e.estado==='Activo');
    const lista=filtEmp==='all'?activos:activos.filter(e=>String(e.id)===filtEmp);
    let totalDev=0,totalDed=0,totalNeto=0;

    const filas=lista.map(e=>{
        const sal=parseInt(e.salario)||0;
        const aux=parseInt(e.auxTrans)||0;
        const transEmp=(DB.rrhh_transacciones||[]).filter(t=>String(t.empleadoId)===String(e.id)&&t.mes===mes);
        const bonos=transEmp.filter(t=>t.tipo==='bono').reduce((s,t)=>s+parseInt(t.valor||0),0);
        const adelantos=transEmp.filter(t=>t.tipo==='adelanto').reduce((s,t)=>s+parseInt(t.valor||0),0);
        const deducciones=transEmp.filter(t=>t.tipo==='deduccion').reduce((s,t)=>s+parseInt(t.valor||0),0);
        const salud=Math.round(sal*(conf.salud/100));
        const pension=Math.round(sal*(conf.pension/100));
        const devengado=sal+aux+bonos;
        const deduccionTotal=salud+pension+adelantos+deducciones;
        const neto=devengado-deduccionTotal;
        totalDev+=devengado; totalDed+=deduccionTotal; totalNeto+=neto;
        return {e,sal,aux,bonos,adelantos,deducciones,salud,pension,devengado,deduccionTotal,neto,transEmp};
    });

    document.getElementById('rrhh_content').innerHTML=`
    <div class="rrhh-payroll-header" style="color:#fff;margin-bottom:16px;">
        <div style="font-size:1.1rem;font-weight:800;margin-bottom:14px;">💰 Módulo de Nómina</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
            <div class="rrhh-benefit-card"><div style="font-size:1.5rem;font-weight:800;">${fmtShort(totalDev)}</div><div style="font-size:0.75rem;opacity:0.85;">Total Devengado</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:1.5rem;font-weight:800;color:#fca5a5;">${fmtShort(totalDed)}</div><div style="font-size:0.75rem;opacity:0.85;">Total Deducciones</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:1.5rem;font-weight:800;color:#86efac;">${fmtShort(totalNeto)}</div><div style="font-size:0.75rem;opacity:0.85;">Total Neto a Pagar</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:1.5rem;font-weight:800;">${activos.length}</div><div style="font-size:0.75rem;opacity:0.85;">Empleados Activos</div></div>
        </div>
    </div>
    <div class="card">
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
            <input type="month" class="form-control" style="width:auto;" value="${mes}" onchange="window._rrhhMesNom=this.value;rrhhNomina()">
            <select class="form-control" style="width:auto;" onchange="window._rrhhNomEmp=this.value;rrhhNomina()">
                <option value="all">Todos los empleados</option>
                ${activos.map(e=>`<option value="${e.id}" ${filtEmp===String(e.id)?'selected':''}>${e.nombre}</option>`).join('')}
            </select>
        </div>
        ${filas.length===0?'<p style="color:var(--muted);text-align:center;padding:20px;">Sin empleados activos.</p>':
        `<div class="table-wrap"><table>
            <thead><tr><th>Empleado</th><th>Sal. Base</th><th>Aux. Transp.</th><th>Bonos</th><th>Salud (${conf.salud}%)</th><th>Pensión (${conf.pension}%)</th><th>Adelantos</th><th>Otras Ded.</th><th>Neto</th><th></th></tr></thead>
            <tbody>${filas.map(({e,sal,aux,bonos,adelantos,deducciones,salud,pension,neto})=>`<tr>
                <td><strong>${e.nombre}</strong><br><small style="color:var(--muted)">${e.cargo}</small></td>
                <td class="money pos">${fmtShort(sal)}</td>
                <td>${fmtShort(aux)}</td>
                <td>${bonos>0?`<span class="money pos">${fmtShort(bonos)}</span>`:'-'}</td>
                <td class="money neg">${fmtShort(salud)}</td>
                <td class="money neg">${fmtShort(pension)}</td>
                <td>${adelantos>0?`<span class="money neg">${fmtShort(adelantos)}</span>`:'-'}</td>
                <td>${deducciones>0?`<span class="money neg">${fmtShort(deducciones)}</span>`:'-'}</td>
                <td><strong class="money pos">${fmtShort(neto)}</strong></td>
                <td><button class="btn btn-outline btn-sm" onclick="rrhhModalTransacciones(${e.id},'${mes}')">💳</button></td>
            </tr>`).join('')}</tbody>
        </table></div>`}
    </div>`;
}

function rrhhModalTransacciones(empId, mes){
    const e=(DB.rrhh_empleados||[]).find(x=>x.id===empId);
    if(!e) return;
    const trans=(DB.rrhh_transacciones||[]).filter(t=>String(t.empleadoId)===String(empId)&&t.mes===mes);
    const hoy=new Date().toISOString().slice(0,10);
    openModal('💳 Transacciones — '+e.nombre+' ('+mes+')',`
    <div class="form-row">
        <div class="form-group-dark"><label>Tipo</label>
            <select id="rt_tipo" class="form-control">
                <option value="adelanto">Adelanto de Nómina</option>
                <option value="deduccion">Otra Deducción</option>
                <option value="bono">Bono Extra</option>
            </select>
        </div>
        <div class="form-group-dark"><label>Valor (COP)</label><input type="number" id="rt_valor" class="form-control" placeholder="0"></div>
    </div>
    <div class="form-row">
        <div class="form-group-dark"><label>Descripción</label><input id="rt_desc" class="form-control" placeholder="Ej: Adelanto quincenal"></div>
        <div class="form-group-dark"><label>Fecha</label><input type="date" id="rt_fecha" class="form-control" value="${hoy}"></div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:14px;" onclick="rrhhGuardarTrans(${empId},'${mes}')">➕ Agregar</button>
    <div id="rt_lista">
        ${trans.length===0?'<p style="color:var(--muted);font-size:0.82rem;">Sin transacciones este mes.</p>':
        trans.map(t=>`<div class="rrhh-trans-item">
            <div><div style="font-weight:600;">${t.descripcion||t.tipo}</div><div style="font-size:0.72rem;color:var(--muted);">${t.fecha||''}</div></div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="${t.tipo==='bono'?'money pos':'money neg'}">${t.tipo==='bono'?'+':'-'}${fmtShort(parseInt(t.valor||0))}</span>
                <button class="btn btn-danger btn-sm" onclick="rrhhElimTrans(${t.id},${empId},'${mes}')">🗑️</button>
            </div>
        </div>`).join('')}
    </div>
    `,'');
}

function rrhhGuardarTrans(empId, mes){
    const valor=parseInt(document.getElementById('rt_valor').value||0);
    if(!valor||valor<=0) return alert('Ingresa un valor válido');
    if(!DB.rrhh_transacciones) DB.rrhh_transacciones=[];
    DB.rrhh_transacciones.push({
        id:Date.now(), empleadoId:empId, mes,
        tipo:document.getElementById('rt_tipo').value,
        descripcion:document.getElementById('rt_desc').value.trim(),
        valor, fecha:document.getElementById('rt_fecha').value
    });
    saveRRHH(); closeModal(); rrhhNomina();
}

function rrhhElimTrans(tid, empId, mes){
    if(!confirm('¿Eliminar esta transacción?')) return;
    DB.rrhh_transacciones=(DB.rrhh_transacciones||[]).filter(t=>t.id!==tid);
    saveRRHH(); closeModal(); setTimeout(()=>rrhhModalTransacciones(empId,mes),100);
}

// ── PRESTACIONES ──────────────────────────────────────────────────
function rrhhPrestaciones(){
    const empleados=getRRHH();
    const conf=getRRHHConfig();
    const selEmp=window._rrhhBenEmp||'';
    const mes=window._rrhhBenMes||(new Date().toISOString().slice(0,7));
    const dias=parseInt(window._rrhhBenDias||30);
    const e=selEmp?(empleados.find(x=>String(x.id)===String(selEmp))):null;
    let vac=0,prima=0,ces=0,int=0,total=0;
    if(e){
        const sal=parseInt(e.salario)||0;
        const meses=dias/30;
        vac=(sal/24)*meses; prima=(sal/12)*meses; ces=(sal/12)*meses;
        int=(ces*(conf.interesesCesantias/100))/12; total=vac+prima+ces+int;
    }

    document.getElementById('rrhh_content').innerHTML=`
    <div style="background:linear-gradient(135deg,#059669,#10b981);border-radius:12px;padding:20px;margin-bottom:16px;color:#fff;">
        <div style="font-size:1.1rem;font-weight:800;margin-bottom:14px;">🎁 Calculadora de Prestaciones Sociales</div>
        <p style="font-size:0.82rem;opacity:0.9;margin-bottom:14px;">Cálculo automático según legislación laboral colombiana</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
            <select class="form-control" style="width:auto;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);color:#fff;" onchange="window._rrhhBenEmp=this.value;rrhhPrestaciones()">
                <option value="">Seleccionar empleado</option>
                ${empleados.map(emp=>`<option value="${emp.id}" ${String(emp.id)===String(selEmp)?'selected':''}>${emp.nombre}</option>`).join('')}
            </select>
            <input type="month" class="form-control" style="width:auto;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);color:#fff;" value="${mes}" onchange="window._rrhhBenMes=this.value;rrhhPrestaciones()">
            <input type="number" class="form-control" style="width:100px;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);color:#fff;" value="${dias}" placeholder="Días" onchange="window._rrhhBenDias=this.value;rrhhPrestaciones()">
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
            <div class="rrhh-benefit-card"><div style="font-size:0.8rem;opacity:0.85;">🏖️ Vacaciones</div><div style="font-size:1.4rem;font-weight:800;">${fmtShort(Math.round(vac))}</div><div style="font-size:0.7rem;opacity:0.7;">15 días/año</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:0.8rem;opacity:0.85;">💰 Prima</div><div style="font-size:1.4rem;font-weight:800;">${fmtShort(Math.round(prima))}</div><div style="font-size:0.7rem;opacity:0.7;">1 salario/año</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:0.8rem;opacity:0.85;">🏦 Cesantías</div><div style="font-size:1.4rem;font-weight:800;">${fmtShort(Math.round(ces))}</div><div style="font-size:0.7rem;opacity:0.7;">1 salario/año</div></div>
            <div class="rrhh-benefit-card"><div style="font-size:0.8rem;opacity:0.85;">📈 Int. Cesantías</div><div style="font-size:1.4rem;font-weight:800;">${fmtShort(Math.round(int))}</div><div style="font-size:0.7rem;opacity:0.7;">${conf.interesesCesantias}% anual</div></div>
        </div>
        <div style="text-align:center;margin-top:16px;background:rgba(255,255,255,0.15);border-radius:8px;padding:14px;">
            <div style="font-size:0.85rem;margin-bottom:6px;">💵 Total Prestaciones del Período</div>
            <div style="font-size:2rem;font-weight:900;">${fmtShort(Math.round(total))}</div>
        </div>
    </div>
    ${e?`<div class="card"><div class="card-header"><h2>📋 Detalle del Cálculo — ${e.nombre}</h2></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:0.85rem;">
        <div><h4 style="color:var(--accent);margin-bottom:10px;">📊 Info del Empleado</h4>
            <p style="margin-bottom:6px;"><strong>Salario Base:</strong> ${fmtShort(parseInt(e.salario)||0)}</p>
            <p style="margin-bottom:6px;"><strong>Días trabajados:</strong> ${dias}</p>
            <p><strong>Meses equiv.:</strong> ${(dias/30).toFixed(2)}</p>
        </div>
        <div><h4 style="color:var(--accent);margin-bottom:10px;">📐 Fórmulas</h4>
            <p style="margin-bottom:4px;">Vacaciones: (${fmtShort(parseInt(e.salario)||0)} ÷ 24) × ${(dias/30).toFixed(2)} = <strong>${fmtShort(Math.round(vac))}</strong></p>
            <p style="margin-bottom:4px;">Prima: (${fmtShort(parseInt(e.salario)||0)} ÷ 12) × ${(dias/30).toFixed(2)} = <strong>${fmtShort(Math.round(prima))}</strong></p>
            <p style="margin-bottom:4px;">Cesantías: (${fmtShort(parseInt(e.salario)||0)} ÷ 12) × ${(dias/30).toFixed(2)} = <strong>${fmtShort(Math.round(ces))}</strong></p>
            <p>Intereses: ${fmtShort(Math.round(ces))} × ${conf.interesesCesantias}% ÷ 12 = <strong>${fmtShort(Math.round(int))}</strong></p>
        </div>
    </div></div>`:''}`;
}

}

function actualizarConceptosPAInit(){
    actualizarConceptosPATipo(document.getElementById('pa_tipo')?.value||'ingreso');
    document.getElementById('pa_tipo')?.addEventListener('change', function(){ actualizarConceptosPATipo(this.value); });
}

function actualizarConceptosPATipo(tipo){
    const sel=document.getElementById('pa_concepto');
    if(!sel) return;
    const conceptos=tipo==='ingreso'?CONCEPTOS_ING:CONCEPTOS_EGR;
    sel.innerHTML=conceptos.map(c=>`<option>${c}</option>`).join('');
    document.getElementById('pa_concepto_otro_wrap').style.display='none';
}

function actualizarConceptosPA(){
    const val=document.getElementById('pa_concepto')?.value;
    document.getElementById('pa_concepto_otro_wrap').style.display=val==='Otro'?'':'none';
}

function guardarPagoAdmin(){
    const oficinasSelIds=[...document.querySelectorAll('.pa_oficina_check:checked')].map(c=>c.value);
    if(!oficinasSelIds.length) return alert('⚠️ Selecciona al menos una oficina');
    const tipo=document.getElementById('pa_tipo').value;
    const concepto=document.getElementById('pa_concepto').value==='Otro'
        ? document.getElementById('pa_concepto_otro').value.trim()
        : document.getElementById('pa_concepto').value;
    if(!concepto) return alert('⚠️ Selecciona o escribe un concepto');
    const forma=document.getElementById('pa_forma').value;
    const valor=parseFloat(document.getElementById('pa_valor').value||0);
    if(valor<0||isNaN(valor)) return alert('⚠️ Ingresa un valor válido');
    const desc=document.getElementById('pa_desc').value.trim();
    const fechaInput=document.getElementById('pa_fecha').value;
    if(!fechaInput) return alert('⚠️ Selecciona una fecha');
    // Construir fecha con hora actual para preservar orden pero día correcto
    const [y,m,d]=fechaInput.split('-');
    const fechaFinal=new Date(parseInt(y),parseInt(m)-1,parseInt(d),new Date().getHours(),new Date().getMinutes(),new Date().getSeconds()).toISOString();

    // 1. Registrar en historial de pagos admin
    if(!DB.pagosAdmin) DB.pagosAdmin=[];
    const pagoId=uid();
    DB.pagosAdmin.push({
        id:pagoId, tipo, concepto, forma, valor, descripcion:desc,
        oficinas:oficinasSelIds, fecha:fechaFinal, creadoEn:now()
    });

    // 2. Inyectar movimiento en cada oficina seleccionada
    let oficinasOk=[];
    oficinasSelIds.forEach(oid=>{
        const o=DB.oficinas.find(x=>x.id===oid);
        if(!o) return;
        if(!o.movimientos) o.movimientos=[];
        o.movimientos.push({
            id:uid(),
            tipo,
            concepto,
            forma,
            descripcion: (desc?desc+' — ':'')+`Pago registrado por Administrador`,
            valor,
            fecha: fechaFinal,
            esPagoAdmin: true,  // flag para identificarlo
            pagoAdminId: pagoId
        });
        oficinasOk.push(o.nombre);
    });

    save();
    alert('✅ Pago registrado exitosamente en:\n'+oficinasOk.map(n=>'• '+n).join('\n'));

    // Reset form
    document.querySelectorAll('.pa_oficina_check').forEach(c=>c.checked=false);
    document.getElementById('pa_valor').value='';
    document.getElementById('pa_desc').value='';
    renderPagosAdmin();
}

function eliminarPagoAdmin(pid){
    if(!confirm('¿Eliminar este pago del historial?\nNota: también se eliminará de los registros de las oficinas.')) return;
    const pago=(DB.pagosAdmin||[]).find(p=>p.id===pid);
    if(!pago) return;
    // Eliminar de oficinas
    (pago.oficinas||[]).forEach(oid=>{
        const o=DB.oficinas.find(x=>x.id===oid);
        if(o) o.movimientos=(o.movimientos||[]).filter(m=>m.pagoAdminId!==pid);
    });

let _recInterval = null;
let _recPopupActualId = null;

function iniciarMonitorRecordatorios(){
    // Verificar cada minuto
    if(_recInterval) clearInterval(_recInterval);
    _recInterval = setInterval(verificarRecordatorios, 60000);
    verificarRecordatorios(); // Verificar al entrar
}

function verificarRecordatorios(){
    const ahora=Date.now();
    (DB.recordatorios||[]).forEach(r=>{
        if(!r.activo) return;
        const proxima=calcProximaAlarma(r);
        const diff=proxima-ahora;
        // Disparar si faltan menos de 1 minuto o ya pasó (y no fue disparado aún hoy)
        if(diff<=60000&&diff>-300000){
            const yaDisparado=r.ultimoDisparo&&(ahora-new Date(r.ultimoDisparo).getTime())<300000;
            if(!yaDisparado){
                r.ultimoDisparo=new Date().toISOString();
                save();
                mostrarPopupRecordatorio(r);
            }
        }
    });
}

function calcProximaAlarma(r){
    const base=new Date(r.fechaHora);
    const ahora=new Date();
    if(r.recurrencia==='unico') return base;
    if(r.recurrencia==='diario'){
        const prox=new Date(ahora);
        prox.setHours(base.getHours(), base.getMinutes(), 0, 0);
        if(prox<=ahora) prox.setDate(prox.getDate()+1);
        return prox;
    }
    if(r.recurrencia==='semanal'){
        const prox=new Date(ahora);
        prox.setHours(base.getHours(), base.getMinutes(), 0, 0);
        const diasFalta=(base.getDay()-prox.getDay()+7)%7||7;
        prox.setDate(prox.getDate()+diasFalta);
        if(prox<=ahora) prox.setDate(prox.getDate()+7);
        return prox;
    }
    if(r.recurrencia==='mensual'){
        const prox=new Date(ahora);
        prox.setDate(base.getDate());
        prox.setHours(base.getHours(), base.getMinutes(), 0, 0);
        if(prox<=ahora) prox.setMonth(prox.getMonth()+1);
        return prox;
    }
    return base;
}

function mostrarPopupRecordatorio(r){
    _recPopupActualId=r.id;
    document.getElementById('rec-pop-title').textContent=r.titulo||'Recordatorio';
    document.getElementById('rec-pop-msg').textContent=r.mensaje||'';
    document.getElementById('recordatorio-popup').classList.add('show');
    // Sonido beep suave si está disponible
    try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator(); const gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=520; gain.gain.value=0.15;
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
        osc.stop(ctx.currentTime+0.8);
    }catch(e){}
}

function cerrarRecordatorioPopup(){
    document.getElementById('recordatorio-popup').classList.remove('show');
    _recPopupActualId=null;
}

function posponerRecordatorio(){
    if(!_recPopupActualId) return;
    const r=(DB.recordatorios||[]).find(x=>x.id===_recPopupActualId);
    if(r){
        // Posponer 1 hora ajustando ultimoDisparo
        r.ultimoDisparo=new Date(Date.now()+3540000).toISOString(); // -1min para que dispare en ~1h
        save();
    }
    cerrarRecordatorioPopup();
    showSync('ok','Recordatorio pospuesto 1 hora');
}

    const horas=[...document.querySelectorAll('.rec-hora-input')].map(i=>i.value).filter(Boolean);
    if(!horas.length) return alert('Agrega al menos una hora');
    if(!DB.recordatorios) DB.recordatorios=[];
    const recurrencia=document.getElementById('rec_rec').value;
    const msg=document.getElementById('rec_msg').value.trim();
    horas.forEach(hora=>{

        fechaHora.setHours(parseInt(h),parseInt(m),0,0);

function guardarAbono(pid){
    const p=DB.prestamos.find(x=>x.id===pid); if(!p) return;
    const valor=parseFloat(document.getElementById('ab_valor').value||0);
    const marcarPagado=document.getElementById('ab_total').checked;
    if(!valor&&!marcarPagado) return alert('Ingresa un valor de abono');
    if(valor<0) return alert('El valor debe ser positivo');
    if(!p.abonos) p.abonos=[];
    if(valor>0){
        p.abonos.push({
            id:uid(), valor,
            fecha:document.getElementById('ab_fecha').value,
            forma:document.getElementById('ab_forma').value,
            obs:document.getElementById('ab_obs').value.trim()
        });
    }
    const totalAbonado=p.abonos.reduce((s,a)=>s+parseFloat(a.valor||0),0);
    p.saldoPendiente=Math.max(parseFloat(p.monto||0)-totalAbonado,0);
    if(marcarPagado||p.saldoPendiente<=0){
        p.estado='pagado';
        p.fechaPago=new Date().toISOString().slice(0,10);
    }
    save(); closeModal(); renderPrestamos();
}

function eliminarAbono(pid,aid){
    if(!confirm('¿Eliminar este abono?')) return;
    const p=DB.prestamos.find(x=>x.id===pid); if(!p) return;
    p.abonos=(p.abonos||[]).filter(a=>a.id!==aid);
    const totalAbonado=p.abonos.reduce((s,a)=>s+parseFloat(a.valor||0),0);
    p.saldoPendiente=Math.max(parseFloat(p.monto||0)-totalAbonado,0);
    if(p.estado==='pagado'&&p.saldoPendiente>0) p.estado='activo';
    save(); closeModal(); setTimeout(()=>modalAbonarPrestamo(pid),150);
}

function modalVerPrestamo(pid){
    const p=(DB.prestamos||[]).find(x=>x.id===pid); if(!p) return;
    const abonado=(p.abonos||[]).reduce((s,a)=>s+parseFloat(a.valor||0),0);
    const saldo=Math.max(parseFloat(p.monto||0)-abonado,0);
    const pct=p.monto>0?Math.round(abonado/p.monto*100):0;
    const oNombre=p.oid?(DB.oficinas||[]).find(o=>o.id===p.oid)?.nombre||'-':'-';
    openModal('👁️ Detalle — '+p.beneficiario,`
    <div class="reporte-resumen">
        <div class="reporte-item"><div class="r-label">💰 Monto</div><div class="r-val" style="color:#ef4444;">${fmtShort(p.monto)}</div></div>
        <div class="reporte-item"><div class="r-label">✅ Abonado</div><div class="r-val" style="color:#10b981;">${fmtShort(abonado)}</div></div>
        <div class="reporte-item"><div class="r-label">⏳ Saldo</div><div class="r-val" style="color:#f59e0b;">${fmtShort(saldo)}</div></div>
        <div class="reporte-item"><div class="r-label">📊 Progreso</div><div class="r-val" style="color:#3b82f6;">${pct}%</div></div>
    </div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;font-size:0.82rem;">
        <p style="margin-bottom:4px;"><strong>Tipo:</strong> ${p.tipo==='empleado'?'👔 Empleado':'🧑 Tercero'}</p>
        <p style="margin-bottom:4px;"><strong>Oficina:</strong> ${oNombre}</p>
        <p style="margin-bottom:4px;"><strong>Fecha:</strong> ${p.fecha||'-'}</p>
        <p style="margin-bottom:4px;"><strong>Cuotas:</strong> ${p.cuotas||'Sin cuotas definidas'}</p>
        ${p.motivo?`<p style="margin-bottom:4px;"><strong>Motivo:</strong> ${p.motivo}</p>`:''}
        ${p.notas?`<p style="margin-bottom:0;"><strong>Condiciones:</strong> ${p.notas}</p>`:''}
    </div>
    <div style="background:rgba(255,255,255,0.04);border-radius:8px;height:10px;overflow:hidden;margin-bottom:14px;">
        <div style="height:100%;background:${pct>=100?'#10b981':'#f59e0b'};width:${Math.min(pct,100)}%;transition:width 0.5s;"></div>
    </div>
    ${p.abonos?.length>0?`
    <h4 style="font-size:0.85rem;margin-bottom:8px;">📋 Historial de abonos (${p.abonos.length}):</h4>
    <div class="table-wrap"><table>
        <thead><tr><th>Fecha</th><th>Valor</th><th>Forma</th><th>Observación</th></tr></thead>
        <tbody>${p.abonos.slice().reverse().map(a=>`<tr>
            <td style="font-size:0.75rem;">${a.fecha||'-'}</td>
            <td class="money pos">${fmtShort(a.valor)}</td>
            <td style="font-size:0.75rem;">${a.forma||'-'}</td>
            <td style="font-size:0.75rem;color:var(--muted);">${a.obs||'-'}</td>
        </tr>`).join('')}</tbody>
    </table></div>`:'<p style="color:var(--muted);font-size:0.82rem;">Sin abonos registrados.</p>'}
    `,'');
}

function eliminarPrestamo(pid){
    if(!confirm('¿Eliminar este préstamo y todo su historial de abonos?')) return;
    DB.prestamos=(DB.prestamos||[]).filter(p=>p.id!==pid);
    save(); renderPrestamos();
}

// ─── MODAL ──────────────────────────────────────────────────────────────────
function openModal(title,body,footer=''){
    document.getElementById('mTitle').textContent=title;
    document.getElementById('mBody').innerHTML=body;
    document.getElementById('mFooter').innerHTML=footer;
    document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
