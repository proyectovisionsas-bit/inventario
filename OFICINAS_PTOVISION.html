<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINAS · PROYECTOVISION</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #10b981;
            --accent2: #06d6a0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text: #e2e8f0;
            --muted: #64748b;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .hidden { display:none!important; }

        /* ── LOGIN ── */
        #login-screen {
            display:flex; justify-content:center; align-items:center;
            min-height:100vh;
            background: radial-gradient(ellipse at 30% 40%, rgba(16,185,129,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 70%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        linear-gradient(160deg,#050b18 0%,#0a1628 60%,#0d1f3c 100%);
        }
        .login-card {
            background: rgba(17,24,39,0.95);
            border:1px solid var(--border);
            border-radius:20px;
            width:90%; max-width:420px;
            overflow:hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(16,185,129,0.1);
        }
        .login-banner {
            background: linear-gradient(135deg,#064e3b,#065f46,#047857);
            padding:32px 36px 28px;
            text-align:center;
            position:relative; overflow:hidden;
        }
        .login-banner::before {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at 70% 20%, rgba(16,185,129,0.3), transparent 60%);
        }
        .login-banner .icon { font-size:3rem; position:relative; z-index:1; }
        .login-banner h1 { font-size:1.5rem; font-weight:800; letter-spacing:2px; position:relative; z-index:1; margin-top:8px; }
        .login-banner p { font-size:0.8rem; opacity:0.7; position:relative; z-index:1; margin-top:4px; }
        .login-body { padding:28px 32px 32px; }
        .login-tabs { display:flex; background:rgba(255,255,255,0.04); border-radius:10px; padding:4px; gap:4px; margin-bottom:22px; }
        .login-tab { flex:1; padding:8px; text-align:center; cursor:pointer; font-weight:600; font-size:0.82rem; color:var(--muted); border-radius:7px; transition:0.2s; }
        .login-tab.active { background:var(--accent); color:#fff; box-shadow:0 2px 12px rgba(16,185,129,0.4); }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-control { width:100%; padding:10px 12px; background:rgba(255,255,255,0.05); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem; transition:0.2s; }
        .form-control:focus { border-color:var(--accent); outline:none; background:rgba(16,185,129,0.06); }
        .oficina-opt { padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:0.2s; font-size:0.88rem; background:rgba(255,255,255,0.03); }
        .oficina-opt:hover { border-color:var(--accent); background:rgba(16,185,129,0.07); }
        .oficina-opt.selected { border-color:var(--accent); background:rgba(16,185,129,0.12); }
        .btn-login { background:linear-gradient(135deg,#059669,#047857); color:#fff; border:none; width:100%; padding:12px; border-radius:9px; font-weight:700; font-size:0.95rem; cursor:pointer; transition:0.2s; margin-top:6px; letter-spacing:0.5px; }
        .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(5,150,105,0.4); }

        /* ── APP LAYOUT ── */
        #app { display:flex; flex-direction:column; min-height:100vh; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header h1 { font-size:1.1rem; font-weight:800; letter-spacing:1px; }
        .badge { padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.5px; }
        .badge-admin { background:rgba(245,158,11,0.2); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .badge-oficina { background:rgba(16,185,129,0.2); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .header-right { display:flex; align-items:center; gap:10px; }
        .btn { padding:8px 14px; border:none; border-radius:7px; cursor:pointer; font-weight:600; font-size:0.82rem; transition:0.2s; display:inline-flex; align-items:center; gap:5px; }
        .btn:hover { opacity:0.85; transform:translateY(-1px); }
        .btn-sm { padding:5px 10px; font-size:0.78rem; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text); }
        .btn-warning { background:var(--warning); color:#fff; }
        .btn-info { background:var(--info); color:#fff; }

        /* ── NAV ── */
        .nav { background:var(--surface); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:0 12px; gap:2px; }
        .nav-btn { padding:13px 16px; border:none; background:none; cursor:pointer; font-weight:600; font-size:0.82rem; color:var(--muted); border-bottom:3px solid transparent; white-space:nowrap; transition:0.2s; }
        .nav-btn:hover { color:var(--text); }
        .nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

        /* ── CONTAINER ── */
        .container { max-width:1400px; margin:0 auto; padding:20px 15px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
        .card-header h2 { font-size:1.1rem; font-weight:700; color:var(--text); }
        .card-header h2 span { font-size:0.75rem; color:var(--muted); font-weight:400; margin-left:6px; }

        /* ── DASHBOARD STATS ── */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:20px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; position:relative; overflow:hidden; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
        .stat-card.green::before { background:linear-gradient(90deg,#10b981,#06d6a0); }
        .stat-card.red::before { background:linear-gradient(90deg,#ef4444,#f87171); }
        .stat-card.blue::before { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
        .stat-card.yellow::before { background:linear-gradient(90deg,#f59e0b,#fcd34d); }
        .stat-card .label { font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; font-weight:600; }
        .stat-card .value { font-size:1.6rem; font-weight:800; }
        .stat-card.green .value { color:#10b981; }
        .stat-card.red .value { color:#ef4444; }
        .stat-card.blue .value { color:#3b82f6; }
        .stat-card.yellow .value { color:#f59e0b; }
        .stat-card .sub { font-size:0.75rem; color:var(--muted); margin-top:4px; }

        /* ── TABLES ── */
        .table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { background:var(--surface2); padding:10px 12px; text-align:left; color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; border-bottom:1px solid var(--border); }
        td { padding:10px 12px; border-bottom:1px solid rgba(30,45,69,0.5); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.02); }

        /* ── FORM ROWS ── */
        .form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
        .form-group-dark { margin-bottom:12px; }
        .form-group-dark label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
        select.form-control, input.form-control, textarea.form-control { background:rgba(255,255,255,0.05); color:var(--text); }
        select.form-control option { background:var(--surface); }
        textarea.form-control { resize:vertical; min-height:70px; }

        /* ── BADGES ── */
        .tag { padding:2px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; display:inline-block; }
        .tag-ing { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .tag-egr { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }
        .tag-ef { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }
        .tag-banc { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); }
        .tag-efty { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }

        /* ── MODAL ── */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:15px; backdrop-filter:blur(4px); }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:800px; max-height:92vh; overflow-y:auto; animation:popIn 0.2s ease; }
        @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .modal-header h3 { font-size:1rem; font-weight:700; }
        .modal-body { padding:22px; }
        .modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
        .close-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--muted); line-height:1; }
        .close-btn:hover { color:var(--text); }

        /* ── INGRESO/EGRESO ── */
        .two-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        @media(max-width:700px){ .two-cols { grid-template-columns:1fr; } }
        .col-ing { border-left:3px solid var(--accent); padding-left:12px; }
        .col-egr { border-left:3px solid var(--danger); padding-left:12px; }
        .section-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:12px; }
        .section-title.ing { color:var(--accent); }
        .section-title.egr { color:var(--danger); }

        .money { font-family:monospace; font-weight:700; }
        .money.pos { color:#10b981; }
        .money.neg { color:#ef4444; }

        /* ── CAJA DISPLAY ── */
        .caja-display { background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(6,214,160,0.05)); border:1px solid rgba(16,185,129,0.25); border-radius:10px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
        .caja-display .label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
        .caja-display .amount { font-size:2rem; font-weight:900; color:#10b981; font-family:monospace; }

        /* ── LOADING ── */
        #loading-screen { display:flex; justify-content:center; align-items:center; height:100vh; background:var(--bg); flex-direction:column; gap:16px; }
        .spinner { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── SYNC ── */
        #syncStatus { position:fixed; bottom:14px; right:14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-size:0.76rem; display:flex; align-items:center; gap:7px; z-index:999; }
        .sync-dot { width:7px; height:7px; border-radius:50%; }
        .sync-ok { background:#10b981; } .sync-saving { background:#f59e0b; animation:pulse 1s infinite; } .sync-err { background:#ef4444; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

        /* ── DASHBOARD CHART BAR ── */
        .bar-chart { display:flex; flex-direction:column; gap:8px; }
        .bar-row { display:flex; align-items:center; gap:10px; font-size:0.8rem; }
        .bar-label { width:130px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
        .bar-track { flex:1; background:rgba(255,255,255,0.06); border-radius:4px; height:18px; position:relative; overflow:hidden; }
        .bar-fill { height:100%; border-radius:4px; transition:width 0.6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:0.68rem; font-weight:700; color:#fff; white-space:nowrap; }
        .bar-val { width:90px; text-align:right; font-family:monospace; font-size:0.78rem; color:var(--text); flex-shrink:0; }

        /* ── CLIENTES TAB ── */
        .cliente-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
        .cliente-info h4 { font-size:0.92rem; font-weight:700; margin-bottom:3px; }
        .cliente-info p { font-size:0.78rem; color:var(--muted); }
        .cliente-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }

        .motivo-tag { padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:700; }
        .motivo-moroso { background:rgba(239,68,68,0.15); color:#ef4444; }
        .motivo-retirado { background:rgba(100,116,139,0.2); color:#94a3b8; }
        .motivo-activo { background:rgba(16,185,129,0.15); color:#10b981; }

        /* ── REPORTES ── */
        .reporte-resumen { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:18px; }
        .reporte-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; }
        .reporte-item .r-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
        .reporte-item .r-val { font-size:1.3rem; font-weight:800; font-family:monospace; }

        /* ── ADMIN PANEL ── */
        .oficina-admin-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }

        /* ── NOTIF ── */
        .notif-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:8px; font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; }

        /* ── SEARCH ── */
        .search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .search-bar input { flex:1; min-width:180px; }

        @media(max-width:600px){ .header { flex-direction:column; gap:8px; } }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen"><div class="spinner"></div><p style="color:var(--muted);font-size:0.9rem;">Cargando sistema de oficinas...</p></div>

<!-- SYNC STATUS -->
<div id="syncStatus" style="display:none;"><div class="sync-dot sync-ok" id="syncDot"></div><span id="syncText">Listo</span></div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
    <div class="login-card">
        <div class="login-banner">
            <div class="icon">🏢</div>
            <h1>PROYECTOVISION</h1>
            <p>Sistema de Gestión de Oficinas</p>
        </div>
        <div class="login-body">
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLogin('admin')">🔑 Admin</div>
                <div class="login-tab" onclick="switchLogin('oficina')">🏢 Jefe Oficina</div>
            </div>
            <div id="login-admin-sec" class="login-section">
                <div class="form-group">
                    <label>Contraseña Admin</label>
                    <input type="password" id="passAdmin" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin('admin')">
                </div>
                <button class="btn-login" onclick="doLogin('admin')">🔑 Ingresar como Admin</button>
            </div>
            <div id="login-oficina-sec" class="login-section hidden">
                <div class="form-group">
                    <label>Seleccione Oficina</label>
                    <div id="loginOficinaList"></div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="passOficina" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin('oficina')">
                </div>
                <button class="btn-login" onclick="doLogin('oficina')">🏢 Ingresar a Oficina</button>
            </div>
            <p style="text-align:center;margin-top:16px;font-size:0.75rem;color:var(--muted);">
                <a href="index.html" style="color:var(--muted);">← Volver al inicio</a>
            </p>
        </div>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
    <header class="header">
        <div class="header-left">
            <span style="font-size:1.4rem;">🏢</span>
            <h1>PROYECTOVISION <span style="color:var(--accent);font-size:0.7rem;vertical-align:middle;">OFICINAS</span></h1>
            <span id="userBadge" class="badge"></span>
        </div>
        <div class="header-right">
            <span id="clock" style="font-size:0.78rem;color:var(--muted);"></span>
            <button class="btn btn-outline btn-sm admin-only" onclick="openAdminPanel()">⚙️ Admin</button>
            <button class="btn btn-outline btn-sm oficina-only" onclick="modalCambiarPass()">🔑 Cambiar clave</button>
            <button class="btn btn-danger btn-sm" onclick="doLogout()">🚪 Salir</button>
        </div>
    </header>
    <nav class="nav" id="navBar">
        <button class="nav-btn active" data-tab="dash">📊 Dashboard</button>
        <button class="nav-btn" data-tab="registro">📝 Registro Diario</button>
        <button class="nav-btn" data-tab="clientes">👥 Clientes</button>
        <button class="nav-btn" data-tab="reportes">📈 Reportes</button>
        <button class="nav-btn admin-only" data-tab="administracion">🛠️ Administración</button>
    </nav>
    <div class="container" id="appContent"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header"><h3 id="mTitle">Título</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="modal-body" id="mBody"></div>
        <div class="modal-footer" id="mFooter"></div>
    </div>
</div>

<script>
// ─── DB ──────────────────────────────────────────────────────────────────────
let DB = {
    oficinas: [],
    adminPass: 'admin123',
    solicitudes: [],
    logs: []
};
let USER = null;
let selOficinaLogin = null;

const CONCEPTOS_ING = [
    'Suscripción','Traslado','Control','Cables o Cargadores',
    'Reconexión','Compra de Equipo','Pago Servicio Internet + TV',
    'Instalación','Servicio Técnico','Retiro','Otro'
];
const FORMAS_PAGO = ['Efectivo','Efecty','Cta Bancolombia','Cruce de Cuentas'];
const CONCEPTOS_EGR = [
    'Servicios','Encomiendas','Arriendo','Nómina','Aseo','Celular',
    'Gasolina','Equipos de Oficina','Comisión por Venta','Adelanto','Yurany','Otro'
];
const ESTADO_CLIENTE = ['Activo','Moroso','Retirado','Suspendido'];
const PLANES = ['Internet 10Mb','Internet 20Mb','Internet 30Mb','Internet 50Mb',
    'Internet + TV Básico','Internet + TV Premium','Solo TV','Otro'];
const MOTIVOS_NO_PAGO = ['Falta de dinero','Viaje','Problemas con el servicio',
    'Cambio de operador','Desconoce deuda','Sin contacto','Otro'];

function fmt(n){ return 'COP $' + (n||0).toLocaleString('es-CO'); }
function fmtShort(n){ return '$'+(n||0).toLocaleString('es-CO'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function now(){ return new Date().toISOString(); }
function hoy(){ return new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'}); }
function mesActual(){ return new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long'}); }
function dia(){ return new Date().getDate(); }

function showSync(t,msg){
    const d=document.getElementById('syncDot'),s=document.getElementById('syncText');
    if(!d) return;
    document.getElementById('syncStatus').style.display='flex';
    d.className='sync-dot sync-'+t; s.textContent=msg;
}

// ─── FIREBASE ───────────────────────────────────────────────────────────────
let db = null;
const DOC_ID = 'main'; // documento único en colección "oficinas_sistema"

async function save(){
    if(!db){ showSync('err','Sin conexión Firebase'); return; }
    showSync('saving','Guardando...');
    try{
        await db.collection('oficinas_sistema').doc(DOC_ID).set(DB);
        showSync('ok','Guardado ✓');
    }catch(e){ showSync('err','Error al guardar'); console.error(e); }
}

async function load(){
    if(!db) return;
    try{
        const snap = await db.collection('oficinas_sistema').doc(DOC_ID).get();
        if(snap.exists){ Object.assign(DB, snap.data()); }
    }catch(e){ console.error('Error cargando:', e); }
}

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function switchLogin(t){
    document.querySelectorAll('.login-tab').forEach((x,i)=>{
        x.classList.toggle('active', (t==='admin'&&i===0)||(t==='oficina'&&i===1));
    });
    document.getElementById('login-admin-sec').classList.toggle('hidden', t!=='admin');
    document.getElementById('login-oficina-sec').classList.toggle('hidden', t!=='oficina');
    if(t==='oficina') renderLoginOficinas();
}

function renderLoginOficinas(){
    const list = document.getElementById('loginOficinaList');
    if(!list) return;
    list.innerHTML = DB.oficinas.length
        ? DB.oficinas.map(o=>`<div class="oficina-opt" onclick="selLoginOficina(this,'${o.id}')">
            🏢 <strong>${o.nombre}</strong><br><small style="color:var(--muted)">${o.ciudad||''}</small></div>`).join('')
        : '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:10px;">Sin oficinas registradas</p>';
}

function selLoginOficina(el,id){
    document.querySelectorAll('.oficina-opt').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected'); selOficinaLogin=id;
}

function doLogin(type){
    if(type==='admin'){
        if(document.getElementById('passAdmin').value!==DB.adminPass) return alert('❌ Contraseña incorrecta');
        USER={role:'admin'};
    } else {
        if(!selOficinaLogin) return alert('❌ Seleccione una oficina');
        const o=DB.oficinas.find(x=>x.id===selOficinaLogin);
        if(!o||document.getElementById('passOficina').value!==o.password) return alert('❌ Contraseña incorrecta');
        USER={role:'oficina', id:o.id, nombre:o.nombre};
    }
    enterApp();
}

function enterApp(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.remove('hidden');
    applyRoles(); setupNav(); navigate('dash');
    setInterval(()=>{
        const c=document.getElementById('clock');
        if(c) c.textContent=new Date().toLocaleTimeString('es-CO');
    },1000);
}

function applyRoles(){
    const b=document.getElementById('userBadge');
    if(USER.role==='admin'){ b.textContent='ADMIN'; b.className='badge badge-admin'; }
    else { b.textContent=USER.nombre; b.className='badge badge-oficina'; }
    document.querySelectorAll('.admin-only').forEach(e=>e.style.display=USER.role==='admin'?'':'none');
    document.querySelectorAll('.oficina-only').forEach(e=>e.style.display=USER.role==='oficina'?'':'none');
}

function setupNav(){
    document.querySelectorAll('.nav-btn').forEach(btn=>{
        if(btn.classList.contains('admin-only')&&USER.role!=='admin'){ btn.style.display='none'; return; }
        btn.onclick=()=>navigate(btn.dataset.tab);
    });
}

function navigate(tab){
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    const renders = { dash:renderDash, registro:renderRegistro, clientes:renderClientes, reportes:renderReportes, administracion:renderAdmin };
    if(renders[tab]) renders[tab]();
}

function doLogout(){
    USER=null; selOficinaLogin=null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login-screen').style.display='flex';
    if(document.getElementById('passAdmin')) document.getElementById('passAdmin').value='';
    if(document.getElementById('passOficina')) document.getElementById('passOficina').value='';
    renderLoginOficinas();
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getOficina(id){ return DB.oficinas.find(o=>o.id===(id||USER?.id)); }
function currentOficinas(){ return USER?.role==='admin' ? DB.oficinas : DB.oficinas.filter(o=>o.id===USER.id); }
function getMovimientosOficina(oid, tipo='ambos'){
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o||!o.movimientos) return [];
    if(tipo==='ing') return o.movimientos.filter(m=>m.tipo==='ingreso');
    if(tipo==='egr') return o.movimientos.filter(m=>m.tipo==='egreso');
    return o.movimientos;
}
function sumOficina(oid, tipo){
    return getMovimientosOficina(oid,tipo).reduce((s,m)=>s+parseFloat(m.valor||0),0);
}
function getMesMovs(oid){
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o?.movimientos) return [];
    return o.movimientos.filter(m=>{
        const d=new Date(m.fecha);
        return d.getMonth()===mes && d.getFullYear()===año;
    });
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDash(){
    const content=document.getElementById('appContent');
    const oficinas = currentOficinas();

    // Totales generales del mes
    const mesIng = oficinas.reduce((s,o)=>{
        return s + getMesMovs(o.id).filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
    },0);
    const mesEgr = oficinas.reduce((s,o)=>{
        return s + getMesMovs(o.id).filter(m=>m.tipo==='egreso').reduce((a,m)=>a+parseFloat(m.valor||0),0);
    },0);
    const totalClientes = oficinas.reduce((s,o)=>(s+(o.clientes?.length||0)),0);
    const clientesActivos = oficinas.reduce((s,o)=>(s+(o.clientes?.filter(c=>c.estado==='Activo').length||0)),0);

    // Desglose ingresos por forma de pago (mes)
    let formasPago = {};
    FORMAS_PAGO.forEach(f=>formasPago[f]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='ingreso').forEach(m=>{
            if(formasPago[m.forma]!==undefined) formasPago[m.forma]+=parseFloat(m.valor||0);
        });
    });
    const maxFP = Math.max(...Object.values(formasPago),1);

    // Desglose egresos por concepto
    let conceptosEgr = {};
    CONCEPTOS_EGR.forEach(c=>conceptosEgr[c]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='egreso').forEach(m=>{
            if(conceptosEgr[m.concepto]!==undefined) conceptosEgr[m.concepto]+=parseFloat(m.valor||0);
            else conceptosEgr['Otro']=(conceptosEgr['Otro']||0)+parseFloat(m.valor||0);
        });
    });
    const maxCE = Math.max(...Object.values(conceptosEgr),1);

    // Top conceptos ingreso
    let conceptosIng = {};
    CONCEPTOS_ING.forEach(c=>conceptosIng[c]=0);
    oficinas.forEach(o=>{
        getMesMovs(o.id).filter(m=>m.tipo==='ingreso').forEach(m=>{
            if(conceptosIng[m.concepto]!==undefined) conceptosIng[m.concepto]+=parseFloat(m.valor||0);
            else conceptosIng['Otro']=(conceptosIng['Otro']||0)+parseFloat(m.valor||0);

    });

    });

    content.innerHTML=`
    <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
            <h2 style="font-size:1.1rem;font-weight:700;">📊 Dashboard</h2>
            <p style="font-size:0.78rem;color:var(--muted);">${mesActual()}</p>
        </div>
        ${pendSol>0&&USER.role==='admin'?`<div style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 14px;font-size:0.82rem;color:#f59e0b;">⚠️ ${pendSol} solicitud(es) pendiente(s) de aprobación</div>`:''}
    </div>

    <div class="stats-grid">
        <div class="stat-card green"><div class="label">📥 Ingresos del mes</div><div class="value">${fmtShort(mesIng)}</div><div class="sub">${oficinas.length} oficina(s)</div></div>
        <div class="stat-card red"><div class="label">📤 Egresos del mes</div><div class="value">${fmtShort(mesEgr)}</div></div>
        <div class="stat-card ${mesIng-mesEgr>=0?'blue':'red'}"><div class="label">💰 Balance del mes</div><div class="value">${fmtShort(mesIng-mesEgr)}</div></div>
        <div class="stat-card blue"><div class="label">👥 Total clientes</div><div class="value">${totalClientes}</div><div class="sub">${clientesActivos} activos</div></div>
    </div>

    <div class="two-cols">
        <div class="card">
            <div class="card-header"><h2>📥 Ingresos por forma de pago <span>(mes actual)</span></h2></div>
            <div class="bar-chart">
                ${Object.entries(formasPago).filter(([,v])=>v>0).length===0
                    ? '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px;">Sin ingresos registrados este mes</p>'
                    : Object.entries(formasPago).map(([k,v])=>`

                        <div class="bar-label">${k}</div>
                        <div class="bar-track"><div class="bar-fill" style="width:${(v/maxFP*100)}%;background:linear-gradient(90deg,#10b981,#06d6a0);">${v>0?fmtShort(v):''}</div></div>
                        <div class="bar-val">${fmtShort(v)}</div>
                    </div>`).join('')}

            <div class="card-header"><h2>📤 Egresos por concepto <span>(mes actual)</span></h2></div>
            <div class="bar-chart">
                ${Object.entries(conceptosEgr).filter(([,v])=>v>0).length===0
                    ? '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px;">Sin egresos registrados este mes</p>'
                    : Object.entries(conceptosEgr).filter(([,v])=>v>0).map(([k,v])=>`

                ${resOficinas.map(({o,mIng,mEgr,bal})=>`<tr>
                    <td><strong>${o.nombre}</strong><br><small style="color:var(--muted)">${o.ciudad||''}</small></td>
                    <td><span class="money pos">${fmtShort(mIng)}</span></td>

                    <td>${o.clientes?.length||0}</td>

    ${oficinas.length===0?`<div class="card" style="text-align:center;padding:40px;"><p style="color:var(--muted);margin-bottom:14px;">No hay oficinas registradas todavía.</p><button class="btn btn-primary" onclick="navigate('administracion')">➕ Crear primera oficina</button></div>`:''}

function registrarMovimiento(oid,tipo){
    const pfx=tipo==='ingreso'?'ing':'egr';
    const concepto=document.getElementById(pfx+'_concepto').value;
    const forma=document.getElementById(pfx+'_forma').value;
    const valor=parseFloat(document.getElementById(pfx+'_valor').value||0);
    const desc=document.getElementById(pfx+'_desc').value.trim();
    if(!valor||valor<=0) return alert('⚠️ Ingresa un valor válido');
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    if(!o.movimientos) o.movimientos=[];
    o.movimientos.push({id:uid(),tipo,concepto,forma,descripcion:desc,valor,fecha:now()});
    save(); renderRegistro();
}

function verMovimientosMes(oid){
    const mes=new Date().getMonth(), año=new Date().getFullYear();
    const o=getOficina(oid);
    const movs=(o.movimientos||[]).filter(m=>{
        const d=new Date(m.fecha);
        return d.getMonth()===mes&&d.getFullYear()===año;
    }).slice().reverse();
    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    openModal('📅 Movimientos del mes — '+o.nombre,`
        <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
            <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 16px;">
                <div style="font-size:0.7rem;color:var(--muted);">INGRESOS</div>
                <div style="font-size:1.2rem;font-weight:800;color:#10b981;">${fmtShort(ing)}</div>
            </div>
            <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 16px;">
                <div style="font-size:0.7rem;color:var(--muted);">EGRESOS</div>
                <div style="font-size:1.2rem;font-weight:800;color:#ef4444;">${fmtShort(egr)}</div>
            </div>
            <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 16px;">
                <div style="font-size:0.7rem;color:var(--muted);">BALANCE</div>
                <div style="font-size:1.2rem;font-weight:800;color:#3b82f6;">${fmtShort(ing-egr)}</div>
            </div>
        </div>
        <div class="table-wrap"><table>
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Descripción</th><th>Forma</th><th>Valor</th></tr></thead>
            <tbody>
                ${movs.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">Sin movimientos este mes</td></tr>':
                movs.map(m=>`<tr>
                    <td style="font-size:0.78rem;color:var(--muted);">${new Date(m.fecha).toLocaleDateString('es-CO')}<br>${new Date(m.fecha).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</td>
                    <td><span class="tag ${m.tipo==='ingreso'?'tag-ing':'tag-egr'}">${m.tipo==='ingreso'?'Ingreso':'Egreso'}</span></td>
                    <td>${m.concepto}</td>
                    <td style="color:var(--muted)">${m.descripcion||'-'}</td>
                    <td>${m.forma}</td>
                    <td class="money ${m.tipo==='ingreso'?'pos':'neg'}">${m.tipo==='ingreso'?'+':'-'}${fmtShort(m.valor)}</td>
                </tr>`).join('')}
            </tbody>
        </table></div>
    `,'');
}

function eliminarMovimiento(oid,mid){
    if(!confirm('¿Eliminar este movimiento?')) return;
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    o.movimientos=(o.movimientos||[]).filter(m=>m.id!==mid);
    save(); renderRegistro();
}

function solicitarEliminar(oid,mid){
    const o=getOficina(oid);
    const m=(o.movimientos||[]).find(x=>x.id===mid);
    if(!m) return;
    if(!confirm(`Solicitar eliminación de:\n${m.concepto} - ${fmtShort(m.valor)}\n\n¿Confirmar?`)) return;
    DB.solicitudes.push({
        id:uid(), tipo:'eliminar_mov', oid, mid,
        descripcion:`Eliminar movimiento: ${m.concepto} ${m.tipo} ${fmtShort(m.valor)} del ${new Date(m.fecha).toLocaleDateString('es-CO')}`,
        oficina:o.nombre, estado:'pendiente', fecha:now()
    });
    save(); alert('✅ Solicitud enviada al administrador.');
}

function guardarCliente(oid){
    const nombre=document.getElementById('c_nombre').value.trim();
    if(!nombre) return alert('El nombre es obligatorio');
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    if(!o.clientes) o.clientes=[];
    o.clientes.push({
        id:uid(), nombre,
        telefono:document.getElementById('c_tel').value.trim(),
        direccion:document.getElementById('c_dir').value.trim(),
        plan:document.getElementById('c_plan').value,
        tarifaMensual:parseFloat(document.getElementById('c_tarifa').value||0),
        estado:document.getElementById('c_estado').value,
        observaciones:document.getElementById('c_obs').value.trim(),
        fechaRegistro:now()
    });
    save(); closeModal(); renderClientes();
}

function actualizarCliente(oid,cid){
    const o=DB.oficinas.find(x=>x.id===oid);
    const c=(o?.clientes||[]).find(x=>x.id===cid);
    if(!c) return;
    c.nombre=document.getElementById('ec_nombre').value.trim();
    c.telefono=document.getElementById('ec_tel').value.trim();
    c.direccion=document.getElementById('ec_dir').value.trim();
    c.plan=document.getElementById('ec_plan').value;
    c.tarifaMensual=parseFloat(document.getElementById('ec_tarifa').value||0);
    c.estado=document.getElementById('ec_estado').value;
    c.motivoNoPago=c.estado==='Moroso'?document.getElementById('ec_motivo_np').value:'';
    c.motivoRetiro=c.estado==='Retirado'?document.getElementById('ec_motivo_ret').value:'';
    c.observaciones=document.getElementById('ec_obs').value.trim();
    save(); closeModal(); renderClientes();
}

function eliminarCliente(oid,cid){

    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    o.clientes=(o.clientes||[]).filter(c=>c.id!==cid);
    save(); renderClientes();
}

function solicitarEditarCliente(oid,cid){

function renderReportes(){
    const content=document.getElementById('appContent');
    const oficinas=currentOficinas();
    const oid=USER.role==='admin'?(window._selOfiRep||oficinas[0]?.id):USER.id;
    const o=getOficina(oid);
    const periodo=window._periodo||'mes';

    // Calcular movimientos según periodo
    const ahora=new Date();
    const movs=(o?.movimientos||[]).filter(m=>{
        const d=new Date(m.fecha);
        if(periodo==='hoy'){
            return d.getDate()===ahora.getDate()&&d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();
        }
        return d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();
    });

    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const bal=ing-egr;

    // Agrupar ingresos por concepto
    const porConcepto={};
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{
        porConcepto[m.concepto]=(porConcepto[m.concepto]||0)+parseFloat(m.valor||0);
    });
    const porEgr={};
    movs.filter(m=>m.tipo==='egreso').forEach(m=>{
        porEgr[m.concepto]=(porEgr[m.concepto]||0)+parseFloat(m.valor||0);
    });
    // Por forma pago
    const porForma={};
    movs.filter(m=>m.tipo==='ingreso').forEach(m=>{
        porForma[m.forma]=(porForma[m.forma]||0)+parseFloat(m.valor||0);
    });
    // Clientes por estado
    const clientes=o?.clientes||[];
    const cxEstado={};
    ESTADO_CLIENTE.forEach(e=>cxEstado[e]=0);
    clientes.forEach(c=>cxEstado[c.estado||'Activo']=(cxEstado[c.estado||'Activo']||0)+1);

    content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <h2 style="font-size:1.1rem;font-weight:700;">📈 Reportes${o?' — '+o.nombre:''}</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${USER.role==='admin'&&oficinas.length>1?`<select class="form-control" style="width:auto;" onchange="window._selOfiRep=this.value;renderReportes()">
                ${oficinas.map(x=>`<option value="${x.id}" ${x.id===oid?'selected':''}>${x.nombre}</option>`).join('')}

                <option value="hoy" ${periodo==='hoy'?'selected':''}>Hoy</option>
                <option value="mes" ${periodo==='mes'?'selected':''}>Mes actual</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="exportarReporte('${oid}','${periodo}')">📥 Exportar</button>
        </div>
    </div>

    <div class="reporte-resumen">
        <div class="reporte-item"><div class="r-label">📥 Total Ingresos</div><div class="r-val" style="color:#10b981;">${fmtShort(ing)}</div></div>
        <div class="reporte-item"><div class="r-label">📤 Total Egresos</div><div class="r-val" style="color:#ef4444;">${fmtShort(egr)}</div></div>
        <div class="reporte-item"><div class="r-label">💰 Balance</div><div class="r-val" style="color:${bal>=0?'#10b981':'#ef4444'}">${fmtShort(bal)}</div></div>
        <div class="reporte-item"><div class="r-label">👥 Total clientes</div><div class="r-val" style="color:#3b82f6;">${clientes.length}</div></div>
    </div>

    <div class="two-cols">
        <div class="card" style="margin-bottom:0">
            <div class="card-header"><h2>📥 Ingresos por Concepto</h2></div>
            ${Object.keys(porConcepto).length===0
                ? '<p style="color:var(--muted);text-align:center;padding:20px;">Sin datos</p>'
                : `<div class="table-wrap"><table>
                <thead><tr><th>Concepto</th><th>Total</th><th>%</th></tr></thead>
                <tbody>${Object.entries(porConcepto).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr>
                    <td>${k}</td>
                    <td class="money pos">${fmtShort(v)}</td>
                    <td style="color:var(--muted)">${ing>0?((v/ing)*100).toFixed(1)+'%':'0%'}</td>
                </tr>`).join('')}</tbody>
            </table></div>`}
        </div>
        <div class="card" style="margin-bottom:0">
            <div class="card-header"><h2>📤 Egresos por Concepto</h2></div>
            ${Object.keys(porEgr).length===0
                ? '<p style="color:var(--muted);text-align:center;padding:20px;">Sin datos</p>'
                : `<div class="table-wrap"><table>
                <thead><tr><th>Concepto</th><th>Total</th><th>%</th></tr></thead>
                <tbody>${Object.entries(porEgr).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr>
                    <td>${k}</td>
                    <td class="money neg">${fmtShort(v)}</td>
                    <td style="color:var(--muted)">${egr>0?((v/egr)*100).toFixed(1)+'%':'0%'}</td>
                </tr>`).join('')}</tbody>
            </table></div>`}
        </div>
    </div>

    <div class="two-cols" style="margin-top:16px;">
        <div class="card" style="margin-bottom:0">
            <div class="card-header"><h2>💳 Ingresos por Forma de Pago</h2></div>

                    <td class="money pos">${fmtShort(v)}</td>
                </tr>`).join('')}</tbody>
            </table></div>`}
        </div>
        <div class="card" style="margin-bottom:0">
            <div class="card-header"><h2>👥 Clientes por Estado</h2></div>
            <div class="table-wrap"><table>
                <thead><tr><th>Estado</th><th>Cantidad</th></tr></thead>
                <tbody>${Object.entries(cxEstado).map(([k,v])=>`<tr>
                    <td><span class="motivo-tag motivo-${k.toLowerCase()}">${k}</span></td>
                    <td><strong>${v}</strong></td>
                </tr>`).join('')}</tbody>
            </table></div>
        </div>
    </div>
    `;
}

function exportarReporte(oid,periodo){
    const o=getOficina(oid);
    const ahora=new Date();
    const movs=(o?.movimientos||[]).filter(m=>{
        const d=new Date(m.fecha);
        if(periodo==='hoy') return d.toDateString()===ahora.toDateString();
        return d.getMonth()===ahora.getMonth()&&d.getFullYear()===ahora.getFullYear();
    });
    const ing=movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+parseFloat(m.valor||0),0);
    const lines=[
        `REPORTE — ${o.nombre}`,
        `Periodo: ${periodo==='hoy'?'Hoy '+ahora.toLocaleDateString('es-CO'):mesActual()}`,
        `Generado: ${ahora.toLocaleString('es-CO')}`,
        '',
        `INGRESOS: ${fmt(ing)}`,
        `EGRESOS: ${fmt(egr)}`,
        `BALANCE: ${fmt(ing-egr)}`,
        '',
        '=== MOVIMIENTOS ===',
        'Fecha,Tipo,Concepto,Descripcion,Forma,Valor',
        ...movs.map(m=>`${new Date(m.fecha).toLocaleString('es-CO')},${m.tipo},${m.concepto},"${m.descripcion||''}",${m.forma},${m.valor}`)
    ];
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`reporte_${o.nombre.replace(/\s/g,'_')}_${periodo}.csv`;
    a.click();
}

                        <div style="font-weight:600;font-size:0.85rem;">${s.oficina}</div>
                        <div style="font-size:0.78rem;color:var(--muted);">${s.descripcion}</div>
                        <div style="font-size:0.72rem;color:var(--muted);margin-top:2px;">${new Date(s.fecha).toLocaleString('es-CO')}</div>
                    </div>
                    <div style="display:flex;gap:6px;">
                        <button class="btn btn-primary btn-sm" onclick="aprobarSolicitud('${s.id}')">✅</button>
                        <button class="btn btn-danger btn-sm" onclick="rechazarSolicitud('${s.id}')">❌</button>
                    </div>
                </div>`).join('')}
        </div>
    </div>

    <div class="card" style="margin-top:16px;">
        <div class="card-header"><h2>🔑 Contraseña Admin</h2></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
            <div class="form-group-dark" style="flex:1;min-width:200px;margin-bottom:0;">
                <label>Nueva contraseña</label>
                <input type="password" id="newAdminPass" class="form-control" placeholder="Nueva contraseña">
            </div>
            <button class="btn btn-warning" onclick="cambiarPassAdmin()">🔑 Cambiar</button>
        </div>
    </div>
    `;
}

function modalCrearOficina(){
    openModal('➕ Nueva Oficina',`
    <div class="form-row">
        <div class="form-group-dark"><label>Nombre *</label><input id="o_nombre" class="form-control" placeholder="Nombre de la oficina"></div>
        <div class="form-group-dark"><label>Ciudad</label><input id="o_ciudad" class="form-control" placeholder="Ciudad"></div>
    </div>
    <div class="form-row">
        <div class="form-group-dark"><label>Responsable</label><input id="o_resp" class="form-control" placeholder="Nombre del jefe"></div>
        <div class="form-group-dark"><label>Contraseña *</label><input type="password" id="o_pass" class="form-control" placeholder="Contraseña de acceso"></div>
    </div>
    `,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
       <button class="btn btn-primary" onclick="crearOficina()">✅ Crear</button>`);
}

function crearOficina(){
    const nombre=document.getElementById('o_nombre').value.trim();
    const pass=document.getElementById('o_pass').value;
    if(!nombre||!pass) return alert('Nombre y contraseña son obligatorios');
    DB.oficinas.push({
        id:uid(), nombre, password:pass,
        ciudad:document.getElementById('o_ciudad').value.trim(),
        responsable:document.getElementById('o_resp').value.trim(),
        movimientos:[], clientes:[]
    });
    save(); closeModal(); renderAdmin();
}

function modalEditarOficina(oid){
    const o=getOficina(oid);
    if(!o) return;
    openModal('✏️ Editar Oficina — '+o.nombre,`
    <div class="form-row">
        <div class="form-group-dark"><label>Nombre *</label><input id="eo_nombre" class="form-control" value="${o.nombre}"></div>
        <div class="form-group-dark"><label>Ciudad</label><input id="eo_ciudad" class="form-control" value="${o.ciudad||''}"></div>
    </div>
    <div class="form-row">
        <div class="form-group-dark"><label>Responsable</label><input id="eo_resp" class="form-control" value="${o.responsable||''}"></div>
        <div class="form-group-dark"><label>Nueva contraseña (vacío = sin cambio)</label><input type="password" id="eo_pass" class="form-control" placeholder="Dejar vacío para no cambiar"></div>
    </div>
    `,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
       <button class="btn btn-primary" onclick="actualizarOficina('${oid}')">💾 Guardar</button>`);
}

function actualizarOficina(oid){
    const o=DB.oficinas.find(x=>x.id===oid);
    if(!o) return;
    o.nombre=document.getElementById('eo_nombre').value.trim();
    o.ciudad=document.getElementById('eo_ciudad').value.trim();
    o.responsable=document.getElementById('eo_resp').value.trim();
    const np=document.getElementById('eo_pass').value;
    if(np) o.password=np;
    save(); closeModal(); renderAdmin();
}

function eliminarOficina(oid){
    const o=getOficina(oid);
    if(!confirm(`⚠️ ¿Eliminar oficina "${o?.nombre}"?\nSe eliminarán TODOS sus datos.`)) return;
    DB.oficinas=DB.oficinas.filter(x=>x.id!==oid);
    save(); renderAdmin();
}

function aprobarSolicitud(sid){
    const s=DB.solicitudes.find(x=>x.id===sid);
    if(!s) return;
    if(s.tipo==='eliminar_mov'){
        const o=DB.oficinas.find(x=>x.id===s.oid);
        if(o) o.movimientos=(o.movimientos||[]).filter(m=>m.id!==s.mid);
    }
    s.estado='aprobado';
    save(); renderAdmin();
    alert('✅ Solicitud aprobada y ejecutada.');
}

function rechazarSolicitud(sid){
    const s=DB.solicitudes.find(x=>x.id===sid);
    if(s){ s.estado='rechazado'; save(); renderAdmin(); }
}

function cambiarPassAdmin(){
    const np=document.getElementById('newAdminPass').value;
    if(!np) return alert('Ingresa la nueva contraseña');
    if(!confirm('¿Cambiar contraseña de administrador?')) return;
    DB.adminPass=np;
    save(); alert('✅ Contraseña cambiada.'); renderAdmin();
}

function modalCambiarPass(){
    openModal('🔑 Cambiar Contraseña',`
    <div class="form-group-dark"><label>Contraseña actual</label><input type="password" id="cp_actual" class="form-control"></div>
    <div class="form-group-dark"><label>Nueva contraseña</label><input type="password" id="cp_nueva" class="form-control"></div>
    `,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
       <button class="btn btn-primary" onclick="cambiarPassOficina()">🔑 Cambiar</button>`);
}

function cambiarPassOficina(){
    const o=DB.oficinas.find(x=>x.id===USER.id);
    if(!o) return;
    const actual=document.getElementById('cp_actual').value;
    const nueva=document.getElementById('cp_nueva').value;
    if(actual!==o.password) return alert('❌ Contraseña actual incorrecta');
    if(!nueva) return alert('Ingresa la nueva contraseña');
    o.password=nueva;
    save(); closeModal(); alert('✅ Contraseña actualizada.');
}

function openAdminPanel(){ navigate('administracion'); }

function openModal(title,body,footer=''){
    document.getElementById('mTitle').textContent=title;
    document.getElementById('mBody').innerHTML=body;
    document.getElementById('mFooter').innerHTML=footer;
    document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
